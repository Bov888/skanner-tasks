<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ScannerPlanner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf8; --surface: #f4f3ef; --surface2: #eceae4;
  --border: #e2e1db; --text: #1a1917; --muted: #6b6963;
  --accent: #2d5a27; --accent-light: #e8f0e6;
  --e-low: #6b8f71; --e-med: #b07d3a; --e-high: #8b2010;
}
[data-theme=dark] {
  --bg: #141412; --surface: #1e1d1b; --surface2: #252422;
  --border: #2e2d2a; --text: #e8e6e0; --muted: #8a8880;
  --accent: #6ab05f; --accent-light: #1e2e1c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Literata', serif; font-weight: 300;
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}

/* ── ТОРBAR & NAVIGATION ── */
.topbar {
  height: 56px; display: flex; align-items: center; padding: 0 1.5rem; gap: 1rem;
  border-bottom: 1px solid var(--border); background: var(--bg);
}
.logo { font-size: 1.1rem; flex: 1; cursor: pointer; font-weight: 400; }
.logo span { color: var(--accent); font-style: italic; }

.ctx-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); }
.ctx-tab {
  font-family: 'JetBrains Mono', monospace; font-size: .65rem; text-transform: uppercase;
  color: var(--muted); background: none; cursor: pointer; padding: 1rem 1.5rem;
  border: none; border-bottom: 2px solid transparent; transition: .2s;
}
.ctx-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.ctx-tab.drag-over { background: var(--accent-light); border-bottom-color: var(--accent); }

.filter-bar { 
  display: flex; gap: 1rem; padding: 0.5rem 1.5rem; background: var(--surface); 
  border-bottom: 1px solid var(--border); align-items: center;
}

/* ── BOARD ── */
.app-body { flex: 1; display: flex; overflow: hidden; }
#board { display: flex; width: 100%; padding: 1.2rem; gap: 1.2rem; align-items: stretch; }

.col {
  flex: 1; min-width: 280px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 4px;
  display: flex; flex-direction: column; transition: background .2s;
}
.col.drag-over { background: var(--surface2); border: 1px dashed var(--accent); }
.col-head { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.col-title { font-family: 'JetBrains Mono', monospace; font-size: .65rem; text-transform: uppercase; display: flex; align-items: center; gap: .5rem; }
.col-dot { width: 8px; height: 8px; border-radius: 50%; }
.col-body { flex: 1; overflow-y: auto; padding: 0.8rem; }

/* ── CARDS ── */
.tcard {
  background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
  padding: 1rem; margin-bottom: 0.8rem; cursor: grab; position: relative;
  transition: opacity 0.3s;
}
.tcard:active { cursor: grabbing; }
.tcard::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; display: none; }
.tcard[data-e=low]::before { background: var(--e-low); display: block; }
.tcard[data-e=medium]::before { background: var(--e-med); display: block; }
.tcard[data-e=high]::before { background: var(--e-high); display: block; }

.tcard.is-stale { opacity: 0.5; border-style: dashed; }
.stale-icon { float: right; font-size: 0.8rem; opacity: 0.6; }

.tc-title { font-size: .95rem; line-height: 1.4; margin-bottom: .4rem; }
.tc-meta { font-family: 'JetBrains Mono', monospace; font-size: .55rem; color: var(--muted); text-transform: uppercase; }

/* ── UI ELEMENTS ── */
.ctrl-btn {
  background: var(--bg); border: 1px solid var(--border); color: var(--muted);
  font-size: .6rem; font-family: 'JetBrains Mono', monospace; cursor: pointer;
  padding: .4rem .7rem; border-radius: 2px; text-transform: uppercase;
}
.ctrl-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.quick-in { width: 100%; padding: 0.7rem; border: 1px solid var(--border); font-family: 'Literata'; font-size: 0.85rem; background: var(--bg); }

#auth-gate, .modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000;
  display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px);
}
#auth-gate { display: flex; background: var(--bg); }
.mcard { background: var(--bg); padding: 2rem; width: 90%; max-width: 400px; border: 1px solid var(--border); }
.inp { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid var(--border); font-family: 'Literata'; background: var(--surface); color: var(--text); }
.pbtn { width: 100%; padding: 1rem; background: var(--accent); color: #fff; border: none; font-family: 'JetBrains Mono'; cursor: pointer; text-transform: uppercase; }

@media (max-width: 800px) { #board { flex-direction: column; overflow-y: auto; } .col { flex: none; } }
</style>
</head>
<body>

<div id="auth-gate">
  <div class="mcard">
    <div class="logo" style="text-align:center; margin-bottom:2rem">Scanner<span>Planner</span></div>
    <input type="email" id="email" class="inp" placeholder="Email">
    <input type="password" id="pass" class="inp" placeholder="Password">
    <button class="pbtn" onclick="doLogin()">Увійти</button>
  </div>
</div>

<header class="topbar">
  <div class="logo" onclick="location.reload()">Scanner<span>Planner</span></div>
  <div style="display:flex; gap:0.5rem">
    <button class="ctrl-btn" onclick="runRoulette()">🎲 Що зараз?</button>
    <button class="ctrl-btn" id="focus-btn" onclick="toggleFocus()">🎯 Фокус</button>
    <button class="ctrl-btn" onclick="toggleTheme()">☾</button>
  </div>
</header>

<nav class="ctx-bar" id="ctx-bar">
  <button class="ctx-tab active" data-ctx="inbox" ondragover="tOver(event)" ondragleave="tLeave(event)" ondrop="tDrop(event, 'inbox')">Вхідні <span class="badge" id="b-inbox">0</span></button>
  <button class="ctx-tab" data-ctx="today" ondragover="tOver(event)" ondragleave="tLeave(event)" ondrop="tDrop(event, 'today')">Сьогодні <span class="badge" id="b-today">0</span></button>
  <button class="ctx-tab" data-ctx="waiting" ondragover="tOver(event)" ondragleave="tLeave(event)" ondrop="tDrop(event, 'waiting')">Чекаю <span class="badge" id="b-waiting">0</span></button>
  <button class="ctx-tab" data-ctx="someday" ondragover="tOver(event)" ondragleave="tLeave(event)" ondrop="tDrop(event, 'someday')">Колись <span class="badge" id="b-someday">0</span></button>
</nav>

<div class="filter-bar">
  <span style="font-family:'JetBrains Mono'; font-size:0.55rem; color:var(--muted)">ЕНЕРГО-ФІЛЬТР:</span>
  <button class="ctrl-btn active" id="f-all" onclick="setFilter(null)">Всі</button>
  <button class="ctrl-btn" id="f-low" onclick="setFilter('low')" style="color:var(--e-low)">Low</button>
  <button class="ctrl-btn" id="f-med" onclick="setFilter('medium')" style="color:var(--e-med)">Med</button>
  <button class="ctrl-btn" id="f-high" onclick="setFilter('high')" style="color:var(--e-high)">High</button>
</div>

<main class="app-body"><div id="board"></div></main>

<div id="modal" class="modal" onclick="if(event.target===this)closeMod()">
  <div class="mcard" id="mbody"></div>
</div>

<script>
const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co"; 
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb = supabase.createClient(SB_URL, SB_KEY);

let tasks = [];
let activeCtx = 'inbox';
let energyFilter = null;
let focusMode = false;
let editId = null;

/* ── AUTH ── */
async function doLogin() {
  const { error } = await sb.auth.signInWithPassword({ email: email.value, password: pass.value });
  if (error) alert(error.message);
}
sb.auth.onAuthStateChange((ev, sess) => {
  document.getElementById('auth-gate').style.display = sess ? 'none' : 'flex';
  if (sess) sync();
});

/* ── DATA ── */
async function sync() {
  const { data } = await sb.from('scanner_tasks').select('*').order('created_at', { ascending: false });
  tasks = data || [];
  updateBadges();
  render();
}
function updateBadges() {
  ['inbox', 'today', 'waiting', 'someday'].forEach(k => {
    const c = tasks.filter(t => t.context === k && !t.done).length;
    document.getElementById('b-' + k).textContent = c;
  });
}

/* ── DRAG TO TABS ── */
function tOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function tLeave(e) { e.currentTarget.classList.remove('drag-over'); }
async function tDrop(e, ctx) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  const id = e.dataTransfer.getData('text');
  await sb.from('scanner_tasks').update({ context: ctx }).eq('id', id);
  sync();
}

/* ── SCANNER UTILS ── */
function setFilter(val) {
  energyFilter = val;
  document.querySelectorAll('.filter-bar .ctrl-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(val ? 'f-'+val.substring(0,3) : 'f-all').classList.add('active');
  render();
}
function toggleFocus() {
  focusMode = !focusMode;
  document.getElementById('focus-btn').classList.toggle('active', focusMode);
  render();
}
function runRoulette() {
  const options = tasks.filter(t => t.context === 'someday' && !t.done && t.energy !== 'high');
  if (!options.length) return alert("Немає ідей у 'Колись' для рулетки");
  openMod(options[Math.floor(Math.random() * options.length)]);
}

/* ── RENDER ── */
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  
  let visible = tasks.filter(t => !t.done);
  if (energyFilter) visible = visible.filter(t => t.energy === energyFilter);
  if (focusMode && activeCtx === 'today') visible = visible.filter(t => t.kind === 'task');

  if (activeCtx === 'inbox') {
    const list = visible.filter(t => t.context === 'inbox');
    board.appendChild(buildCol("Вхідні (Чисті)", list, null, 'var(--muted)'));
  } else {
    const enCfg = [
      {id:'low', lbl:'Низька', color:'var(--e-low)'},
      {id:'medium', lbl:'Середня', color:'var(--e-med)'},
      {id:'high', lbl:'Висока', color:'var(--e-high)'}
    ];
    enCfg.forEach(en => {
      if (!energyFilter || energyFilter === en.id) {
        const list = visible.filter(t => t.context === activeCtx && t.energy === en.id);
        board.appendChild(buildCol(en.lbl, list, en.id, en.color));
      }
    });
  }
}

function buildCol(title, list, energy, color) {
  const col = document.createElement('div');
  col.className = 'col';
  col.ondragover = e => e.preventDefault();
  col.ondrop = async e => {
    const id = e.dataTransfer.getData('text');
    await sb.from('scanner_tasks').update({ context: activeCtx, energy: energy }).eq('id', id);
    sync();
  };

  col.innerHTML = `
    <div class="col-head">
      <div class="col-title"><span class="col-dot" style="background:${color}"></span>${title}</div>
      <div class="badge">${list.length}</div>
    </div>
    <div class="col-body"></div>
    <div class="col-footer">
      <input class="quick-in" placeholder="+ Швидко..." onkeydown="handleQuickAdd(event, '${energy||''}')">
    </div>
  `;
  const body = col.querySelector('.col-body');
  list.forEach(t => body.appendChild(mkCard(t)));
  return col;
}

function mkCard(t) {
  const el = document.createElement('div');
  const age = (Date.now() - new Date(t.created_at)) / 86400000;
  const isStale = t.context === 'inbox' && age > 3;
  const isOld = t.context === 'inbox' && age > 7;

  el.className = `tcard ${isOld ? 'is-stale' : ''}`;
  if (t.energy) el.dataset.e = t.energy;
  el.draggable = true;
  el.ondragstart = e => e.dataTransfer.setData('text', t.id);
  el.onclick = () => openMod(t);

  el.innerHTML = `
    <div class="tc-title">
      ${t.title} ${isStale ? '<span class="stale-icon">🕸️</span>' : ''}
    </div>
    <div class="tc-meta">
      <span>${t.kind || 'task'}</span>
      <span style="float:right; cursor:pointer" onclick="event.stopPropagation(); toggleDone('${t.id}')">◯</span>
    </div>
  `;
  return el;
}

/* ── ACTIONS ── */
async function handleQuickAdd(e, en) {
  if (e.key !== 'Enter' || !e.target.value.trim()) return;
  const user = (await sb.auth.getUser()).data.user;
  await sb.from('scanner_tasks').insert([{
    title: e.target.value.trim(),
    context: activeCtx,
    energy: en === '' ? null : en,
    user_id: user.id
  }]);
  e.target.value = '';
  sync();
}

async function toggleDone(id) {
  await sb.from('scanner_tasks').update({ done: true, done_at: new Date() }).eq('id', id);
  sync();
}

function openMod(t) {
  editId = t.id;
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('mbody').innerHTML = `
    <input id="m-ttl" class="inp" value="${t.title}">
    <textarea id="m-note" class="inp" style="height:80px" placeholder="Нотатки...">${t.note||''}</textarea>
    <div style="display:flex; gap:10px; margin-bottom:1rem">
      <select id="m-ctx" class="inp">${['inbox','today','waiting','someday'].map(k => `<option value="${k}" ${t.context===k?'selected':''}>${k.toUpperCase()}</option>`)}</select>
      <select id="m-en" class="inp">
        <option value="">БЕЗ ЕНЕРГІЇ</option>
        <option value="low" ${t.energy==='low'?'selected':''}>LOW</option>
        <option value="medium" ${t.energy==='medium'?'selected':''}>MED</option>
        <option value="high" ${t.energy==='high'?'selected':''}>HIGH</option>
      </select>
    </div>
    <button class="pbtn" onclick="save()">Зберегти</button>
    <div onclick="delTask('${t.id}')" style="text-align:center; color:var(--e-high); margin-top:1rem; font-size:0.6rem; cursor:pointer">ВИДАЛИТИ</div>
  `;
}

async function save() {
  const d = {
    title: document.getElementById('m-ttl').value,
    note: document.getElementById('m-note').value,
    context: document.getElementById('m-ctx').value,
    energy: document.getElementById('m-en').value || null
  };
  await sb.from('scanner_tasks').update(d).eq('id', editId);
  closeMod(); sync();
}

async function delTask(id) {
  if(confirm('Видалити?')) { await sb.from('scanner_tasks').delete().eq('id', id); closeMod(); sync(); }
}

function closeMod() { document.getElementById('modal').style.display = 'none'; }

document.getElementById('ctx-bar').onclick = e => {
  const tab = e.target.closest('.ctx-tab');
  if (!tab) return;
  document.querySelectorAll('.ctx-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeCtx = tab.dataset.ctx;
  render();
};

function toggleTheme() {
  const d = document.documentElement;
  d.dataset.theme = d.dataset.theme === 'dark' ? 'light' : 'dark';
}
</script>
</body>
</html>
