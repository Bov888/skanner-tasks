<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ScannerTasks</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafaf8;--surface:#f4f3ef;--surface2:#eceae4;--border:#e2e1db;
  --text:#1a1917;--muted:#6b6963;
  --accent:#2d5a27;--accent-light:#e8f0e6;--accent-mid:#4a8a42;
  --error:#8b2010;
  --e-low:#6b8f71;--e-med:#b07d3a;--e-high:#8b2010;
  --sw:260px;
}
[data-theme=dark]{
  --bg:#141412;--surface:#1e1d1b;--surface2:#252422;--border:#2e2d2a;
  --text:#e8e6e0;--muted:#8a8880;
  --accent:#6ab05f;--accent-light:#1e2e1c;--accent-mid:#4a8a42;
  --error:#e05040;
  --e-low:#4a8a42;--e-med:#c9903e;--e-high:#e05040;
}
*{margin:0;padding:0;box-sizing:border-box;border:none;outline:none;}
html{font-size:17px;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Literata',Georgia,serif;font-weight:300;
  height:100vh;height:100dvh;overflow:hidden;
  display:flex;flex-direction:column;transition:background .3s,color .3s;
}
#auth-gate{position:fixed;inset:0;background:var(--bg);z-index:9000;
  display:none;align-items:center;justify-content:center;padding:1.5rem;}
.auth-card{background:var(--surface);padding:2.5rem;border-radius:3px;
  border:1px solid var(--border);width:100%;max-width:380px;}
.auth-logo{font-family:'Literata',serif;font-size:1.5rem;font-weight:300;
  letter-spacing:-.02em;margin-bottom:2rem;text-align:center;}
.auth-logo span{color:var(--accent);font-style:italic;}

.topbar{
  height:54px;min-height:54px;display:flex;align-items:center;
  padding:0 1rem;gap:.6rem;
  border-bottom:1px solid var(--border);background:var(--bg);
  flex-shrink:0;z-index:300;
}
.logo-btn{
  font-family:'Literata',serif;font-size:1.15rem;font-weight:400;
  letter-spacing:-.02em;color:var(--text);
  display:flex;align-items:center;gap:.5rem;
  background:none;cursor:pointer;flex:1;min-width:0;
}
.logo-btn span{color:var(--accent);font-style:italic;}
.ibtn{
  background:none;border:1px solid var(--border);color:var(--muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:2px;flex-shrink:0;
  transition:border-color .15s,color .15s;touch-action:manipulation;
}
.ibtn:hover,.ibtn:active{border-color:var(--accent);color:var(--accent);}
.ibtn svg{width:17px;height:17px;}
.theme-btn{
  background:var(--accent-light);border:1px solid var(--accent);color:var(--accent);
  font-size:.62rem;font-family:'JetBrains Mono',monospace;
  cursor:pointer;padding:.32rem .65rem;border-radius:2px;
  letter-spacing:.06em;text-transform:uppercase;
  white-space:nowrap;flex-shrink:0;touch-action:manipulation;
}
.hbtn{
  font-family:'JetBrains Mono',monospace;font-size:.58rem;
  letter-spacing:.05em;text-transform:uppercase;
  border:1px solid var(--border);color:var(--muted);
  background:none;cursor:pointer;padding:.32rem .6rem;
  border-radius:2px;white-space:nowrap;flex-shrink:0;
  transition:all .15s;touch-action:manipulation;
}
.hbtn.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}

#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);
  z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;
}
#overlay[data-open]{opacity:1;pointer-events:auto;}

.app-body{flex:1;display:flex;overflow:hidden;position:relative;}

#sidebar{
  width:var(--sw);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;
  transition:width .25s,border-color .25s;
}
@media(min-width:769px){
  body[data-sc] #sidebar{width:0;border-right-color:transparent;overflow:hidden;}
}
@media(max-width:768px){
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;width:min(280px,88vw)!important;
    z-index:500;transform:translateX(-110%);
    transition:transform .25s cubic-bezier(.4,0,.2,1);
  }
  body[data-sb-open] #sidebar{transform:translateX(0);}
}

.sb-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sb-title{font-family:'JetBrains Mono',monospace;font-size:.6rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.sb-section{padding:1rem;border-bottom:1px solid var(--border);}
.sb-section-title{
  font-family:'JetBrains Mono',monospace;font-size:.55rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  margin-bottom:.6rem;display:flex;align-items:center;justify-content:space-between;
}
.sb-chips{display:flex;flex-direction:column;gap:.3rem;}
.sb-chip{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  letter-spacing:.04em;text-transform:uppercase;
  border:1px solid var(--border);color:var(--muted);
  padding:.38rem .7rem;border-radius:2px;
  cursor:pointer;background:none;
  transition:all .15s;text-align:left;
  display:flex;align-items:center;gap:.5rem;
  touch-action:manipulation;
}
.sb-chip.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.sb-chip .chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sb-chip .chip-ct{flex:1;}
.sb-chip .chip-n{
  font-family:'JetBrains Mono',monospace;font-size:.5rem;
  background:var(--surface2);color:var(--muted);
  padding:.05rem .3rem;border-radius:2px;
}
.sb-chip.on .chip-n{background:var(--accent);color:#fff;}

.sb-actions{padding:1rem;display:flex;flex-direction:column;gap:.4rem;}
.sb-action-btn{
  width:100%;padding:.5rem .8rem;border-radius:2px;
  font-family:'JetBrains Mono',monospace;font-size:.6rem;
  font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;text-align:left;display:flex;align-items:center;gap:.5rem;
  transition:all .15s;touch-action:manipulation;
}
.sb-action-btn.primary{background:var(--accent);color:#fff;border:none;}

.ctx-bar{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;
  overflow-x:auto;scrollbar-width:none;
}
.ctx-tab{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);background:none;cursor:pointer;
  padding:.7rem 1.2rem;border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;white-space:nowrap;
  flex-shrink:0;display:flex;align-items:center;gap:.35rem;
}
.ctx-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;padding:0 3px;
  background:var(--surface);color:var(--muted);border-radius:8px;
  font-size:.5rem;border:1px solid var(--border);
}

#main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#board{
  flex:1;display:flex;padding:1.2rem;gap:1rem;
  overflow-x:auto;overflow-y:hidden;align-items:flex-start;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
@media(max-width:700px){
  #board{flex-direction:column;overflow-x:hidden;overflow-y:auto;padding:.9rem;gap:.8rem;}
}
.col{
  flex:1;min-width:260px;
  background:var(--surface);border:1px solid var(--border);border-radius:3px;
  display:flex;flex-direction:column;max-height:100%;
}
.col-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.7rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;
}
.col-title{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:.45rem;
}
.col-dot{width:8px;height:8px;border-radius:50%;}
.col-body{flex:1;overflow-y:auto;padding:.5rem;}

.tcard{
  background:var(--bg);border:1px solid var(--border);border-radius:3px;
  padding:.7rem .85rem .7rem .95rem;margin-bottom:.35rem;
  cursor:pointer;position:relative;
  transition:border-color .15s,transform .1s;
  touch-action:none;user-select:none;
}
.tcard::before{
  content:'';position:absolute;left:0;top:4px;bottom:4px;
  width:3px;border-radius:0 2px 2px 0;background:var(--border);
}
.tcard[data-e=low]::before{background:var(--e-low);}
.tcard[data-e=medium]::before{background:var(--e-med);}
.tcard[data-e=high]::before{background:var(--e-high);}
.tcard.done-card{opacity:.45;background:var(--surface);}
.tcard.done-card .tc-title{text-decoration:line-through;}

.tc-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.3rem;}
.tc-cb{
  width:18px;height:18px;min-width:18px;
  border:1px solid var(--border);border-radius:2px;
  background:none;cursor:pointer;display:flex;align-items:center;
  justify-content:center;margin-top:2px;flex-shrink:0;
}
.tcard.done-card .tc-cb{background:var(--accent);color:#fff;border-color:var(--accent);}
.tc-title{font-size:.95rem;font-weight:300;flex:1;word-break:break-word;}
.tc-meta{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--muted);display:flex;gap:.4rem;}

#timer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:7000;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px);
}
.timer-card{background:var(--bg);padding:2.5rem;width:90%;max-width:440px;text-align:center;border-radius:3px;}
.timer-display{font-family:'JetBrains Mono',monospace;font-size:4rem;color:var(--accent);margin-bottom:1.5rem;}
.timer-btn-row{display:flex;gap:.5rem;justify-content:center;}

#fab{
  position:fixed;bottom:1.5rem;right:1.5rem;
  width:54px;height:54px;border-radius:50%;
  background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,.2);cursor:pointer;z-index:500;
}

.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:8000;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:1.5rem;
}
.mcard{background:var(--bg);padding:2rem;width:100%;max-width:440px;border-radius:3px;}
.inp{width:100%;padding:.56rem;margin-bottom:.75rem;border:1px solid var(--border);background:var(--surface);color:var(--text);}
.seg{display:flex;gap:.4rem;margin-bottom:.75rem;}
.seg-btn{flex:1;padding:.45rem;border:1px solid var(--border);background:none;font-family:'JetBrains Mono',monospace;font-size:.53rem;cursor:pointer;}
.seg-btn.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.pbtn{width:100%;padding:.56rem;background:var(--accent);color:#fff;cursor:pointer;font-family:'JetBrains Mono',monospace;text-transform:uppercase;}
</style>
</head>
<body data-sc>

<div id="auth-gate">
  <div class="auth-card">
    <div class="auth-logo">Scanner<span>Tasks</span></div>
    <input type="email" id="email" class="inp" placeholder="email@example.com">
    <input type="password" id="pass" class="inp" placeholder="••••••••">
    <button class="pbtn" onclick="doLogin()">Увійти</button>
    <p id="auth-err" style="color:var(--error);font-size:.7rem;margin-top:.5rem;text-align:center"></p>
  </div>
</div>

<div id="overlay"></div>

<div id="timer-overlay">
  <div class="timer-card">
    <div id="timer-task-ttl" style="margin-bottom:1rem;font-size:.9rem"></div>
    <div class="timer-display" id="timer-display">25:00</div>
    <div class="timer-btn-row">
      <button class="pbtn" style="width:auto" onclick="timerToggle()" id="timer-start-btn">▶ Старт</button>
      <button class="pbtn" style="width:auto;background:var(--surface);color:var(--muted)" onclick="timerClose()">✕</button>
    </div>
  </div>
</div>

<header class="topbar">
  <button class="ibtn" id="menu-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h10M4 18h6"/></svg>
  </button>
  <div class="logo-btn">Scanner<span>Tasks</span></div>
  <button class="theme-btn" onclick="toggleTheme()">Theme</button>
  <button class="ibtn" onclick="doLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
</header>

<div class="app-body">
  <aside id="sidebar">
    <div class="sb-header"><div class="sb-title">Фільтри</div></div>
    <div class="sb-section">
      <div class="sb-section-title">Енергія</div>
      <div class="sb-chips" id="filter-energy">
        <button class="sb-chip" onclick="toggleFilter('e','low')">Низька</button>
        <button class="sb-chip" onclick="toggleFilter('e','medium')">Середня</button>
        <button class="sb-chip" onclick="toggleFilter('e','high')">Висока</button>
      </div>
    </div>
    <div class="sb-actions">
      <button class="sb-action-btn primary" onclick="openMod()">+ Нове завдання</button>
    </div>
  </aside>

  <main id="main-area">
    <div class="ctx-bar" id="ctx-bar"></div>
    <div id="board"></div>
  </main>
</div>

<div id="fab" onclick="openMod()">+</div>

<div class="modal" id="modal">
  <div class="mcard">
    <div class="mttl">Завдання</div>
    <input type="text" id="m-ttl" class="inp" placeholder="Назва...">
    <textarea id="m-note" class="inp" placeholder="Нотатки..."></textarea>
    
    <label style="font-size:.6rem;display:block;margin-bottom:.3rem">КОНТЕКСТ</label>
    <div class="seg" id="seg-ctx">
      <button class="seg-btn" data-v="inbox" onclick="setSeg('ctx',this)">Inbox</button>
      <button class="seg-btn" data-v="now" onclick="setSeg('ctx',this)">⚡ Зараз</button>
      <button class="seg-btn" data-v="someday" onclick="setSeg('ctx',this)">Колись</button>
    </div>
    <input type="hidden" id="m-ctx" value="inbox">

    <label style="font-size:.6rem;display:block;margin-bottom:.3rem">ЕНЕРГІЯ</label>
    <div class="seg" id="seg-energy">
      <button class="seg-btn" data-v="low" onclick="setSeg('energy',this)">Низька</button>
      <button class="seg-btn" data-v="medium" onclick="setSeg('energy',this)">Сер.</button>
      <button class="seg-btn" data-v="high" onclick="setSeg('energy',this)">Вис.</button>
    </div>
    <input type="hidden" id="m-energy" value="medium">

    <button class="pbtn" onclick="saveTask()">Зберегти</button>
    <button id="del-btn" style="display:none;color:var(--error);background:none;width:100%;margin-top:1rem;cursor:pointer" onclick="delTask()">Видалити</button>
  </div>
</div>

<script>
// --- КОНФІГУРАЦІЯ (Заміни на свої дані) ---
const SB_URL = 'https://mlkdphygsdfcanztbtez.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc';
const sb = supabase.createClient(SB_URL, SB_KEY);

const contexts = [
  {id:'inbox', label:'Inbox', dot:'#6b6963'},
  {id:'now', label:'Зараз', dot:'#2d5a27', icon:'⚡'},
  {id:'someday', label:'Колись', dot:'#b07d3a'}
];

let tasks = [], editId = null, activeCtx = 'now';
let filters = { e: [] };

// --- АВТОРІЗАЦІЯ ---
async function checkUser() {
  const { data } = await sb.auth.getSession();
  if(!data.session) {
    document.getElementById('auth-gate').style.display = 'flex';
  } else {
    document.getElementById('auth-gate').style.display = 'none';
    loadTasks();
  }
}

async function doLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('pass').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error) document.getElementById('auth-err').innerText = error.message;
  else checkUser();
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

// --- ДАНІ ---
async function loadTasks() {
  const { data } = await sb.from('scanner_tasks').select('*').order('created_at', {ascending:false});
  tasks = data || [];
  render();
}

function render() {
  renderTabs();
  renderBoard();
}

function renderTabs() {
  const bar = document.getElementById('ctx-bar');
  bar.innerHTML = contexts.map(c => {
    const count = tasks.filter(t => t.context === c.id && !t.done).length;
    return `<button class="ctx-tab ${activeCtx===c.id?'active':''}" onclick="setCtx('${c.id}')">
      ${c.icon||''} ${c.label} <span class="badge">${count}</span>
    </button>`;
  }).join('');
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  
  const colTasks = tasks.filter(t => t.context === activeCtx);
  const done = colTasks.filter(t => t.done);
  const todo = colTasks.filter(t => !t.done);

  const colHtml = `
    <div class="col">
      <div class="col-head">
        <div class="col-title">${contexts.find(c=>c.id===activeCtx).label}</div>
        <div style="font-size:.6rem;color:var(--muted)">${todo.length}</div>
      </div>
      <div class="col-body" ondragover="event.preventDefault()" ondrop="drop(event, '${activeCtx}')">
        ${todo.map(t => renderCard(t)).join('')}
        ${done.length ? `<div style="margin-top:1rem;opacity:.5">${done.map(t => renderCard(t)).join('')}</div>` : ''}
      </div>
    </div>
  `;
  board.innerHTML = colHtml;
}

function renderCard(t) {
  return `
    <div class="tcard ${t.done?'done-card':''}" data-e="${t.energy}" draggable="true" ondragstart="drag(event, '${t.id}')" onclick="openMod('${t.id}')">
      <div class="tc-row">
        <div class="tc-cb" onclick="event.stopPropagation(); toggleDone('${t.id}')">${t.done?'✓':''}</div>
        <div class="tc-title">${t.title}</div>
      </div>
      ${t.note ? `<div style="font-size:.7rem;color:var(--muted);margin-left:1.5rem;font-style:italic">${t.note.substring(0,40)}...</div>` : ''}
      <div class="tc-meta" style="margin-left:1.5rem">
        <span>${t.energy}</span>
        <button style="background:none;color:var(--accent);cursor:pointer;font-size:.5rem" onclick="event.stopPropagation(); startTimer('${t.id}')">⏱ TIMER</button>
      </div>
    </div>
  `;
}

// --- ДІЇ ---
function setCtx(ctx) { activeCtx = ctx; render(); }

async function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  const { error } = await sb.from('scanner_tasks').update({ done: !t.done, done_at: !t.done ? new Date() : null }).eq('id', id);
  if(!error) loadTasks();
}

function openMod(id = null) {
  editId = id;
  const t = id ? tasks.find(x => x.id === id) : { title:'', note:'', context: activeCtx, energy:'medium' };
  document.getElementById('m-ttl').value = t.title;
  document.getElementById('m-note').value = t.note || '';
  document.getElementById('m-ctx').value = t.context;
  document.getElementById('m-energy').value = t.energy;
  
  // Update segment buttons
  updateSegs('ctx', t.context);
  updateSegs('energy', t.energy);
  
  document.getElementById('del-btn').style.display = id ? 'block' : 'none';
  document.getElementById('modal').style.display = 'flex';
}

function setSeg(key, btn) {
  const val = btn.dataset.v;
  document.getElementById('m-' + key).value = val;
  updateSegs(key, val);
}

function updateSegs(key, val) {
  document.querySelectorAll(`#seg-${key} .seg-btn`).forEach(b => {
    b.classList.toggle('on', b.dataset.v === val);
  });
}

async function saveTask() {
  const title = document.getElementById('m-ttl').value;
  if(!title) return;
  const d = {
    title,
    note: document.getElementById('m-note').value,
    context: document.getElementById('m-ctx').value,
    energy: document.getElementById('m-energy').value,
    user_id: (await sb.auth.getUser()).data.user.id
  };
  
  const { error } = editId 
    ? await sb.from('scanner_tasks').update(d).eq('id', editId)
    : await sb.from('scanner_tasks').insert([d]);
    
  if(!error) {
    document.getElementById('modal').style.display = 'none';
    loadTasks();
  }
}

async function delTask() {
  if(confirm('Видалити?')) {
    await sb.from('scanner_tasks').delete().eq('id', editId);
    document.getElementById('modal').style.display = 'none';
    loadTasks();
  }
}

// --- DRAG & DROP ---
function drag(e, id) { e.dataTransfer.setData('text', id); }
async function drop(e, ctx) {
  const id = e.dataTransfer.getData('text');
  await sb.from('scanner_tasks').update({ context: ctx }).eq('id', id);
  loadTasks();
}

// --- ТАЙМЕР ---
let timerInt;
function startTimer(id) {
  const t = tasks.find(x => x.id === id);
  document.getElementById('timer-task-ttl').innerText = t.title;
  document.getElementById('timer-overlay').style.display = 'flex';
}

function timerToggle() {
  const btn = document.getElementById('timer-start-btn');
  if(timerInt) {
    clearInterval(timerInt); timerInt = null;
    btn.innerText = '▶ Старт';
  } else {
    let sec = 25 * 60;
    timerInt = setInterval(() => {
      sec--;
      let m = Math.floor(sec/60), s = sec%60;
      document.getElementById('timer-display').innerText = `${m}:${s<10?'0':''}${s}`;
      if(sec <= 0) { clearInterval(timerInt); alert('Час вийшов!'); }
    }, 1000);
    btn.innerText = '⏸ Пауза';
  }
}

function timerClose() {
  clearInterval(timerInt); timerInt = null;
  document.getElementById('timer-overlay').style.display = 'none';
}

function toggleTheme() {
  const d = document.body.dataset;
  d.theme = d.theme === 'dark' ? 'light' : 'dark';
}

checkUser();
