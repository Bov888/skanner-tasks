<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ScannerPlanner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f9f9f9;
    --surface: #ffffff;
    --surface2: #f0f0f0;
    --text: #1a1a1a;
    --muted: #888888;
    --border: #e0e0e0;
    --accent: #333333;
    --accent-mid: #999999;
    --shadow: 0 2px 8px rgba(0,0,0,0.05);
    
    --low: #10b981; 
    --medium: #f59e0b; 
    --high: #ef4444;
  }

  body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: 'Literata', serif;
    display: flex; flex-direction: column;
    height: 100vh; overflow: hidden;
  }

  header {
    padding: 1rem 1.5rem; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }

  .logo { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 1.2rem; }

  nav {
    display: flex; gap: 1rem; padding: 1rem 1.5rem;
    overflow-x: auto; background: var(--surface);
  }

  .nav-btn {
    background: none; border: none; padding: 0.5rem 1rem;
    font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
    color: var(--muted); cursor: pointer; border-radius: 4px;
  }
  .nav-btn.active { color: var(--text); background: var(--surface2); }

  main { flex: 1; overflow-y: auto; padding: 1.5rem; }

  .board {
    display: flex; gap: 1.5rem; align-items: flex-start;
    flex-wrap: wrap; /* Дозволяє колонкам переноситись на новий рядок */
  }

  .col {
    background: var(--surface); border-radius: 8px;
    padding: 1rem; flex: 1; min-width: 280px;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 1rem;
  }

  .col-head { display: flex; justify-content: space-between; align-items: center; }
  .col-title { display: flex; align-items: center; gap: 0.5rem; font-weight: 500; font-size: 1.1rem; }
  .col-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .col-count { font-size: 0.8rem; color: var(--muted); background: var(--surface2); padding: 0.1rem 0.5rem; border-radius: 10px; }

  .col-body {
    min-height: 100px; padding-bottom: 1rem;
    transition: background 0.2s; border-radius: 6px;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.75rem; margin-bottom: 0.75rem;
    cursor: grab; box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    transition: opacity 0.2s, transform 0.1s;
  }
  .card:active { cursor: grabbing; transform: scale(0.98); }
  .card-title { font-size: 0.95rem; margin-bottom: 0.3rem; }
  .card-meta { display: flex; gap: 0.5rem; font-size: 0.75rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  .col-add-btn {
    width: 100%; padding: 0.75rem; background: transparent;
    border: 1px dashed var(--border); color: var(--muted);
    border-radius: 6px; cursor: pointer; transition: 0.2s;
  }
  .col-add-btn:hover { background: var(--surface2); color: var(--text); }

  /* Modal */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none;
    justify-content: center; align-items: center; z-index: 100;
  }
  .modal {
    background: var(--surface); width: 100%; max-width: 500px;
    border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }
  .modal input[type="text"], .modal textarea, .modal select {
    width: 100%; padding: 0.75rem; border: 1px solid var(--border);
    border-radius: 6px; font-family: inherit; font-size: 1rem;
    box-sizing: border-box;
  }
  .modal textarea { resize: vertical; min-height: 80px; }
  
  .segment-group { display: flex; gap: 0.5rem; background: var(--surface2); padding: 0.3rem; border-radius: 6px; }
  .seg-btn {
    flex: 1; padding: 0.5rem; border: 1px solid transparent; background: transparent;
    border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: 'JetBrains Mono', monospace;
  }
  .seg-btn.active { background: var(--surface); box-shadow: var(--shadow); border-color: var(--border); }

  .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem; }
  .btn { padding: 0.5rem 1.5rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
  .btn-primary { background: var(--text); color: var(--surface); }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-ghost:hover { background: var(--surface2); }
  
  .done-toggle-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--muted); cursor: pointer; margin-top: 1rem;}
  .done-list { display: none; margin-top: 0.5rem; opacity: 0.7; }
  .done-toggle-row.open + .done-list { display: block; }

  .empty { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 2rem 0; font-style: italic; }
</style>
</head>
<body>

<header>
  <div class="logo">ScannerPlanner</div>
  <button class="btn btn-primary" onclick="openMod()">+ Завдання</button>
</header>

<nav id="nav-contexts"></nav>
<main>
  <div id="board" class="board"></div>
</main>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <input type="text" id="f-title" placeholder="Що потрібно зробити?" autocomplete="off">
    <textarea id="f-note" placeholder="Нотатки, посилання або ідеї..."></textarea>
    
    <div style="display:flex; gap: 1rem;">
      <div style="flex:1;">
        <label style="font-size: 0.8rem; color: var(--muted); margin-bottom: 0.3rem; display:block;">Контекст</label>
        <select id="f-ctx"></select>
      </div>
    </div>

    <div>
      <label style="font-size: 0.8rem; color: var(--muted); margin-bottom: 0.3rem; display:block;">Тип</label>
      <div class="segment-group" id="seg-kinds"></div>
      <input type="hidden" id="f-kind" value="task">
    </div>

    <div>
      <label style="font-size: 0.8rem; color: var(--muted); margin-bottom: 0.3rem; display:block;">Енергія</label>
      <div class="segment-group" id="seg-energies"></div>
      <input type="hidden" id="f-energy" value="medium">
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeMod()">Скасувати</button>
      <button class="btn btn-primary" onclick="saveTask()">Зберегти</button>
    </div>
  </div>
</div>

<script>
// ==========================================
// НАЛАШТУВАННЯ SUPABASE
// ==========================================
const SUPABASE_URL = 'https://mlkdphygsdfcanztbtez.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==========================================
// КОНФІГУРАЦІЯ СКАЛЕРА
// ==========================================
const CTXS = {
  'inbox': { lbl: 'Inbox', desc: 'Вхідні ідеї та завдання. Оцініть енергію.' },
  'today': { lbl: 'Сьогодні', desc: 'Те, на чому ми фокусуємось прямо зараз.' },
  'waiting': { lbl: 'Чекаю', desc: 'Залежить від інших або обставин.' },
  'someday': { lbl: 'Колись', desc: 'Ідеї для майбутнього дослідження.' }
};

const ENERGIES = [
  { id: 'low', lbl: 'Низька', color: 'var(--low)', icon: '🔋' },
  { id: 'medium', lbl: 'Середня', color: 'var(--medium)', icon: '⚡' },
  { id: 'high', lbl: 'Висока', color: 'var(--high)', icon: '🔥' }
];

const KINDS = [
  { id: 'task', lbl: 'Завдання', icon: '✓' },
  { id: 'project', lbl: 'Проєкт', icon: '🏗️' },
  { id: 'interest', lbl: 'Інтерес', icon: '💡' },
  { id: 'zone', lbl: 'Зона', icon: '🔄' }
];

let tasks = [];
let activeCtx = 'inbox';
let editId = null;

// ==========================================
// ІНІЦІАЛІЗАЦІЯ ТА РЕНДЕР
// ==========================================
async function init() {
  renderNav();
  initSegments();
  
  // Додавання опцій у Select контекстів
  const sel = document.getElementById('f-ctx');
  Object.entries(CTXS).forEach(([k, v]) => {
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = v.lbl;
    sel.appendChild(opt);
  });

  await sync();
}

async function sync() {
  const { data, error } = await sb.from('scanner_tasks').select('*').order('created_at', { ascending: false });
  if (data) tasks = data;
  render();
}

function renderNav() {
  const nav = document.getElementById('nav-contexts');
  nav.innerHTML = '';
  Object.entries(CTXS).forEach(([k, v]) => {
    const btn = document.createElement('button');
    btn.className = `nav-btn ${k === activeCtx ? 'active' : ''}`;
    btn.textContent = v.lbl;
    btn.onclick = () => { activeCtx = k; renderNav(); render(); };
    nav.appendChild(btn);
  });
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const ctxTasks = tasks.filter(t => t.context === activeCtx);
  const activeT = ctxTasks.filter(t => !t.done);
  const doneT = ctxTasks.filter(t => t.done);

  if (activeCtx === 'inbox') {
    // В INBOX розбиваємо по енергії
    ENERGIES.forEach(en => {
      const colTasks = activeT.filter(t => (t.energy || 'medium') === en.id);
      const colDone = doneT.filter(t => (t.energy || 'medium') === en.id);
      board.appendChild(buildCol(en.lbl, en.color, en.icon, colTasks, colDone, en.id, null));
    });
  } else {
    // В ІНШИХ вкладках розбиваємо по типах (Wall Calendar View)
    const desc = document.createElement('p');
    desc.style.cssText = 'width:100%; margin-top:0; color:var(--muted); font-style:italic; font-size:0.9rem;';
    desc.textContent = CTXS[activeCtx].desc;
    board.appendChild(desc);

    KINDS.forEach(k => {
      const colTasks = activeT.filter(t => (t.kind || 'task') === k.id);
      const colDone = doneT.filter(t => (t.kind || 'task') === k.id);
      board.appendChild(buildCol(k.lbl, 'var(--accent-mid)', k.icon, colTasks, colDone, null, k.id));
    });
  }
}

// ==========================================
// КОЛОНКИ ТА КАРТКИ (DRAG & DROP)
// ==========================================
function buildCol(title, color, icon, active, done, energyId, kindId) {
  const col = document.createElement('div');
  col.className = 'col';

  col.innerHTML = `
    <div class="col-head">
      <div class="col-title">
        <span class="col-dot" style="background:${color}"></span>
        ${icon ? `<span>${icon}</span>` : ''} ${title}
      </div>
      <span class="col-count">${active.length}</span>
    </div>`;

  const body = document.createElement('div');
  body.className = 'col-body';
  
  // Drag and Drop Zone
  body.ondragover = (e) => { e.preventDefault(); };
  body.ondragenter = (e) => { e.preventDefault(); body.style.background = 'var(--surface2)'; };
  body.ondragleave = (e) => { body.style.background = ''; };
  body.ondrop = async (e) => {
    e.preventDefault();
    body.style.background = '';
    const taskId = e.dataTransfer.getData('text/plain');
    const t = tasks.find(x => x.id === taskId);
    if (!t) return;

    let updates = {};
    if (energyId && t.energy !== energyId) updates.energy = energyId;
    if (kindId && t.kind !== kindId) updates.kind = kindId;

    if (Object.keys(updates).length > 0) {
      Object.assign(t, updates); // Оптимістичне оновлення
      render();
      await sb.from('scanner_tasks').update(updates).eq('id', taskId);
      sync();
    }
  };

  if (active.length === 0) {
    body.innerHTML = `<div class="empty">Немає записів</div>`;
  } else {
    active.forEach(t => body.appendChild(mkCard(t)));
  }
  col.appendChild(body);

  const addRow = document.createElement('div');
  addRow.innerHTML = `<button class="col-add-btn">+ додати</button>`;
  addRow.querySelector('button').onclick = () => openMod(null, energyId, kindId);
  col.appendChild(addRow);

  if (done.length > 0) {
    const dtr = document.createElement('div');
    dtr.className = 'done-toggle-row';
    dtr.innerHTML = `<span>Завершені (${done.length})</span> <span>▼</span>`;
    dtr.onclick = () => dtr.classList.toggle('open');
    
    const dl = document.createElement('div');
    dl.className = 'done-list';
    done.forEach(t => dl.appendChild(mkCard(t)));
    
    col.appendChild(dtr);
    col.appendChild(dl);
  }
  return col;
}

function mkCard(t) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  
  el.ondragstart = (e) => {
    e.dataTransfer.setData('text/plain', t.id);
    setTimeout(() => el.style.opacity = '0.4', 0);
  };
  el.ondragend = () => { el.style.opacity = '1'; };
  
  el.onclick = () => openMod(t);
  
  const enCfg = ENERGIES.find(x => x.id === (t.energy || 'medium'));
  const kCfg = KINDS.find(x => x.id === (t.kind || 'task'));
  
  el.innerHTML = `
    <div class="card-title" style="text-decoration: ${t.done ? 'line-through' : 'none'}">${t.title}</div>
    <div class="card-meta">
      <span style="color:${enCfg?.color}">${enCfg?.icon || ''} ${enCfg?.lbl || ''}</span>
      <span>• ${kCfg?.lbl || ''}</span>
    </div>
  `;
  return el;
}

// ==========================================
// МОДАЛЬНЕ ВІКНО ТА ФОРМА
// ==========================================
function initSegments() {
  const kBox = document.getElementById('seg-kinds');
  KINDS.forEach(k => {
    const b = document.createElement('button');
    b.className = 'seg-btn'; b.textContent = k.lbl;
    b.dataset.k = k.id;
    b.onclick = () => segSel(b, 'k');
    kBox.appendChild(b);
  });

  const eBox = document.getElementById('seg-energies');
  ENERGIES.forEach(e => {
    const b = document.createElement('button');
    b.className = 'seg-btn'; b.textContent = e.lbl;
    b.dataset.e = e.id;
    b.onclick = () => segSel(b, 'e');
    eBox.appendChild(b);
  });
}

function segSel(btn, attr) {
  const parent = btn.parentElement;
  parent.querySelectorAll('.seg-btn').forEach(b => {
    b.classList.remove('active');
    b.style.borderColor = ''; b.style.color = '';
  });
  
  btn.classList.add('active');
  
  if (attr === 'e') {
    const ecfg = ENERGIES.find(x => x.id === btn.dataset.e);
    if (ecfg) { btn.style.borderColor = ecfg.color; btn.style.color = ecfg.color; }
  }
  
  // ВИПРАВЛЕНО БАГ ЗІ ЗБЕРЕЖЕННЯМ
  const targetInputId = attr === 'k' ? 'f-kind' : 'f-energy';
  const hid = document.getElementById(targetInputId);
  if (hid) hid.value = btn.dataset[attr];
}

function openMod(item = null, defaultEnergy = null, defaultKind = null) {
  editId = item?.id || null;
  document.getElementById('modal').style.display = 'flex';
  
  document.getElementById('f-title').value = item?.title || '';
  document.getElementById('f-note').value = item?.note || '';
  document.getElementById('f-ctx').value = item?.context || activeCtx;
  
  const kVal = item?.kind || defaultKind || 'task';
  const eVal = item?.energy || defaultEnergy || 'medium';
  
  document.getElementById('f-kind').value = kVal;
  document.getElementById('f-energy').value = eVal;
  
  const kBtn = document.querySelector(`.seg-btn[data-k="${kVal}"]`);
  if (kBtn) segSel(kBtn, 'k');
  
  const eBtn = document.querySelector(`.seg-btn[data-e="${eVal}"]`);
  if (eBtn) segSel(eBtn, 'e');
  
  document.getElementById('f-title').focus();
}

function closeMod() {
  document.getElementById('modal').style.display = 'none';
  editId = null;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMod(); });

async function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { alert("Ви не авторизовані в Supabase!"); return; }

  const payload = {
    title,
    note: document.getElementById('f-note').value.trim() || null,
    kind: document.getElementById('f-kind').value || 'task',
    energy: document.getElementById('f-energy').value || 'medium',
    context: document.getElementById('f-ctx').value || 'inbox',
    user_id: user.id
  };

  if (editId) {
    await sb.from('scanner_tasks').update(payload).eq('id', editId);
  } else {
    await sb.from('scanner_tasks').insert([payload]);
  }
  
  closeMod();
  sync();
}

// Запуск
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
