<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ScannerTasks 2.0</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Код стилів розширено для нових функцій: 
  - Idea style
  - Panic mode
  - Backstage projects
  - Minimal FAB
*/

:root{
  --bg:#fafaf8;--surface:#f4f3ef;--surface2:#eceae4;--border:#e2e1db;
  --text:#1a1917;--muted:#6b6963;
  --accent:#2d5a27;--accent-light:#e8f0e6;--accent-mid:#4a8a42;
  --error:#8b2010;
  --e-low:#6b8f71;--e-med:#b07d3a;--e-high:#8b2010;
  --sw:280px;
}
[data-theme=dark]{
  --bg:#141412;--surface:#1e1d1b;--surface2:#252422;--border:#2e2d2a;
  --text:#e8e6e0;--muted:#8a8880;
  --accent:#6ab05f;--accent-light:#1e2e1c;--accent-mid:#4a8a42;
  --error:#e05040;
  --e-low:#4a8a42;--e-med:#c9903e;--e-high:#e05040;
}

*{margin:0;padding:0;box-sizing:border-box;border:none;outline:none;}
html{font-size:17px;} 
body{
  background:var(--bg);color:var(--text);
  font-family:'Literata',Georgia,serif;font-weight:300;
  height:100vh;height:100dvh;overflow:hidden;
  display:flex;flex-direction:column;transition:background .3s;
}

/* ── AUTH ── */
#auth-gate{position:fixed;inset:0;background:var(--bg);z-index:9000;display:none;align-items:center;justify-content:center;padding:1.5rem;}
.auth-card{background:var(--surface);padding:2.5rem;border-radius:3px;border:1px solid var(--border);width:100%;max-width:380px;}

/* ── TOPBAR ── */
.topbar{height:54px;display:flex;align-items:center;padding:0 1rem;gap:.6rem;border-bottom:1px solid var(--border);background:var(--bg);z-index:300;}
.logo-btn{font-family:'Literata',serif;font-size:1.15rem;font-weight:400;color:var(--text);display:flex;align-items:center;gap:.5rem;background:none;cursor:pointer;flex:1;}
.logo-btn span{color:var(--accent);font-style:italic;}

.ibtn{background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:2px;flex-shrink:0;transition:all .15s;}
.ibtn:hover{border-color:var(--accent);color:var(--accent);}
.ibtn.panic-on{background:var(--error);color:#fff;border-color:var(--error);animation:pulse 1.5s infinite;}
@keyframes pulse {0%{opacity:1} 50%{opacity:0.7} 100%{opacity:1}}

/* ── LAYOUT ── */
.app-body{flex:1;display:flex;overflow:hidden;position:relative;}
#sidebar{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transition:transform .25s cubic-bezier(.4,0,.2,1);}

/* ── CHIPS ── */
.sb-chip{font-family:'JetBrains Mono',monospace;font-size:.62rem;border:1px solid var(--border);color:var(--muted);padding:.38rem .7rem;border-radius:2px;cursor:pointer;background:none;display:flex;align-items:center;gap:.5rem;width:100%;text-align:left;margin-bottom:4px;}
.sb-chip.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.sb-chip.backstage{opacity:0.4;filter:grayscale(1);}
.chip-toggle{margin-left:auto;opacity:0.3;transition:opacity .2s;}
.sb-chip:hover .chip-toggle{opacity:1;}

/* ── BOARD ── */
#board{flex:1;display:flex;padding:1.2rem;gap:1rem;overflow-x:auto;scrollbar-width:thin;}
.col{flex:1;min-width:280px;background:var(--surface);border:1px solid var(--border);border-radius:3px;display:flex;flex-direction:column;max-height:100%;}
.col-head{padding:.7rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.col-body{flex:1;overflow-y:auto;padding:.5rem;display:flex;flex-direction:column;gap:0.5rem;}
.col-footer{padding:.5rem;border-top:1px solid var(--border);}

/* ── TASK CARDS ── */
.tcard{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:.8rem;cursor:pointer;position:relative;transition:all .2s;}
.tcard:hover{border-color:var(--accent-mid);transform:translateY(-1px);}
.tcard::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;border-radius:0 2px 2px 0;background:var(--border);}
.tcard[data-e=low]::before{background:var(--e-low);}
.tcard[data-e=medium]::before{background:var(--e-med);}
.tcard[data-e=high]::before{background:var(--e-high);}
.tcard[data-kind=idea]{border-style:dashed;background:var(--accent-light);opacity:0.9;}

.tc-row{display:flex;gap:.6rem;}
.tc-cb{width:19px;height:19px;border:1px solid var(--border);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:.7rem;}
.tcard.done-card{opacity:0.5;}
.tcard.done-card .tc-cb{background:var(--accent);color:#fff;border-color:var(--accent);}
.tc-title{font-size:.95rem;line-height:1.4;flex:1;}
.tc-meta{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--muted);margin-top:4px;display:flex;gap:6px;}

/* ── PANIC MODE ── */
body.panic-mode .tcard:not(.panic-target){display:none;}
body.panic-mode .col-footer, body.panic-mode .ctx-bar{display:none;}

/* ── FAB ── */
#fab {
  position:fixed;bottom:1.5rem;right:1.5rem;width:52px;height:52px;border-radius:50%;
  background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(0,0,0,0.2);cursor:pointer;z-index:500;transition:transform .2s;
}
#fab:hover{transform:scale(1.1) rotate(90deg);}
#fab::after{content:'+';font-size:24px;font-family:'JetBrains Mono',monospace;}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:8000;display:none;align-items:center;justify-content:center;padding:1rem;}
.mcard{background:var(--bg);padding:1.5rem;border-radius:4px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.inp, .seg-btn, .pbtn{width:100%;padding:.6rem;margin-bottom:.8rem;border:1px solid var(--border);border-radius:2px;background:var(--surface);font-family:inherit;}
.pbtn{background:var(--accent);color:#fff;cursor:pointer;}

/* Custom styles for Sprout button */
.sprout-btn{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent);font-family:'JetBrains Mono',monospace;font-size:.55rem;padding:2px 6px;border-radius:2px;cursor:pointer;margin-top:5px;display:inline-block;}

</style>
</head>
<body data-sc>

<div id="auth-gate">
  <div class="auth-card">
    <h2 style="margin-bottom:1rem">ScannerTasks 2.0</h2>
    <input type="email" id="email" class="inp" placeholder="Email">
    <input type="password" id="pass" class="inp" placeholder="Password">
    <button class="pbtn" onclick="doLogin()">Увійти</button>
  </div>
</div>

<header class="topbar">
  <button class="ibtn" onclick="toggleSB()">☰</button>
  <div class="logo-btn">Scanner<span>Tasks</span></div>
  <button class="ibtn" id="panic-btn" onclick="togglePanic()" title="Режим Паніки: залишити лише 3 задачі">🆘</button>
  <button class="ibtn" onclick="runGraveyard()" title="Поховати старі задачі з Inbox">👻</button>
  <button class="ibtn" onclick="toggleTheme()">☾</button>
  <button class="ibtn danger" onclick="sb.auth.signOut()">⏻</button>
</header>

<nav class="ctx-bar" id="ctx-bar" style="display:flex; background:var(--bg); border-bottom:1px solid var(--border); overflow-x:auto;">
  <button class="ctx-tab active" data-ctx="inbox" style="padding:1rem; flex:1; background:none; cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:.65rem;">ВХІДНІ <span id="b-inbox">0</span></button>
  <button class="ctx-tab" data-ctx="today" style="padding:1rem; flex:1; background:none; cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:.65rem;">СЬОГОДНІ <span id="b-today">0</span></button>
  <button class="ctx-tab" data-ctx="someday" style="padding:1rem; flex:1; background:none; cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:.65rem;">КОЛИСЬ <span id="b-someday">0</span></button>
</nav>

<div class="app-body">
  <aside id="sidebar">
    <div style="padding:1rem">
      <p style="font-family:'JetBrains Mono',monospace; font-size:.55rem; color:var(--muted); margin-bottom:.5rem;">ЕНЕРГІЯ</p>
      <div id="e-chips">
        <button class="sb-chip on" data-e="all" onclick="setEFilter('all')">Всі</button>
        <button class="sb-chip" data-e="low" onclick="setEFilter('low')">🌿 Низька</button>
        <button class="sb-chip" data-e="medium" onclick="setEFilter('medium')">⚡ Середня</button>
        <button class="sb-chip" data-e="high" onclick="setEFilter('high')">🔥 Висока</button>
      </div>
      <p style="font-family:'JetBrains Mono',monospace; font-size:.55rem; color:var(--muted); margin-top:1.5rem; margin-bottom:.5rem;">ПРОЄКТИ</p>
      <div id="p-chips"></div>
      <button class="sb-chip" style="border-style:dashed; margin-top:1rem;" onclick="promptNewProject()">+ Новий проєкт</button>
    </div>
  </aside>

  <div id="main-area" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
    <div id="board"></div>
  </div>
</div>

<div id="fab" onclick="openMod()"></div>

<div id="modal" class="modal" onclick="if(event.target===this)closeMod()">
  <div class="mcard" id="mbody"></div>
</div>

<script>
// ВАШІ КЛЮЧІ
const SB_URL="https://mlkdphygsdfcanztbtez.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb=supabase.createClient(SB_URL,SB_KEY);

let tasks=[];
let activeCtx='inbox';
let energyFilter='all';
let projectFilter='all';
let backstageProjects = new Set(JSON.parse(localStorage.getItem('backstage')) || []);
let panicMode = false;

const ENERGIES = {low:'🌿', medium:'⚡', high:'🔥'};
const KINDS = {task:'☐ Задача', idea:'💡 Ідея', project:'🎯 Проєкт'};

/* ── ПАРСИНГ ТЕКСТУ ── */
function parseQuickEntry(input) {
  let title = input;
  let project = null;
  let energy = 'medium';
  let kind = 'task';

  // Parse #project
  const pMatch = title.match(/#(\S+)/);
  if(pMatch) { project = pMatch[1]; title = title.replace(pMatch[0], ''); }

  // Parse !energy
  if(title.includes('!high')) { energy = 'high'; title = title.replace('!high', ''); }
  else if(title.includes('!low')) { energy = 'low'; title = title.replace('!low', ''); }
  else if(title.includes('!med')) { energy = 'medium'; title = title.replace('!med', ''); }

  // Parse type ?? for idea
  if(title.includes('??')) { kind = 'idea'; title = title.replace('??', ''); }

  return { title: title.trim(), project, energy, kind };
}

/* ── АВТО-АРХІВ (GRAVEYARD) ── */
async function runGraveyard() {
  const sevenDaysAgo = new Date();
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

  const staleTasks = tasks.filter(t => t.context === 'inbox' && !t.done && new Date(t.created_at) < sevenDaysAgo);
  
  if(staleTasks.length === 0) { alert("Inbox чистий!"); return; }
  
  if(confirm(`Поховати ${staleTasks.length} старих задач у "Колись"?`)) {
    for(let t of staleTasks) {
      await sb.from('scanner_tasks').update({context: 'someday'}).eq('id', t.id);
    }
    sync();
  }
}

/* ── РЕЖИМ ПАНІКИ ── */
function togglePanic() {
  panicMode = !panicMode;
  document.body.classList.toggle('panic-mode', panicMode);
  document.getElementById('panic-btn').classList.toggle('panic-on', panicMode);
  
  if(panicMode) {
    const pool = tasks.filter(t => !t.done && t.context === activeCtx);
    const shuffled = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
    tasks.forEach(t => t._isPanicTarget = shuffled.some(s => s.id === t.id));
  }
  render();
}

/* ── КЕРУВАННЯ ПРОЄКТАМИ ── */
function toggleBackstage(p, e) {
  e.stopPropagation();
  if(backstageProjects.has(p)) backstageProjects.delete(p);
  else backstageProjects.add(p);
  localStorage.setItem('backstage', JSON.stringify([...backstageProjects]));
  renderProjectChips();
  render();
}

/* ── ОСНОВНА ЛОГІКА ── */
async function sync() {
  const {data} = await sb.from('scanner_tasks').select('*').order('created_at',{ascending:false});
  tasks = data || [];
  renderProjectChips();
  updateBadges();
  render();
}

function updateBadges() {
  ['inbox', 'today', 'someday'].forEach(ctx => {
    const el = document.getElementById('b-'+ctx);
    if(el) el.textContent = tasks.filter(t => t.context === ctx && !t.done).length;
  });
}

function renderProjectChips() {
  const projs = [...new Set(tasks.filter(t => t.project).map(t => t.project))].sort();
  const cont = document.getElementById('p-chips');
  cont.innerHTML = `<button class="sb-chip ${projectFilter==='all'?'on':''}" onclick="setProjectFilter('all')">Всі проєкти</button>`;
  
  projs.forEach(p => {
    const isBS = backstageProjects.has(p);
    const btn = document.createElement('div');
    btn.className = `sb-chip ${projectFilter===p?'on':''} ${isBS?'backstage':''}`;
    btn.onclick = () => setProjectFilter(p);
    btn.innerHTML = `<span>${p}</span> <span class="chip-toggle" onclick="toggleBackstage('${p}', event)">${isBS?'👁‍🗨':'👁'}</span>`;
    cont.appendChild(btn);
  });
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  let filtered = tasks.filter(t => t.context === activeCtx);
  if(energyFilter !== 'all') filtered = filtered.filter(t => t.energy === energyFilter);
  if(projectFilter !== 'all') filtered = filtered.filter(t => t.project === projectFilter);
  
  // Hide backstage projects if not specifically filtered
  if(projectFilter === 'all') {
    filtered = filtered.filter(t => !t.project || !backstageProjects.has(t.project));
  }

  const columns = activeCtx === 'inbox' ? ['Вхідні'] : Object.keys(ENERGIES);

  columns.forEach(colKey => {
    const colEl = document.createElement('div');
    colEl.className = 'col';
    const title = activeCtx === 'inbox' ? colKey : ENERGIES[colKey] + ' ' + colKey.toUpperCase();
    
    const list = activeCtx === 'inbox' ? filtered : filtered.filter(t => t.energy === colKey);
    const active = list.filter(t => !t.done);
    const done = list.filter(t => t.done);

    colEl.innerHTML = `
      <div class="col-head"><span>${title}</span> <small>${active.length}</small></div>
      <div class="col-body" id="col-${colKey}"></div>
      <div class="col-footer">
        <input class="inp" style="margin-bottom:0" placeholder="+ Швидко (#проек !high ??ідея)" onkeydown="quickAdd(event, '${activeCtx === 'inbox' ? 'medium' : colKey}')">
      </div>
    `;
    board.appendChild(colEl);
    
    const body = colEl.querySelector('.col-body');
    active.forEach(t => body.appendChild(mkCard(t)));
    if(done.length > 0) {
      const doneBtn = document.createElement('div');
      doneBtn.style = "text-align:center; font-size:.6rem; color:var(--muted); cursor:pointer; padding:5px";
      doneBtn.textContent = `Завершені (${done.length})`;
      doneBtn.onclick = () => {
        done.forEach(t => body.appendChild(mkCard(t)));
        doneBtn.remove();
      };
      body.appendChild(doneBtn);
    }
  });
}

function mkCard(t) {
  const el = document.createElement('div');
  el.className = `tcard ${t.done ? 'done-card' : ''} ${panicMode && t._isPanicTarget ? 'panic-target' : ''}`;
  el.dataset.e = t.energy;
  el.dataset.kind = t.kind;
  
  const isIdea = t.kind === 'idea';

  el.innerHTML = `
    <div class="tc-row">
      ${!isIdea ? `<div class="tc-cb" onclick="ev(event, ()=>toggleDone('${t.id}', ${t.done}))">${t.done?'✓':''}</div>` : '💡'}
      <div class="tc-title" onclick="openMod('${t.id}')">${t.title}</div>
    </div>
    <div class="tc-meta">
      ${t.project ? `<span style="background:var(--accent-light); padding:0 4px">${t.project}</span>` : ''}
      <span>${KINDS[t.kind] || ''}</span>
    </div>
    ${isIdea ? `<div class="sprout-btn" onclick="ev(event, ()=>sprout('${t.id}'))">🌱 Проростити</div>` : ''}
  `;
  return el;
}

async function quickAdd(e, energy) {
  if(e.key !== 'Enter' || !e.target.value.trim()) return;
  const parsed = parseQuickEntry(e.target.value);
  const user = (await sb.auth.getUser()).data.user;
  
  await sb.from('scanner_tasks').insert([{
    ...parsed,
    context: activeCtx,
    energy: parsed.energy !== 'medium' ? parsed.energy : energy,
    user_id: user.id
  }]);
  e.target.value = '';
  sync();
}

async function sprout(id) {
  await sb.from('scanner_tasks').update({kind: 'task', context: 'today'}).eq('id', id);
  sync();
}

/* ── СТАНДАРТНІ ФУНКЦІЇ ── */
async function toggleDone(id, cur) { await sb.from('scanner_tasks').update({done: !cur, done_at: !cur?new Date():null}).eq('id', id); sync(); }
function setEFilter(v) { energyFilter = v; document.querySelectorAll('#e-chips button').forEach(b=>b.classList.toggle('on', b.dataset.e===v)); render(); }
function setProjectFilter(v) { projectFilter = v; renderProjectChips(); render(); }
function toggleSB() { document.body.hasAttribute('data-sc') ? document.body.removeAttribute('data-sc') : document.body.setAttribute('data-sc',''); }
function ev(e, fn) { e.stopPropagation(); fn(); }

document.getElementById('ctx-bar').onclick = e => {
  const tab = e.target.closest('.ctx-tab');
  if(!tab) return;
  document.querySelectorAll('.ctx-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  activeCtx = tab.dataset.ctx;
  render();
};

function openMod(id=null) {
  const t = tasks.find(x => x.id === id) || {title:'', note:'', kind:'task', energy:'medium', project:''};
  const m = document.getElementById('modal');
  const body = document.getElementById('mbody');
  m.style.display='flex';
  body.innerHTML = `
    <h3 style="margin-bottom:1rem">${id?'Редагувати':'Нова задача'}</h3>
    <input id="m-title" class="inp" value="${t.title}" placeholder="Назва">
    <textarea id="m-note" class="inp" style="height:80px" placeholder="Нотатки">${t.note||''}</textarea>
    <select id="m-kind" class="inp">
      ${Object.entries(KINDS).map(([k,v])=>`<option value="${k}" ${t.kind===k?'selected':''}>${v}</option>`)}
    </select>
    <select id="m-energy" class="inp">
      ${Object.entries(ENERGIES).map(([k,v])=>`<option value="${k}" ${t.energy===k?'selected':''}>${v}</option>`)}
    </select>
    <input id="m-project" class="inp" value="${t.project||''}" placeholder="Проєкт">
    <button class="pbtn" onclick="saveTask('${id}')">Зберегти</button>
    ${id ? `<button class="pbtn" style="background:var(--error)" onclick="delTask('${id}')">Видалити</button>` : ''}
  `;
}
function closeMod() { document.getElementById('modal').style.display='none'; }
async function saveTask(id) {
  const user = (await sb.auth.getUser()).data.user;
  const d = {
    title: document.getElementById('m-title').value,
    note: document.getElementById('m-note').value,
    kind: document.getElementById('m-kind').value,
    energy: document.getElementById('m-energy').value,
    project: document.getElementById('m-project').value,
    user_id: user.id
  };
  if(id!=='null') await sb.from('scanner_tasks').update(d).eq('id', id);
  else await sb.from('scanner_tasks').insert([{...d, context:activeCtx}]);
  closeMod(); sync();
}
async function delTask(id) { if(confirm('Видалити?')){ await sb.from('scanner_tasks').delete().eq('id', id); closeMod(); sync(); } }

async function doLogin(){
  const {error} = await sb.auth.signInWithPassword({email:email.value, password:pass.value});
  if(error) alert(error.message);
}
sb.auth.onAuthStateChange((ev, sess) => {
  document.getElementById('auth-gate').style.display = sess ? 'none' : 'flex';
  if(sess) sync();
});

function toggleTheme() {
  const cur = document.documentElement.dataset.theme;
  document.documentElement.dataset.theme = cur === 'dark' ? 'light' : 'dark';
}

function promptNewProject() {
  const p = prompt("Назва проєкту:");
  if(p) { projectFilter = p; render(); }
}

sync();
</script>
</body>
</html>
