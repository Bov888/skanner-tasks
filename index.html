<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ScannerTasks v2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ── */
:root{
  --bg:#fafaf8;--surface:#f4f3ef;--surface2:#eceae4;
  --border:#e2e1db;--text:#1a1917;--muted:#6b6963;
  --accent:#2d5a27;--accent-light:#e8f0e6;--accent-mid:#4a8a42;
  --error:#8b2010;
  --stale-bg: #f0f0ea;
  --col-w:300px;
}
[data-theme=dark]{
  --bg:#141412;--surface:#1e1d1b;--surface2:#252422;
  --border:#2e2d2a;--text:#e8e6e0;--muted:#8a8880;
  --accent:#6ab05f;--accent-light:#1e2e1c;--accent-mid:#4a8a42;
  --error:#e05040;
  --stale-bg: #1a1a18;
}

/* Energy colors */
:root{--e-low:#6b8f71;--e-med:#b07d3a;--e-high:#8b2010;}
[data-theme=dark]{--e-low:#4a8a42;--e-med:#c9903e;--e-high:#e05040;}

*{margin:0;padding:0;box-sizing:border-box;border:none;outline:none;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Literata',Georgia,serif;font-weight:300;
  height:100vh;height:100dvh;
  overflow:hidden;display:flex;flex-direction:column;
  transition:background .3s,color .3s;
}

/* ── TOPBAR & CONTROLS ── */
.topbar{
  height:52px;display:flex;align-items:center;
  padding:0 1.5rem;gap:.8rem;
  border-bottom:1px solid var(--border);
  background:var(--bg);flex-shrink:0;z-index:100;
}
.logo-btn{
  font-family:'Literata',serif;font-size:1.1rem;font-weight:400;
  letter-spacing:-.02em;color:var(--text);
  display:flex;align-items:center;gap:.5rem;
  flex:1;cursor:pointer;background:none;
}
.logo-btn span{color:var(--accent);font-style:italic;}

.btn-group{display:flex;gap:.4rem;align-items:center;}

.ctrl-btn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--muted);font-size:.55rem;font-family:'JetBrains Mono',monospace;
  cursor:pointer;padding:.4rem .7rem;border-radius:2px;
  letter-spacing:.05em;text-transform:uppercase;
  transition:all .15s;white-space:nowrap;
}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent);}
.ctrl-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ── CONTEXT TABS ── */
.ctx-bar{
  display:flex;align-items:center;
  border-bottom:1px solid var(--border);
  background:var(--bg);flex-shrink:0;
  overflow-x:auto;scrollbar-width:none;
}
.ctx-tab{
  font-family:'JetBrains Mono',monospace;font-size:.6rem;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);background:none;cursor:pointer;
  padding:.8rem 1.2rem;border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
}
.ctx-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.badge{
  display:inline-flex;margin-left:.4rem;font-size:.5rem;
  padding:1px 5px;background:var(--surface2);border-radius:10px;
}

/* ── QUICK ADD ── */
.quick-entry{
  padding:.6rem 1.5rem;background:var(--surface);
  border-bottom:1px solid var(--border);display:flex;gap:.8rem;
}
.quick-input{
  flex:1;background:none;font-family:'Literata',serif;
  font-size:.9rem;color:var(--text);
}

/* ── APP BODY ── */
.app-body{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.energy-bar{
  display:flex;align-items:center;gap:.4rem;
  padding:.4rem 1.5rem;border-bottom:1px solid var(--border);
}
.ebar-lbl{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--muted);text-transform:uppercase;margin-right:.5rem;}
.echip{
  font-family:'JetBrains Mono',monospace;font-size:.52rem;
  border:1px solid var(--border);color:var(--muted);
  padding:.2rem .6rem;border-radius:2px;cursor:pointer;background:none;
}
.echip.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}

#board{
  flex:1;display:flex;overflow-x:auto;padding:1.5rem;gap:1.2rem;
}
.col{
  width:var(--col-w);min-width:var(--col-w);
  background:var(--surface);border:1px solid var(--border);
  border-radius:3px;display:flex;flex-direction:column;
}
.col-head{padding:.8rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.col-title{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.5rem;}
.col-dot{width:6px;height:6px;border-radius:50%;}
.col-body{flex:1;overflow-y:auto;padding:.6rem;}

/* ── TASK CARD ── */
.tcard{
  background:var(--bg);border:1px solid var(--border);
  border-radius:3px;padding:.8rem;margin-bottom:.5rem;
  cursor:pointer;position:relative;transition:transform .1s;
}
.tcard:hover{transform:translateY(-1px);border-color:var(--accent-mid);}
.tcard::before{
  content:'';position:absolute;left:0;top:4px;bottom:4px;
  width:3px;border-radius:0 2px 2px 0;
}
.tcard[data-e=low]::before{background:var(--e-low);}
.tcard[data-e=medium]::before{background:var(--e-med);}
.tcard[data-e=high]::before{background:var(--e-high);}

/* Staleness Style */
.tcard.is-stale{background:var(--stale-bg);border-style:dashed;}
.stale-icon{margin-left:.4rem;font-size:.8rem;opacity:.6;}

.tc-row{display:flex;gap:.6rem;align-items:flex-start;}
.tc-check{
  width:16px;height:16px;border:1px solid var(--border);
  border-radius:2px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;
}
.tcard.done-card{opacity:.4;}
.tcard.done-card .tc-title{text-decoration:line-through;}
.tc-title{font-size:.9rem;line-height:1.4;flex:1;}
.tc-meta{margin-top:.4rem;display:flex;gap:.6rem;font-family:'JetBrains Mono',monospace;font-size:.48rem;color:var(--muted);text-transform:uppercase;}

/* ── QUICK ADD IN COLUMN ── */
.col-quick-add{
  padding:.5rem;border-top:1px solid var(--border);
}
.col-in{
  width:100%;background:var(--bg);border:1px solid var(--border);
  padding:.4rem .6rem;font-family:'Literata',serif;font-size:.75rem;
  border-radius:2px;
}

/* ── MODAL ── */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);
}
.mcard{
  background:var(--bg);padding:2rem;border-radius:3px;width:100%;max-width:400px;
  border:1px solid var(--border);
}
.inp{
  width:100%;padding:.6rem;margin-bottom:.8rem;background:var(--surface);
  border:1px solid var(--border);font-family:'Literata',serif;
}
.pbtn{
  width:100%;padding:.7rem;background:var(--accent);color:#fff;
  font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;cursor:pointer;
}

#auth-gate{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:none;align-items:center;justify-content:center;
}

@media(max-width:700px){
  #board{flex-direction:column;align-items:stretch;}
  .col{width:100%;min-width:0;}
}
</style>
</head>
<body>

<div id="auth-gate">
  <div class="mcard" style="text-align:center">
    <div style="font-family:'Literata';font-size:1.4rem;margin-bottom:1.5rem">Scanner<span>Tasks</span></div>
    <input type="email" id="email" class="inp" placeholder="Email">
    <input type="password" id="pass" class="inp" placeholder="Password">
    <button class="pbtn" onclick="doLogin()">Увійти</button>
  </div>
</div>

<header class="topbar">
  <div class="logo-btn" onclick="location.reload()">
    <svg width="24" height="24" viewBox="0 0 32 32" fill="var(--accent)"><circle cx="16" cy="15" r="4"/></svg>
    Scanner<span>Tasks</span>
  </div>
  
  <div class="btn-group">
    <button class="ctrl-btn" onclick="runRoulette()" title="Випадкове з Колись">🎲 Що зараз?</button>
    <button class="ctrl-btn" id="focus-btn" onclick="toggleFocus()">🎯 Фокус</button>
    <button class="ctrl-btn" onclick="toggleTheme()">☾ тема</button>
  </div>
</header>

<nav class="ctx-bar" id="ctx-bar">
  <button class="ctx-tab active" data-ctx="inbox">Вхідні <span class="badge" id="b-inbox">0</span></button>
  <button class="ctx-tab" data-ctx="today">Сьогодні <span class="badge" id="b-today">0</span></button>
  <button class="ctx-tab" data-ctx="waiting">Чекаю <span class="badge" id="b-waiting">0</span></button>
  <button class="ctx-tab" data-ctx="someday">Колись <span class="badge" id="b-someday">0</span></button>
</nav>

<div class="app-body">
  <div class="energy-bar">
    <span class="ebar-lbl">Енергія</span>
    <button class="echip" data-e="low">🌿 Низька</button>
    <button class="echip" data-e="medium">⚡ Середня</button>
    <button class="echip" data-e="high">🔥 Висока</button>
  </div>

  <div id="board"></div>
</div>

<div id="modal" class="modal" onclick="if(event.target===this)closeMod()">
  <div class="mcard" id="mbody"></div>
</div>

<script>
/* ── CONFIG ── */
const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co"; 
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb = supabase.createClient(SB_URL, SB_KEY);

let tasks = [];
let activeCtx = 'inbox';
let activeEnergy = new Set();
let focusMode = false;
let editId = null;

const CTXS = {
  inbox: {lbl:'Вхідні', color:'#6b6963'},
  today: {lbl:'Сьогодні', color:'#2d5a27'},
  waiting: {lbl:'Чекаю', color:'#b07d3a'},
  someday: {lbl:'Колись', color:'#8a8880'}
};

/* ── AUTH ── */
async function doLogin(){
  const {error} = await sb.auth.signInWithPassword({email:email.value, password:pass.value});
  if(error) alert(error.message);
}

sb.auth.onAuthStateChange((ev, sess) => {
  document.getElementById('auth-gate').style.display = sess ? 'none' : 'flex';
  if(sess) sync();
});

/* ── DATA ── */
async function sync(){
  const {data} = await sb.from('scanner_tasks').select('*').order('created_at', {ascending:false});
  tasks = data || [];
  updateBadges();
  render();
}

function updateBadges(){
  Object.keys(CTXS).forEach(k => {
    const count = tasks.filter(t => t.context === k && !t.done).length;
    document.getElementById('b-'+k).textContent = count;
  });
}

/* ── LOGIC ── */
function toggleFocus(){
  focusMode = !focusMode;
  document.getElementById('focus-btn').classList.toggle('active', focusMode);
  render();
}

function toggleTheme(){
  const curr = document.documentElement.dataset.theme;
  document.documentElement.dataset.theme = curr === 'dark' ? 'light' : 'dark';
}

function runRoulette(){
  const options = tasks.filter(t => 
    t.context === 'someday' && 
    !t.done && 
    (t.energy === 'low' || t.energy === 'medium' || !t.energy)
  );
  if(!options.length) return alert("У 'Колись' поки немає справ з низькою енергією.");
  const pick = options[Math.floor(Math.random() * options.length)];
  openMod(pick);
}

async function quickAdd(e, ctx, energy = 'medium'){
  if(e.key !== 'Enter' || !e.target.value.trim()) return;
  const title = e.target.value.trim();
  e.target.value = '';
  
  const user = (await sb.auth.getUser()).data.user;
  await sb.from('scanner_tasks').insert([{
    title, context: ctx, energy, user_id: user.id, kind: 'task'
  }]);
  sync();
}

/* ── RENDER ── */
function render(){
  const board = document.getElementById('board');
  board.innerHTML = '';

  let list = tasks.filter(t => t.context === activeCtx);
  
  // Apply Focus Mode
  if(focusMode && activeCtx === 'today'){
    list = list.filter(t => t.kind === 'task' || t.kind === null);
  }

  // Apply Energy Filter
  if(activeEnergy.size) list = list.filter(t => activeEnergy.has(t.energy || 'medium'));

  const active = list.filter(t => !t.done);
  const done = list.filter(t => t.done);

  if(activeCtx === 'inbox'){
    // Inbox shows 3 columns by energy
    ['low','medium','high'].forEach(en => {
      board.appendChild(buildCol(en.toUpperCase(), active.filter(a => (a.energy||'medium')===en), done.filter(d => (d.energy||'medium')===en), en));
    });
  } else {
    board.appendChild(buildCol(CTXS[activeCtx].lbl, active, done, 'medium'));
  }
}

function buildCol(title, active, done, defEnergy){
  const col = document.createElement('div');
  col.className = 'col';
  col.innerHTML = `
    <div class="col-head">
      <div class="col-title"><span class="col-dot" style="background:var(--e-${defEnergy})"></span>${title}</div>
      <div style="font-size:.5rem; opacity:.5">${active.length}</div>
    </div>
    <div class="col-body"></div>
    <div class="col-quick-add">
      <input class="col-in" placeholder="+ Швидке завдання..." onkeydown="quickAdd(event, '${activeCtx}', '${defEnergy}')">
    </div>
  `;
  const body = col.querySelector('.col-body');
  active.forEach(t => body.appendChild(mkCard(t)));
  
  if(done.length > 0){
    const dHead = document.createElement('div');
    dHead.style.cssText = "font-size:.5rem; text-transform:uppercase; margin:1rem 0 .5rem; opacity:.4; text-align:center";
    dHead.textContent = "Завершені";
    body.appendChild(dHead);
    done.forEach(t => body.appendChild(mkCard(t)));
  }
  return col;
}

function mkCard(t){
  const el = document.createElement('div');
  const isStale = t.context === 'inbox' && (Date.now() - new Date(t.created_at)) > 259200000; // 3 days
  
  el.className = `tcard ${t.done ? 'done-card' : ''} ${isStale ? 'is-stale' : ''}`;
  el.dataset.e = t.energy || 'medium';
  
  el.innerHTML = `
    <div class="tc-row">
      <div class="tc-check" onclick="event.stopPropagation(); toggleDone('${t.id}', ${t.done})">${t.done ? '✓' : ''}</div>
      <div class="tc-title">
        ${t.title} ${isStale ? '<span class="stale-icon" title="Залежалося">🕸️</span>' : ''}
      </div>
    </div>
    <div class="tc-meta">
      <span>${t.kind || 'task'}</span>
      ${t.snoozed_until ? `<span>⏳ ${t.snoozed_until}</span>` : ''}
    </div>
  `;
  el.onclick = () => openMod(t);
  return el;
}

/* ── MODAL & ACTIONS ── */
async function toggleDone(id, curr){
  await sb.from('scanner_tasks').update({done: !curr, done_at: !curr ? new Date() : null}).eq('id', id);
  sync();
}

function openMod(t){
  editId = t?.id || null;
  const body = document.getElementById('mbody');
  document.getElementById('modal').style.display = 'flex';
  
  body.innerHTML = `
    <div style="font-family:'Literata'; margin-bottom:1rem">${t ? 'Редагувати' : 'Нове завдання'}</div>
    <input id="m-ttl" class="inp" value="${t?.title || ''}" placeholder="Назва...">
    <textarea id="m-note" class="inp" style="height:80px" placeholder="Нотатки...">${t?.note || ''}</textarea>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-bottom:1rem">
      <select id="m-ctx" class="inp">${Object.entries(CTXS).map(([k,v])=>`<option value="${k}" ${t?.context===k?'selected':''}>${v.lbl}</option>`)}</select>
      <select id="m-en" class="inp">
        <option value="low" ${t?.energy==='low'?'selected':''}>🌿 Low</option>
        <option value="medium" ${t?.energy==='medium'||!t?.energy?'selected':''}>⚡ Medium</option>
        <option value="high" ${t?.energy==='high'?'selected':''}>🔥 High</option>
      </select>
    </div>
    <button class="pbtn" onclick="save()">Зберегти</button>
    ${t ? `<div onclick="del('${t.id}')" style="color:var(--error); font-size:.5rem; text-align:center; margin-top:1rem; cursor:pointer; text-transform:uppercase">Видалити</div>` : ''}
  `;
}

async function save(){
  const d = {
    title: document.getElementById('m-ttl').value,
    note: document.getElementById('m-note').value,
    context: document.getElementById('m-ctx').value,
    energy: document.getElementById('m-en').value,
    user_id: (await sb.auth.getUser()).data.user.id
  };
  if(editId) await sb.from('scanner_tasks').update(d).eq('id', editId);
  else await sb.from('scanner_tasks').insert([d]);
  closeMod(); sync();
}

async function del(id){
  if(confirm('Видалити?')) { await sb.from('scanner_tasks').delete().eq('id', id); closeMod(); sync(); }
}

function closeMod(){ document.getElementById('modal').style.display='none'; }

/* ── EVENTS ── */
document.getElementById('ctx-bar').addEventListener('click', e => {
  const tab = e.target.closest('.ctx-tab');
  if(!tab) return;
  document.querySelectorAll('.ctx-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeCtx = tab.dataset.ctx;
  render();
});

document.querySelector('.energy-bar').addEventListener('click', e => {
  const chip = e.target.closest('.echip');
  if(!chip) return;
  const en = chip.dataset.e;
  activeEnergy.has(en) ? activeEnergy.delete(en) : activeEnergy.add(en);
  chip.classList.toggle('on');
  render();
});

// Initialization
if(!document.documentElement.dataset.theme) document.documentElement.dataset.theme = 'light';
</script>
</body>
</html>
