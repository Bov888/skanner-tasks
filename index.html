<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ScannerPlanner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ── */
:root {
  --bg: #fafaf8; --surface: #f4f3ef; --surface2: #eceae4;
  --border: #e2e1db; --text: #1a1917; --muted: #6b6963;
  --accent: #2d5a27; --accent-light: #e8f0e6; --accent-mid: #4a8a42;
  --e-low: #6b8f71; --e-med: #b07d3a; --e-high: #8b2010;
}
[data-theme=dark] {
  --bg: #141412; --surface: #1e1d1b; --surface2: #252422;
  --border: #2e2d2a; --text: #e8e6e0; --muted: #8a8880;
  --accent: #6ab05f; --accent-light: #1e2e1c; --accent-mid: #4a8a42;
  --e-low: #4a8a42; --e-med: #c9903e; --e-high: #e05040;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Literata', serif; font-weight: 300;
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  height: 56px; display: flex; align-items: center; padding: 0 1.5rem; gap: 1rem;
  border-bottom: 1px solid var(--border); background: var(--bg); z-index: 100;
}
.logo { font-size: 1.2rem; flex: 1; cursor: pointer; font-weight: 400; }
.logo span { color: var(--accent); font-style: italic; }

.ctrl-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  font-size: .6rem; font-family: 'JetBrains Mono', monospace; cursor: pointer;
  padding: .5rem .8rem; border-radius: 2px; text-transform: uppercase;
}
.ctrl-btn.active { background: var(--accent); color: #fff; }

/* ── NAVIGATION ── */
.ctx-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); }
.ctx-tab {
  font-family: 'JetBrains Mono', monospace; font-size: .65rem; text-transform: uppercase;
  color: var(--muted); background: none; cursor: pointer; padding: 1rem 1.5rem;
  border: none; border-bottom: 2px solid transparent; transition: .2s;
}
.ctx-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.badge { margin-left: .5rem; font-size: .55rem; opacity: 0.7; font-weight: 500; }

/* ── BOARD & COLUMNS ── */
.app-body { flex: 1; display: flex; overflow: hidden; }
#board {
  display: flex; width: 100%; padding: 1.5rem; gap: 1.5rem; align-items: stretch;
}

.col {
  flex: 1; /* Рівна ширина */
  min-width: 280px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 4px;
  display: flex; flex-direction: column; transition: background .2s;
}
.col.drag-over { background: var(--surface2); border: 1px dashed var(--accent); }

.col-head { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.col-title { font-family: 'JetBrains Mono', monospace; font-size: .65rem; text-transform: uppercase; display: flex; align-items: center; gap: .5rem; }
.col-dot { width: 8px; height: 8px; border-radius: 50%; }

.col-body { flex: 1; overflow-y: auto; padding: .8rem; min-height: 50px; }

/* ── CARD ── */
.tcard {
  background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
  padding: 1rem; margin-bottom: .8rem; cursor: grab; position: relative;
}
.tcard:active { cursor: grabbing; }
.tcard::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.tcard[data-e=low]::before { background: var(--e-low); }
.tcard[data-e=medium]::before { background: var(--e-med); }
.tcard[data-e=high]::before { background: var(--e-high); }
.tc-title { font-size: .9rem; line-height: 1.4; margin-bottom: .4rem; }
.tc-meta { font-family: 'JetBrains Mono', monospace; font-size: .5rem; color: var(--muted); text-transform: uppercase; }

/* ── QUICK ADD ── */
.col-footer { padding: .8rem; border-top: 1px solid var(--border); }
.quick-in {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  padding: .6rem; font-family: 'Literata'; font-size: .8rem; border-radius: 2px;
}

/* ── MODAL & AUTH ── */
.modal, #auth-gate {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000;
  display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px);
}
#auth-gate { display: flex; background: var(--bg); z-index: 9999; }
.mcard { background: var(--bg); padding: 2rem; width: 100%; max-width: 400px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.inp { width: 100%; padding: .8rem; margin-bottom: 1rem; background: var(--surface); border: 1px solid var(--border); font-family: 'Literata'; color: var(--text); }
.pbtn { width: 100%; padding: 1rem; background: var(--accent); color: #fff; font-family: 'JetBrains Mono'; text-transform: uppercase; cursor: pointer; border: none; }

@media (max-width: 800px) {
  #board { flex-direction: column; overflow-y: auto; }
  .col { min-width: 0; flex: none; }
}
</style>
</head>
<body>

<div id="auth-gate">
  <div class="mcard">
    <div class="logo" style="text-align:center; margin-bottom:1.5rem">Scanner<span>Planner</span></div>
    <input type="email" id="email" class="inp" placeholder="Email">
    <input type="password" id="pass" class="inp" placeholder="Password">
    <button class="pbtn" onclick="doLogin()">Увійти</button>
    <div id="auth-err" style="color:var(--e-high); font-size:0.7rem; margin-top:1rem; text-align:center;"></div>
  </div>
</div>

<header class="topbar">
  <div class="logo" onclick="location.reload()">Scanner<span>Planner</span></div>
  <button class="ctrl-btn" onclick="toggleTheme()">☾ Тема</button>
</header>

<nav class="ctx-bar" id="ctx-bar">
  <button class="ctx-tab active" data-ctx="inbox">Вхідні <span class="badge" id="b-inbox">0</span></button>
  <button class="ctx-tab" data-ctx="today">Сьогодні <span class="badge" id="b-today">0</span></button>
  <button class="ctx-tab" data-ctx="waiting">Чекаю <span class="badge" id="b-waiting">0</span></button>
  <button class="ctx-tab" data-ctx="someday">Колись <span class="badge" id="b-someday">0</span></button>
</nav>

<main class="app-body">
  <div id="board"><div style="padding:2rem; color:var(--muted); font-family:'JetBrains Mono'">Завантаження...</div></div>
</main>

<div id="modal" class="modal" onclick="if(event.target===this)closeMod()">
  <div class="mcard" id="mbody"></div>
</div>

<script>
/* ── НАЛАШТУВАННЯ ── */
// ПЕРЕВІРТЕ ЦІ КЛЮЧІ! Якщо вони з іншого проєкту, дані не з'являться.
const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co"; 
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb = supabase.createClient(SB_URL, SB_KEY);

let tasks = [];
let activeCtx = 'inbox';
let editId = null;

/* ── АВТОРИЗАЦІЯ ── */
async function doLogin() {
  const { error } = await sb.auth.signInWithPassword({ email: email.value, password: pass.value });
  if (error) document.getElementById('auth-err').textContent = error.message;
}

sb.auth.onAuthStateChange((ev, sess) => {
  document.getElementById('auth-gate').style.display = sess ? 'none' : 'flex';
  if (sess) sync();
});

/* ── ДАНІ ── */
async function sync() {
  const { data, error } = await sb.from('scanner_tasks').select('*').order('created_at', { ascending: false });
  if (error) {
    console.error("Помилка Supabase:", error);
    document.getElementById('board').innerHTML = `<div style="color:red; padding:2rem">Помилка завантаження: ${error.message}</div>`;
    return;
  }
  tasks = data || [];
  updateBadges();
  render();
}

function updateBadges() {
  ['inbox', 'today', 'waiting', 'someday'].forEach(k => {
    const count = tasks.filter(t => t.context === k && !t.done).length;
    const el = document.getElementById('b-' + k);
    if(el) el.textContent = count;
  });
}

/* ── РЕНДЕР ── */
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const ENERGIES = [
    {id:'low', lbl:'Низька', color:'var(--e-low)'},
    {id:'medium', lbl:'Середня', color:'var(--e-med)'},
    {id:'high', lbl:'Висока', color:'var(--e-high)'}
  ];

  if (activeCtx === 'inbox') {
    // INBOX: Тільки одна колонка
    const list = tasks.filter(t => t.context === 'inbox' && !t.done);
    board.appendChild(buildCol("Вхідні Ідеї", list, 'medium', 'var(--muted)'));
  } else {
    // ІНШІ: Три колонки енергії
    ENERGIES.forEach(en => {
      const list = tasks.filter(t => t.context === activeCtx && !t.done && (t.energy || 'medium') === en.id);
      board.appendChild(buildCol(en.lbl, list, en.id, en.color));
    });
  }
}

function buildCol(title, list, energyTag, color) {
  const col = document.createElement('div');
  col.className = 'col';
  
  // Drag & Drop Logic
  col.ondragover = e => e.preventDefault();
  col.ondragenter = () => col.classList.add('drag-over');
  col.ondragleave = () => col.classList.remove('drag-over');
  col.ondrop = async e => {
    col.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text');
    // Оновлюємо і контекст, і енергію при перетягуванні
    await sb.from('scanner_tasks').update({ context: activeCtx, energy: energyTag }).eq('id', id);
    sync();
  };

  col.innerHTML = `
    <div class="col-head">
      <div class="col-title"><span class="col-dot" style="background:${color}"></span>${title}</div>
      <div class="badge">${list.length}</div>
    </div>
    <div class="col-body"></div>
    <div class="col-footer">
      <input class="quick-in" placeholder="+ Швидкий запис..." onkeydown="handleQuickAdd(event, '${energyTag}')">
    </div>
  `;

  const body = col.querySelector('.col-body');
  if (list.length === 0) {
    body.innerHTML = `<div style="text-align:center; padding-top:2rem; opacity:0.2; font-size:2rem">✓</div>`;
  }
  list.forEach(t => body.appendChild(mkCard(t)));
  return col;
}

function mkCard(t) {
  const el = document.createElement('div');
  el.className = 'tcard';
  el.dataset.e = t.energy || 'medium';
  el.draggable = true;
  el.ondragstart = e => e.dataTransfer.setData('text', t.id);

  el.innerHTML = `
    <div class="tc-title">${t.title}</div>
    <div class="tc-meta">
      <span>${t.kind || 'task'}</span>
      <span style="float:right; cursor:pointer" onclick="event.stopPropagation(); toggleDone('${t.id}')">◯</span>
    </div>
  `;
  el.onclick = () => openMod(t);
  return el;
}

/* ── ДІЇ ── */
async function handleQuickAdd(e, energy) {
  if (e.key !== 'Enter' || !e.target.value.trim()) return;
  const user = (await sb.auth.getUser()).data.user;
  await sb.from('scanner_tasks').insert([{
    title: e.target.value.trim(),
    context: activeCtx,
    energy: energy,
    user_id: user.id
  }]);
  e.target.value = '';
  sync();
}

async function toggleDone(id) {
  await sb.from('scanner_tasks').update({ done: true, done_at: new Date() }).eq('id', id);
  sync();
}

function openMod(t) {
  editId = t?.id || null;
  const body = document.getElementById('mbody');
  document.getElementById('modal').style.display = 'flex';
  body.innerHTML = `
    <div class="col-title" style="margin-bottom:1rem">Редагування</div>
    <input id="m-ttl" class="inp" value="${t?.title || ''}" placeholder="Назва...">
    <textarea id="m-note" class="inp" style="height:80px" placeholder="Нотатки...">${t?.note || ''}</textarea>
    <div style="display:flex; gap:10px;">
      <select id="m-ctx" class="inp">${['inbox', 'today', 'waiting', 'someday'].map(k => `<option value="${k}" ${t?.context === k ? 'selected' : ''}>${k.toUpperCase()}</option>`)}</select>
      <select id="m-en" class="inp">${['low', 'medium', 'high'].map(e => `<option value="${e}" ${t?.energy === e ? 'selected' : ''}>Енергія: ${e}</option>`)}</select>
    </div>
    <button class="pbtn" onclick="save()">Зберегти</button>
    <button class="ctrl-btn" style="width:100%; margin-top:10px; border:none" onclick="delTask('${t.id}')">Видалити</button>
  `;
}

async function save() {
  const d = {
    title: document.getElementById('m-ttl').value,
    note: document.getElementById('m-note').value,
    context: document.getElementById('m-ctx').value,
    energy: document.getElementById('m-en').value
  };
  await sb.from('scanner_tasks').update(d).eq('id', editId);
  closeMod(); sync();
}

async function delTask(id) {
  if(confirm('Видалити?')) {
    await sb.from('scanner_tasks').delete().eq('id', id);
    closeMod(); sync();
  }
}

function closeMod() { document.getElementById('modal').style.display = 'none'; }

function toggleTheme() {
  const d = document.documentElement;
  d.dataset.theme = d.dataset.theme === 'dark' ? 'light' : 'dark';
}

document.getElementById('ctx-bar').onclick = e => {
  const tab = e.target.closest('.ctx-tab');
  if (!tab) return;
  document.querySelectorAll('.ctx-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeCtx = tab.dataset.ctx;
  render();
};
</script>
</body>
</html>
