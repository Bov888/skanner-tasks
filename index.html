<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ScannerPlanner 2.0</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf8; --surface: #f4f3ef; --surface2: #eceae4; --border: #e2e1db;
  --text: #1a1917; --muted: #6b6963;
  --accent: #2d5a27; --accent-light: #e8f0e6; --accent-mid: #4a8a42;
  --error: #8b2010;
  --e-low: #6b8f71; --e-med: #b07d3a; --e-high: #8b2010;
  --sidebar-w: 280px;
}

[data-theme=dark] {
  --bg: #141412; --surface: #1e1d1b; --surface2: #252422; --border: #2e2d2a;
  --text: #e8e6e0; --muted: #8a8880;
  --accent: #6ab05f; --accent-light: #1e2e1c; --accent-mid: #4a8a42;
  --error: #e05040;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Literata', Georgia, serif; font-weight: 300;
  height: 100dvh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ── AUTH ── */
#auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 1rem; }
.auth-card { background: var(--surface); padding: 2rem; border: 1px solid var(--border); width: 100%; max-width: 360px; }

/* ── HEADER ── */
.topbar {
  height: 60px; display: flex; align-items: center; padding: 0 1rem; gap: 0.5rem;
  border-bottom: 1px solid var(--border); background: var(--bg); z-index: 1000;
}
.logo { font-size: 1.1rem; font-weight: 400; flex: 1; cursor: default; }
.logo span { color: var(--accent); font-style: italic; }

.ibtn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  border-radius: 4px; cursor: pointer; transition: 0.2s; flex-shrink: 0;
}
.ibtn:active { transform: scale(0.95); background: var(--surface); }
.ibtn.panic-on { background: var(--error); color: #fff; border-color: var(--error); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

/* ── SIDEBAR & OVERLAY ── */
#sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w);
  background: var(--surface); border-right: 1px solid var(--border);
  z-index: 2000; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column; padding-top: 60px;
}
body.sb-open #sidebar { transform: translateX(0); }

#overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
  z-index: 1500; display: none; opacity: 0; transition: opacity 0.3s;
}
body.sb-open #overlay { display: block; opacity: 1; }

/* ── CONTENT AREA ── */
.app-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

.ctx-tabs {
  display: flex; border-bottom: 1px solid var(--border); background: var(--bg);
  overflow-x: auto; scrollbar-width: none;
}
.ctx-tabs::-webkit-scrollbar { display: none; }
.ctx-tab {
  flex: 1; min-width: 100px; padding: 1rem 0.5rem; background: none; border: none;
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted);
  cursor: pointer; text-align: center; border-bottom: 2px solid transparent;
}
.ctx-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

#board {
  flex: 1; display: flex; overflow-x: auto; padding: 1rem; gap: 1rem;
  scroll-snap-type: x mandatory;
}
.col {
  flex: 0 0 85%; scroll-snap-align: center;
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  display: flex; flex-direction: column; max-height: 100%;
}
@media (min-width: 768px) {
  .col { flex: 1; min-width: 300px; scroll-snap-align: unset; }
}

.col-head { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; font-weight: 500; }
.col-body { flex: 1; overflow-y: auto; padding: 0.7rem; display: flex; flex-direction: column; gap: 0.6rem; }
.col-footer { padding: 0.7rem; border-top: 1px solid var(--border); }

/* ── CARDS ── */
.tcard {
  background: var(--bg); border: 1px solid var(--border); padding: 1rem; border-radius: 4px;
  display: flex; flex-direction: column; gap: 0.5rem; position: relative;
}
.tcard[data-e=low] { border-left: 4px solid var(--e-low); }
.tcard[data-e=medium] { border-left: 4px solid var(--e-med); }
.tcard[data-e=high] { border-left: 4px solid var(--e-high); }
.tcard.done { opacity: 0.5; }

.tc-main { display: flex; gap: 0.8rem; align-items: flex-start; }
.tc-check { 
  width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 4px; 
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer;
}
.done .tc-check { background: var(--accent); color: #fff; border-color: var(--accent); }
.tc-title { font-size: 0.95rem; line-height: 1.4; flex: 1; }
.tc-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }

/* ── FAB ── */
#fab {
  position: fixed; bottom: 1.5rem; right: 1.5rem; width: 56px; height: 56px;
  background: var(--accent); color: #fff; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; cursor: pointer;
}
#fab::after { content: '+'; font-size: 30px; }

/* ── UI HELPERS ── */
.inp { width: 100%; padding: 0.8rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-family: inherit; font-size: 0.9rem; }
.sb-item { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; font-size: 0.9rem; }
.sb-item.active { background: var(--accent-light); color: var(--accent); }

/* MODAL */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 1rem; }
.m-content { background: var(--bg); width: 100%; max-width: 400px; padding: 1.5rem; border-radius: 8px; display: flex; flex-direction: column; gap: 1rem; }

/* PANIC MODE */
body.panic .tcard:not(.panic-target) { display: none; }
</style>
</head>
<body>

<div id="auth-gate">
  <div class="auth-card">
    <h2 style="margin-bottom:1.5rem">Вхід у ScannerPlanner</h2>
    <input type="email" id="email" class="inp" placeholder="Email" style="margin-bottom:1rem">
    <input type="password" id="pass" class="inp" placeholder="Пароль" style="margin-bottom:1.5rem">
    <button class="inp" style="background:var(--accent); color:#fff; border:none; font-weight:500" onclick="doLogin()">Увійти</button>
  </div>
</div>

<div id="overlay" onclick="toggleSB()"></div>

<header class="topbar">
  <button class="ibtn" onclick="toggleSB()">☰</button>
  <div class="logo">Scanner<span>Planner</span></div>
  <button class="ibtn" id="panic-btn" onclick="togglePanic()" title="Panic Mode">🆘</button>
  <button class="ibtn" onclick="toggleTheme()">☾</button>
</header>

<div class="app-body">
  <nav class="ctx-tabs">
    <button class="ctx-tab active" data-ctx="inbox" onclick="setCtx('inbox')">ВХІДНІ (<span id="count-inbox">0</span>)</button>
    <button class="ctx-tab" data-ctx="today" onclick="setCtx('today')">СЬОГОДНІ (<span id="count-today">0</span>)</button>
    <button class="ctx-tab" data-ctx="someday" onclick="setCtx('someday')">КОЛИСЬ (<span id="count-someday">0</span>)</button>
  </nav>

  <div id="board"></div>
</div>

<aside id="sidebar">
  <div style="padding:1.5rem">
    <p style="font-size:0.7rem; color:var(--muted); letter-spacing:1px; margin-bottom:1rem">ПРОЄКТИ</p>
    <div id="project-list"></div>
    <button class="sb-item" style="border:1px dashed var(--border); margin-top:1rem; justify-content:center" onclick="addProject()">+ Новий проєкт</button>
  </div>
</aside>

<div id="fab" onclick="openEdit()"></div>

<div id="modal" class="modal" onclick="if(event.target===this)closeMod()">
  <div class="m-content" id="m-body"></div>
</div>

<script>
const SB_URL="https://mlkdphygsdfcanztbtez.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb = supabase.createClient(SB_URL, SB_KEY);

let tasks = [];
let curCtx = 'inbox';
let curProj = 'all';
let isPanic = false;

const ENERGIES = { low: '🌿 Низька', medium: '⚡ Середня', high: '🔥 Висока' };

// ── СИСТЕМНІ ФУНКЦІЇ ──
function toggleSB() {
  document.body.classList.toggle('sb-open');
}

function toggleTheme() {
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
}

// ── РОБОТА З ДАНИМИ ──
async function sync() {
  const { data } = await sb.from('scanner_tasks').select('*').order('created_at', { ascending: false });
  tasks = data || [];
  updateCounts();
  renderProjects();
  renderBoard();
}

function updateCounts() {
  ['inbox', 'today', 'someday'].forEach(c => {
    document.getElementById(`count-${c}`).textContent = tasks.filter(t => t.context === c && !t.done).length;
  });
}

function setCtx(ctx) {
  curCtx = ctx;
  document.querySelectorAll('.ctx-tab').forEach(b => b.classList.toggle('active', b.dataset.ctx === ctx));
  renderBoard();
}

// ── ПАРСИНГ ТЕКСТУ (Quick Entry) ──
function parseTask(str) {
  let res = { title: str, project: null, energy: 'medium', kind: 'task' };
  const p = str.match(/#(\S+)/);
  if(p) { res.project = p[1]; res.title = res.title.replace(p[0], ''); }
  if(str.includes('!high')) { res.energy = 'high'; res.title = res.title.replace('!high', ''); }
  if(str.includes('!low')) { res.energy = 'low'; res.title = res.title.replace('!low', ''); }
  if(str.includes('??')) { res.kind = 'idea'; res.title = res.title.replace('??', ''); }
  res.title = res.title.trim();
  return res;
}

// ── РЕНДЕР ──
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  
  let filtered = tasks.filter(t => t.context === curCtx);
  if(curProj !== 'all') filtered = filtered.filter(t => t.project === curProj);

  const cols = curCtx === 'inbox' ? ['Вхідні'] : Object.keys(ENERGIES);

  cols.forEach(cKey => {
    const colTasks = curCtx === 'inbox' ? filtered : filtered.filter(t => t.energy === cKey);
    const col = document.createElement('div');
    col.className = 'col';
    col.innerHTML = `
      <div class="col-head">${curCtx==='inbox'? 'INBOX' : ENERGIES[cKey]} <span>${colTasks.filter(t=>!t.done).length}</span></div>
      <div class="col-body"></div>
      <div class="col-footer">
        <input class="inp" placeholder="+ Додати..." onkeydown="handleQuickAdd(event, '${cKey}')">
      </div>
    `;
    const body = col.querySelector('.col-body');
    colTasks.forEach(t => body.appendChild(createCard(t)));
    board.appendChild(col);
  });
}

function createCard(t) {
  const card = document.createElement('div');
  card.className = `tcard ${t.done ? 'done' : ''} ${t._isPanic ? 'panic-target' : ''}`;
  card.dataset.e = t.energy;
  card.innerHTML = `
    <div class="tc-main">
      <div class="tc-check" onclick="toggleTask('${t.id}', ${t.done})">${t.done ? '✓' : ''}</div>
      <div class="tc-title" onclick="openEdit('${t.id}')">${t.title}</div>
    </div>
    <div class="tc-meta">
      ${t.project ? `<span style="color:var(--accent)">#${t.project}</span>` : ''}
      <span>${t.kind === 'idea' ? '💡 Ідея' : ''}</span>
    </div>
  `;
  return card;
}

function renderProjects() {
  const container = document.getElementById('project-list');
  const projs = [...new Set(tasks.map(t => t.project).filter(Boolean))];
  container.innerHTML = `<div class="sb-item ${curProj==='all'?'active':''}" onclick="setProj('all')">Всі проєкти</div>`;
  projs.forEach(p => {
    const el = document.createElement('div');
    el.className = `sb-item ${curProj===p?'active':''}`;
    el.onclick = () => setProj(p);
    el.textContent = `# ${p}`;
    container.appendChild(el);
  });
}

function setProj(p) { curProj = p; renderBoard(); renderProjects(); if(window.innerWidth < 768) toggleSB(); }

// ── ДІЇ ──
async function handleQuickAdd(e, energy) {
  if(e.key !== 'Enter' || !e.target.value.trim()) return;
  const parsed = parseTask(e.target.value);
  const user = (await sb.auth.getUser()).data.user;
  await sb.from('scanner_tasks').insert([{
    ...parsed,
    context: curCtx,
    energy: parsed.energy === 'medium' ? (curCtx==='inbox'?'medium':energy) : parsed.energy,
    user_id: user.id
  }]);
  e.target.value = '';
  sync();
}

async function toggleTask(id, state) {
  await sb.from('scanner_tasks').update({ done: !state, done_at: !state ? new Date() : null }).eq('id', id);
  sync();
}

function togglePanic() {
  isPanic = !isPanic;
  document.body.classList.toggle('panic', isPanic);
  document.getElementById('panic-btn').classList.toggle('panic-on', isPanic);
  if(isPanic) {
    const active = tasks.filter(t => !t.done && t.context === curCtx);
    const selected = active.sort(() => 0.5 - Math.random()).slice(0, 3);
    tasks.forEach(t => t._isPanic = selected.some(s => s.id === t.id));
  }
  renderBoard();
}

function openEdit(id = null) {
  const t = tasks.find(x => x.id === id) || { title: '', note: '', energy: 'medium', project: '', kind: 'task' };
  const mod = document.getElementById('modal');
  const body = document.getElementById('m-body');
  mod.style.display = 'flex';
  body.innerHTML = `
    <input id="m-title" class="inp" value="${t.title}" placeholder="Назва">
    <textarea id="m-note" class="inp" style="height:100px" placeholder="Нотатки">${t.note || ''}</textarea>
    <select id="m-energy" class="inp">
      ${Object.entries(ENERGIES).map(([k,v]) => `<option value="${k}" ${t.energy===k?'selected':''}>${v}</option>`).join('')}
    </select>
    <input id="m-project" class="inp" value="${t.project || ''}" placeholder="Проєкт (без #)">
    <div style="display:flex; gap:0.5rem">
      <button class="inp" style="background:var(--accent); color:#fff; border:none" onclick="saveTask('${id}')">Зберегти</button>
      ${id ? `<button class="inp" style="background:var(--error); color:#fff; border:none; width:60px" onclick="deleteTask('${id}')">🗑</button>` : ''}
    </div>
  `;
}

function closeMod() { document.getElementById('modal').style.display = 'none'; }

async function saveTask(id) {
  const user = (await sb.auth.getUser()).data.user;
  const data = {
    title: document.getElementById('m-title').value,
    note: document.getElementById('m-note').value,
    energy: document.getElementById('m-energy').value,
    project: document.getElementById('m-project').value,
    user_id: user.id
  };
  if(id !== 'null') await sb.from('scanner_tasks').update(data).eq('id', id);
  else await sb.from('scanner_tasks').insert([{...data, context: curCtx}]);
  closeMod(); sync();
}

async function deleteTask(id) {
  if(confirm('Видалити?')) { await sb.from('scanner_tasks').delete().eq('id', id); closeMod(); sync(); }
}

async function doLogin() {
  const { error } = await sb.auth.signInWithPassword({ email: email.value, password: pass.value });
  if(error) alert(error.message);
}

// ── ІНІЦІАЛІЗАЦІЯ ──
sb.auth.onAuthStateChange((event, session) => {
  document.getElementById('auth-gate').style.display = session ? 'none' : 'flex';
  if(session) sync();
});
</script>
</body>
</html>
