<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScannerPlanner v5</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ТУТ ЗАЛИШИВСЯ ТВОЙ ОРИГІНАЛЬНИЙ СТИЛЬ БЕЗ ЗМІН */
body {
  margin:0;
  background:#141412;
  color:#e8e6e0;
  font-family: system-ui;
}

.topbar {
  height:60px;
  display:flex;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid #2e2d2a;
}

#board {
  display:flex;
  gap:20px;
  padding:20px;
  height:calc(100vh - 60px);
}

.col {
  flex:1;
  background:#1e1d1b;
  border:1px solid #2e2d2a;
  display:flex;
  flex-direction:column;
}

.col-head {
  padding:10px;
  border-bottom:1px solid #2e2d2a;
}

.col-body {
  flex:1;
  overflow:auto;
  padding:10px;
}

.tcard {
  background:#1a1a18;
  border:1px solid #2e2d2a;
  padding:10px;
  margin-bottom:8px;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="runRoulette()">🎲</button>
<button onclick="toggleFocus()">🎯</button>
</div>

<div id="board"></div>

<script>

/* CONFIG */
const sb = supabase.createClient(
  "https://mlkdphygsdfcanztbtez.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"
);

let tasks=[];
let activeCtx="today";
let focusMode=false;

/* SMART SCORE */
function scoreTask(t){
 let s=0;
 if(t.context==="today") s+=50;
 if(t.energy==="high") s+=20;
 if(t.energy==="medium") s+=10;

 const age=(Date.now()-new Date(t.created_at))/86400000;
 s+=Math.max(0,30-age);

 return s;
}

function smartSort(list){
 return list.sort((a,b)=>scoreTask(b)-scoreTask(a));
}

/* CACHE */
function saveLocal(){
 localStorage.setItem("cache",JSON.stringify(tasks));
}
function loadLocal(){
 const d=localStorage.getItem("cache");
 if(d) tasks=JSON.parse(d);
}

/* CLEAN */
async function autoCleanup(){
 const stale=tasks.filter(t=>
  t.context==="inbox" &&
  Date.now()-new Date(t.created_at)>259200000
 );

 for(let t of stale){
  await sb.from("scanner_tasks")
   .update({context:"someday"})
   .eq("id",t.id);
 }

 if(stale.length) sync();
}

/* SYNC */
async function sync(){
 try{
  const {data}=await sb.from("scanner_tasks")
   .select("*")
   .order("created_at",{ascending:false});

  tasks=data||[];
  saveLocal();
 }catch{
  loadLocal();
 }

 render();
 autoCleanup();
}

/* RENDER */
function render(){
 const board=document.getElementById("board");
 board.innerHTML="";

 const energies=["low","medium","high"];

 energies.forEach(en=>{
  const col=document.createElement("div");
  col.className="col";

  col.innerHTML=`
    <div class="col-head">${en}</div>
    <div class="col-body"></div>
  `;

  const body=col.querySelector(".col-body");

  let list=tasks.filter(t=>
    t.context===activeCtx &&
    !t.done &&
    (t.energy||"medium")===en
  );

  if(focusMode){
    list=smartSort(list).slice(0,1);
  }

  smartSort(list).forEach(t=>{
    const el=document.createElement("div");
    el.className="tcard";
    el.innerText=t.title;

    el.onclick=()=>toggleDone(t.id);

    body.appendChild(el);
  });

  board.appendChild(col);
 });
}

/* DONE */
async function toggleDone(id){
 await sb.from("scanner_tasks")
  .update({done:true})
  .eq("id",id);

 sync();
}

/* FOCUS */
function toggleFocus(){
 focusMode=!focusMode;

 if(focusMode){
  const list=tasks.filter(t=>t.context==="today"&&!t.done);
  const best=smartSort(list)[0];
  if(best) alert("Фокус: "+best.title);
 }

 render();
}

/* ROULETTE */
function runRoulette(){
 const list=tasks.filter(t=>!t.done);
 if(!list.length) return;

 const top=smartSort(list).slice(0,5);
 const r=top[Math.floor(Math.random()*top.length)];

 alert("Спробуй: "+r.title);
}

/* INIT */
document.addEventListener("DOMContentLoaded",sync);

</script>
</body>
</html>
