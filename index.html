<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ScannerPlanner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf8; --surface: #f4f3ef; --surface2: #eceae4;
  --border: #e2e1db; --text: #1a1917; --muted: #6b6963;
  --accent: #2d5a27; --accent-light: #e8f0e6;
  --e-low: #6b8f71; --e-med: #b07d3a; --e-high: #8b2010;
}
[data-theme=dark] {
  --bg: #141412; --surface: #1e1d1b; --surface2: #252422;
  --border: #2e2d2a; --text: #e8e6e0; --muted: #8a8880;
  --accent: #6ab05f; --accent-light: #1e2e1c;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { 
  background: var(--bg); color: var(--text); 
  font-family: 'Literata', serif; 
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── HEADER ── */
.topbar { 
  height: 60px; display: flex; align-items: center; 
  padding: 0 1rem; border-bottom: 1px solid var(--border); 
  gap: 0.5rem; flex-shrink: 0;
}
.logo { font-size: 1rem; font-weight: 400; flex-shrink: 0; }
.logo span { color: var(--accent); font-style: italic; }

.header-btns { display: flex; gap: 0.4rem; flex: 1; justify-content: flex-end; }

/* ── NAVIGATION (FULL WIDTH) ── */
.ctx-bar { 
  display: flex; width: 100%; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.ctx-tab { 
  flex: 1; /* Однаковий розмір */
  font-family: 'JetBrains Mono', monospace; font-size: .55rem; 
  text-transform: uppercase; color: var(--muted); background: none; 
  cursor: pointer; padding: 1.2rem 0; border: none; 
  border-bottom: 3px solid transparent; text-align: center;
}
.ctx-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--surface); }

/* ── BOARD ── */
.app-body { flex: 1; display: flex; overflow: hidden; }
#board { 
  display: flex; width: 100%; padding: 1rem; gap: 1rem; 
  overflow-x: auto; align-items: stretch;
}
@media(max-width: 700px) {
  #board { flex-direction: column; overflow-x: hidden; overflow-y: auto; }
  .col { min-width: 100% !important; }
}

.col { 
  flex: 1; min-width: 320px; max-width: 450px; 
  background: var(--surface); border: 1px solid var(--border); 
  border-radius: 4px; display: flex; flex-direction: column; 
}
.col-head { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.col-title { font-family: 'JetBrains Mono', monospace; font-size: .6rem; text-transform: uppercase; opacity: 0.8; }
.col-body { flex: 1; overflow-y: auto; padding: 0.6rem; }

/* ── CARDS ── */
.tcard { 
  background: var(--bg); border: 1px solid var(--border); 
  border-radius: 4px; padding: 1rem; margin-bottom: 0.8rem; 
  cursor: pointer; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}
.tcard[data-e=low] { border-left: 4px solid var(--e-low); }
.tcard[data-e=medium] { border-left: 4px solid var(--e-med); }
.tcard[data-e=high] { border-left: 4px solid var(--e-high); }

.tc-title { font-size: .95rem; line-height: 1.4; margin-bottom: .4rem; }
.tc-meta { font-family: 'JetBrains Mono', monospace; font-size: .55rem; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
.tc-project { color: var(--accent); font-weight: 500; border: 1px solid var(--accent); padding: 1px 4px; border-radius: 2px; margin-right: 5px; }

/* ── BUTTONS ORIGINAL STYLE ── */
.btn { 
  background: var(--bg); border: 1px solid var(--border); 
  color: var(--muted); font-size: .6rem; padding: 0.6rem 0.8rem; 
  cursor: pointer; font-family: 'JetBrains Mono'; text-transform: uppercase;
  border-radius: 4px; transition: 0.2s;
}
.btn-primary { background: var(--accent); color: white; border: none; font-weight: 500; }

/* Кнопки-сегменти у модалці */
.segment-group { display: flex; gap: 4px; margin-bottom: 1rem; flex-wrap: wrap; }
.seg-btn { 
  flex: 1; min-width: 80px; padding: 0.8rem 0.4rem; 
  background: var(--bg); border: 1px solid var(--border);
  font-family: 'JetBrains Mono'; font-size: 0.6rem; text-align: center;
  cursor: pointer; border-radius: 4px; color: var(--muted);
}
.seg-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* ── MODAL ── */
.modal { 
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
  display: none; align-items: center; justify-content: center; z-index: 2000; padding: 1rem;
}
.mcard { 
  background: var(--bg); padding: 1.5rem; width: 100%; max-width: 500px; 
  border-radius: 8px; position: relative;
}
.inp { 
  width: 100%; padding: 1rem; margin-bottom: 1rem; 
  border: 1px solid var(--border); background: var(--surface2); 
  color: var(--text); font-family: inherit; border-radius: 4px; font-size: 1rem;
}

#auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 2rem; }
</style>
</head>
<body>

<div id="auth-gate">
  <div class="mcard" style="text-align: center;">
    <div class="logo" style="margin-bottom: 2rem; font-size: 1.5rem;">Scanner<span>Planner</span></div>
    <input type="email" id="email" class="inp" placeholder="Email">
    <input type="password" id="pass" class="inp" placeholder="Password">
    <button class="btn btn-primary" style="width: 100%; padding: 1.2rem;" onclick="doLogin()">Увійти</button>
  </div>
</div>

<header class="topbar">
  <div class="logo">Scanner<span>Planner</span></div>
  <div class="header-btns">
    <button class="btn" onclick="startFiveMin()">⏱️ 5хв</button>
    <button class="btn btn-primary" onclick="openMod(null)">+ Додати</button>
  </div>
</header>

<nav class="ctx-bar" id="ctx-bar">
  <button class="ctx-tab active" data-ctx="inbox">Вхідні <span id="b-inbox">0</span></button>
  <button class="ctx-tab" data-ctx="today">Сьогодні <span id="b-today">0</span></button>
  <button class="ctx-tab" data-ctx="waiting">Чекаю <span id="b-waiting">0</span></button>
  <button class="ctx-tab" data-ctx="someday">Колись <span id="b-someday">0</span></button>
  <button class="ctx-tab" data-ctx="success">🏆</button>
</nav>

<main class="app-body"><div id="board"></div></main>

<div id="modal" class="modal" onclick="if(event.target===this)closeMod()">
  <div class="mcard">
    <div id="mttl" style="font-family: 'JetBrains Mono'; font-size: 0.6rem; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase;">Нова ідея</div>
    
    <input id="f-title" class="inp" placeholder="Що саме спало на думку?">
    <input id="f-project" class="inp" placeholder="Проєкт (напр. ScannerPlanner)">
    
    <div style="font-family: 'JetBrains Mono'; font-size: 0.55rem; margin-bottom: 0.5rem; color: var(--muted);">КОНТЕКСТ</div>
    <div class="segment-group" id="seg-ctx">
      <div class="seg-btn" data-val="inbox">Вхідні</div>
      <div class="seg-btn" data-val="today">Сьогодні</div>
      <div class="seg-btn" data-val="waiting">Чекаю</div>
      <div class="seg-btn" data-val="someday">Колись</div>
    </div>

    <div style="font-family: 'JetBrains Mono'; font-size: 0.55rem; margin-bottom: 0.5rem; color: var(--muted);">ЕНЕРГІЯ</div>
    <div class="segment-group" id="seg-en">
      <div class="seg-btn" data-val="low">🌿 Низька</div>
      <div class="seg-btn" data-val="medium">⚡ Середня</div>
      <div class="seg-btn" data-val="high">🔥 Висока</div>
    </div>

    <button class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 0.8rem;" onclick="saveTask()">Зберегти задачу</button>
    <div id="del-btn" style="text-align: center; margin-top: 1.5rem; font-size: 0.6rem; color: var(--e-high); cursor: pointer; display: none;" onclick="deleteTask()">ВИДАЛИТИ БЕЗПОВОРОТНО</div>
  </div>
</div>

<script>
const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co"; 
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb = supabase.createClient(SB_URL, SB_KEY);

let tasks = [];
let activeCtx = 'inbox';
let editId = null;
let selCtx = 'inbox';
let selEn = 'medium';

async function doLogin() {
  const { error } = await sb.auth.signInWithPassword({ email: email.value, password: pass.value });
  if (error) alert(error.message);
}

sb.auth.onAuthStateChange((ev, sess) => {
  document.getElementById('auth-gate').style.display = sess ? 'none' : 'flex';
  if (sess) sync();
});

async function sync() {
  const { data } = await sb.from('scanner_tasks').select('*').order('created_at', { ascending: false });
  tasks = data || [];
  ['inbox', 'today', 'waiting', 'someday'].forEach(k => {
    const el = document.getElementById('b-' + k);
    if(el) el.textContent = tasks.filter(t => t.context === k && !t.done).length;
  });
  render();
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  if (activeCtx === 'success') { renderMuseum(board); return; }

  const groups = [
    {id:'low', lbl:'Низька енергія'},
    {id:'medium', lbl:'Середня енергія'},
    {id:'high', lbl:'Висока енергія'}
  ];

  groups.forEach(g => {
    const list = tasks.filter(t => t.context === activeCtx && t.energy === g.id && !t.done);
    const col = document.createElement('div');
    col.className = 'col';
    col.innerHTML = `
      <div class="col-head"><div class="col-title">${g.lbl}</div><div style="font-size:0.6rem; opacity:0.5">${list.length}</div></div>
      <div class="col-body"></div>
    `;
    const body = col.querySelector('.col-body');
    list.forEach(t => {
      const card = document.createElement('div');
      card.className = 'tcard';
      card.dataset.e = t.energy;
      card.onclick = () => openMod(t);
      card.innerHTML = `
        <div class="tc-title">${t.title}</div>
        <div class="tc-meta">
          <span>${t.project ? `<span class="tc-project">${t.project}</span>` : ''}</span>
          <span style="font-size:1.1rem" onclick="event.stopPropagation(); toggleDone('${t.id}')">◯</span>
        </div>
      `;
      body.appendChild(card);
    });
    board.appendChild(col);
  });
}

function renderMuseum(container) {
  const done = tasks.filter(t => t.done).sort((a,b) => new Date(b.done_at) - new Date(a.done_at));
  container.innerHTML = `<div style="padding:1rem; width:100%; overflow-y:auto"><h2>🏆 Музей Успіхів</h2><div id="m-list"></div></div>`;
  const list = container.querySelector('#m-list');
  done.forEach(t => {
    const item = document.createElement('div');
    item.style.padding = '10px 0';
    item.style.borderBottom = '1px dashed var(--border)';
    item.innerHTML = `<span style="color:var(--accent)">✔</span> ${t.project?`<b>[${t.project}]</b> `:''}${t.title}`;
    list.appendChild(item);
  });
}

/* ── MODAL LOGIC ── */
function openMod(t) {
  editId = t ? t.id : null;
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('f-title').value = t ? t.title : '';
  document.getElementById('f-project').value = t ? (t.project || '') : '';
  document.getElementById('del-btn').style.display = t ? 'block' : 'none';
  document.getElementById('mttl').textContent = t ? 'Редагування' : 'Нова ідея';
  
  selCtx = t ? t.context : activeCtx;
  selEn = t ? t.energy : 'medium';
  updateSegments();
}

function updateSegments() {
  document.querySelectorAll('#seg-ctx .seg-btn').forEach(b => b.classList.toggle('active', b.dataset.val === selCtx));
  document.querySelectorAll('#seg-en .seg-btn').forEach(b => b.classList.toggle('active', b.dataset.val === selEn));
}

document.querySelectorAll('.segment-group').forEach(group => {
  group.onclick = e => {
    const btn = e.target.closest('.seg-btn');
    if(!btn) return;
    if(group.id === 'seg-ctx') selCtx = btn.dataset.val;
    else selEn = btn.dataset.val;
    updateSegments();
  };
});

async function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if(!title) return;
  const user = (await sb.auth.getUser()).data.user;
  const data = {
    title,
    project: document.getElementById('f-project').value.trim() || null,
    context: selCtx,
    energy: selEn,
    user_id: user.id
  };
  if(editId) await sb.from('scanner_tasks').update(data).eq('id', editId);
  else await sb.from('scanner_tasks').insert([data]);
  closeMod(); sync();
}

async function toggleDone(id) {
  await sb.from('scanner_tasks').update({ done: true, done_at: new Date() }).eq('id', id);
  sync();
}

async function deleteTask() {
  if(confirm('Видалити?')) {
    await sb.from('scanner_tasks').delete().eq('id', editId);
    closeMod(); sync();
  }
}

function closeMod() { document.getElementById('modal').style.display = 'none'; }

document.getElementById('ctx-bar').onclick = e => {
  const btn = e.target.closest('.ctx-tab');
  if(btn) {
    document.querySelectorAll('.ctx-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCtx = btn.dataset.ctx;
    render();
  }
};

function startFiveMin() {
  const inbox = tasks.filter(t => t.context === 'inbox' && !t.done);
  if(!inbox.length) return alert("Вхідні порожні!");
  openMod(inbox[Math.floor(Math.random() * inbox.length)]);
}

sync();
</script>
</body>
</html>
