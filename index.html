<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScannerPlanner PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#111; --card:#1e1e1e; --border:#2a2a2a;
  --text:#eee; --accent:#6ab05f;
}
body {margin:0;background:var(--bg);color:var(--text);font-family:sans-serif;}
.topbar{padding:10px;background:#1a1a1a;display:flex;gap:10px;}
button{cursor:pointer;}
#board{display:flex;gap:10px;padding:10px;height:calc(100vh - 60px);}
.col{flex:1;background:var(--card);padding:10px;display:flex;flex-direction:column;}
.col-body{flex:1;overflow:auto;}
.tcard{background:#2a2a2a;margin-bottom:8px;padding:10px;cursor:pointer;border-left:4px solid gray;}
.tcard[data-e=low]{border-color:#6b8f71;}
.tcard[data-e=medium]{border-color:#c9903e;}
.tcard[data-e=high]{border-color:#e05040;}
</style>
</head>

<body>

<div id="auth">
<input id="email" placeholder="email">
<input id="pass" type="password">
<button onclick="login()">login</button>
</div>

<div class="topbar">
<button onclick="runRoulette()">🎲</button>
<button onclick="toggleFocus()">🎯</button>
<button onclick="newTask()">➕</button>
</div>

<div id="board"></div>

<script>

/* CONFIG */
const sb = supabase.createClient(
  "https://mlkdphygsdfcanztbtez.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"
);

let tasks=[];
let ctx="today";
let focus=false;

/* AUTH */
async function login(){
 await sb.auth.signInWithPassword({
  email:email.value,
  password:pass.value
 });
}

sb.auth.onAuthStateChange((e,s)=>{
 if(s){
  document.getElementById("auth").style.display="none";
  sync();
 }
});

/* SMART SCORE */
function score(t){
 let s=0;
 if(t.context==="today") s+=50;
 if(t.energy==="high") s+=20;
 if(t.energy==="medium") s+=10;

 const age=(Date.now()-new Date(t.created_at))/86400000;
 s+=Math.max(0,30-age);

 return s;
}

/* SORT */
function smart(list){
 return list.sort((a,b)=>score(b)-score(a));
}

/* CACHE */
function save(){localStorage.setItem("tasks",JSON.stringify(tasks))}
function load(){
 let d=localStorage.getItem("tasks");
 if(d) tasks=JSON.parse(d);
}

/* CLEAN */
async function cleanup(){
 let stale=tasks.filter(t=>
  t.context==="inbox" &&
  Date.now()-new Date(t.created_at)>259200000
 );

 for(let t of stale){
  await sb.from("scanner_tasks")
   .update({context:"someday"})
   .eq("id",t.id);
 }

 if(stale.length) sync();
}

/* SYNC */
async function sync(){
 try{
  let {data}=await sb.from("scanner_tasks")
   .select("*")
   .order("created_at",{ascending:false});
  tasks=data||[];
  save();
 }catch{
  load();
 }

 render();
 cleanup();
}

/* RENDER */
function render(){
 let board=document.getElementById("board");
 board.innerHTML="";

 ["low","medium","high"].forEach(en=>{
  let col=document.createElement("div");
  col.className="col";

  let body=document.createElement("div");
  body.className="col-body";

  let list=tasks.filter(t=>
   t.context===ctx &&
   !t.done &&
   (t.energy||"medium")===en
  );

  if(focus){
   list=smart(list).slice(0,1);
  }

  smart(list).forEach(t=>{
   let el=document.createElement("div");
   el.className="tcard";
   el.dataset.e=t.energy||"medium";
   el.innerText=t.title;

   el.draggable=true;
   el.ondragstart=e=>e.dataTransfer.setData("id",t.id);

   el.onclick=()=>edit(t);

   body.appendChild(el);
  });

  col.ondragover=e=>e.preventDefault();
  col.ondrop=async e=>{
   let id=e.dataTransfer.getData("id");
   await sb.from("scanner_tasks")
    .update({energy:en})
    .eq("id",id);
   sync();
  };

  col.appendChild(body);
  board.appendChild(col);
 });
}

/* CRUD */
async function newTask(){
 let title=prompt("Задача?");
 if(!title) return;

 let user=(await sb.auth.getUser()).data.user;

 await sb.from("scanner_tasks").insert([{
  title,
  context:"inbox",
  energy:"medium",
  user_id:user.id
 }]);

 sync();
}

function edit(t){
 let title=prompt("Редагувати:",t.title);
 if(!title) return;

 sb.from("scanner_tasks")
  .update({title})
  .eq("id",t.id);

 sync();
}

/* DONE */
async function done(id){
 await sb.from("scanner_tasks")
  .update({done:true})
  .eq("id",id);

 sync();
}

/* FOCUS */
function toggleFocus(){
 focus=!focus;

 if(focus){
  let list=tasks.filter(t=>t.context==="today"&&!t.done);
  let best=smart(list)[0];
  if(best) alert("Фокус: "+best.title);
 }

 render();
}

/* ROULETTE */
function runRoulette(){
 let list=tasks.filter(t=>!t.done);
 if(!list.length) return;

 let pick=smart(list).slice(0,5);
 let r=pick[Math.floor(Math.random()*pick.length)];

 alert("Спробуй: "+r.title);
}

/* HOTKEYS */
document.addEventListener("keydown",e=>{
 if(e.target.tagName==="INPUT") return;

 if(e.key==="f") toggleFocus();
 if(e.key==="r") runRoulette();
 if(e.key==="n") newTask();
});

/* INIT */
document.addEventListener("DOMContentLoaded",sync);

</script>
</body>
</html>
