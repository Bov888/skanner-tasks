<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScannerPlanner v4</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: sans-serif; margin:0; background:#111; color:#eee; }
.topbar { padding:10px; background:#1a1a1a; display:flex; gap:10px; }
button { cursor:pointer; }
#board { display:flex; gap:10px; padding:10px; }
.col { flex:1; background:#1e1e1e; padding:10px; }
.tcard { background:#2a2a2a; margin-bottom:8px; padding:10px; cursor:pointer; }
</style>
</head>

<body>

<div id="auth-gate">
  <input id="email" placeholder="email">
  <input id="pass" type="password">
  <button onclick="doLogin()">login</button>
</div>

<div class="topbar">
  <button onclick="runRoulette()">🎲</button>
  <button onclick="toggleFocus()">🎯</button>
</div>

<div id="board"></div>

<script>

/* CONFIG */
const sb = supabase.createClient(
  "https://mlkdphygsdfcanztbtez.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"
);

let tasks = [];
let activeCtx = "today";
let focusMode = false;

/* AUTH */
async function doLogin() {
  await sb.auth.signInWithPassword({
    email: email.value,
    password: pass.value
  });
}

sb.auth.onAuthStateChange((e, s) => {
  if (s) {
    document.getElementById("auth-gate").style.display = "none";
    sync();
  }
});

/* SMART SCORE */
function scoreTask(t){
  let s=0;
  if(t.context==="today") s+=50;
  if(t.energy==="high") s+=20;
  if(t.energy==="medium") s+=10;

  const age=(Date.now()-new Date(t.created_at))/(86400000);
  s+=Math.max(0,30-age);

  return s;
}

/* SORT */
function smartSort(list){
  return list.sort((a,b)=>scoreTask(b)-scoreTask(a));
}

/* CLEANUP */
async function autoCleanup(){
  const stale=tasks.filter(t=>
    t.context==="inbox" &&
    Date.now()-new Date(t.created_at)>259200000
  );

  for(let t of stale){
    await sb.from("scanner_tasks")
      .update({context:"someday"})
      .eq("id",t.id);
  }

  if(stale.length) sync();
}

/* CACHE */
function saveLocal(){
  localStorage.setItem("cache",JSON.stringify(tasks));
}
function loadLocal(){
  const d=localStorage.getItem("cache");
  if(d) tasks=JSON.parse(d);
}

/* SYNC */
async function sync(){
  try{
    const {data}=await sb.from("scanner_tasks").select("*");
    tasks=data||[];
    saveLocal();
  }catch{
    loadLocal();
  }

  render();
  autoCleanup();
}

/* RENDER */
function render(){
  const board=document.getElementById("board");
  board.innerHTML="";

  let list=tasks.filter(t=>t.context===activeCtx && !t.done);

  if(focusMode){
    list=smartSort(list).slice(0,1);
  }

  smartSort(list).forEach(t=>{
    const el=document.createElement("div");
    el.className="tcard";
    el.innerText=t.title;
    el.onclick=()=>toggleDone(t.id);
    board.appendChild(el);
  });
}

/* ACTIONS */
async function toggleDone(id){
  await sb.from("scanner_tasks")
    .update({done:true})
    .eq("id",id);

  sync();
}

/* FOCUS */
function toggleFocus(){
  focusMode=!focusMode;

  if(focusMode){
    const list=tasks.filter(t=>t.context==="today" && !t.done);
    const best=smartSort(list)[0];
    if(best) alert("Фокус: "+best.title);
  }

  render();
}

/* ROULETTE */
function runRoulette(){
  const list=tasks.filter(t=>!t.done);
  if(!list.length) return;

  const pick=smartSort(list).slice(0,5);
  const r=pick[Math.floor(Math.random()*pick.length)];

  alert("Спробуй: "+r.title);
}

/* HOTKEYS */
document.addEventListener("keydown",(e)=>{
  if(e.key==="f") toggleFocus();
  if(e.key==="r") runRoulette();
});

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
  sync();
});

</script>
</body>
</html>
