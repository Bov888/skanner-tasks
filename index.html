<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ScannerPlanner v3.1</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf8; --surface: #f4f3ef; --surface2: #eceae4;
  --border: #e2e1db; --text: #1a1917; --muted: #6b6963;
  --accent: #2d5a27; --accent-light: #e8f0e6; --accent-mid: #4a8a42;
  --stale-bg: #f0f0ea;
  --e-low: #6b8f71; --e-med: #b07d3a; --e-high: #8b2010;
}
[data-theme=dark] {
  --bg: #141412; --surface: #1e1d1b; --surface2: #252422;
  --border: #2e2d2a; --text: #e8e6e0; --muted: #8a8880;
  --accent: #6ab05f; --accent-light: #1e2e1c; --accent-mid: #4a8a42;
  --e-low: #4a8a42; --e-med: #c9903e; --e-high: #e05040;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Literata', serif; font-weight: 300;
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  height: 56px; display: flex; align-items: center; padding: 0 1.5rem; gap: 1rem;
  border-bottom: 1px solid var(--border); background: var(--bg); z-index: 100;
}
.logo { font-size: 1.1rem; flex: 1; cursor: pointer; font-weight: 400; }
.logo span { color: var(--accent); font-style: italic; }

.ctrl-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  font-size: .6rem; font-family: 'JetBrains Mono', monospace; cursor: pointer;
  padding: .5rem .8rem; border-radius: 2px; text-transform: uppercase;
}
.ctrl-btn.active { background: var(--accent); color: #fff; }

/* ── NAVIGATION DROP ZONES ── */
.ctx-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); }
.ctx-tab {
  font-family: 'JetBrains Mono', monospace; font-size: .65rem; text-transform: uppercase;
  color: var(--muted); background: none; cursor: pointer; padding: 1rem 1.5rem;
  border: none; border-bottom: 2px solid transparent; transition: .2s;
  position: relative;
}
.ctx-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.ctx-tab.drag-over { background: var(--accent-light); color: var(--accent); border-bottom-color: var(--accent); }

/* ── BOARD ── */
.app-body { flex: 1; display: flex; overflow: hidden; }
#board { display: flex; width: 100%; padding: 1.5rem; gap: 1.5rem; align-items: stretch; }

.col {
  flex: 1; min-width: 280px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 4px;
  display: flex; flex-direction: column; transition: all .2s;
}
.col.drag-over { border: 1px dashed var(--accent); transform: scale(1.01); background: var(--surface2); }

.col-head { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.col-title { font-family: 'JetBrains Mono', monospace; font-size: .65rem; text-transform: uppercase; display: flex; align-items: center; gap: .5rem; }
.col-dot { width: 8px; height: 8px; border-radius: 50%; }

.col-body { flex: 1; overflow-y: auto; padding: .8rem; }

/* ── CARD ── */
.tcard {
  background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
  padding: 1rem; margin-bottom: .8rem; cursor: grab; position: relative;
}
.tcard:active { cursor: grabbing; }
/* Смужка енергії: тільки якщо атрибут існує і не пустий */
.tcard::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; display: none; }
.tcard[data-e=low]::before { background: var(--e-low); display: block; }
.tcard[data-e=medium]::before { background: var(--e-med); display: block; }
.tcard[data-e=high]::before { background: var(--e-high); display: block; }

.tc-title { font-size: .95rem; line-height: 1.4; margin-bottom: .4rem; }
.tc-meta { font-family: 'JetBrains Mono', monospace; font-size: .5rem; color: var(--muted); text-transform: uppercase; }

/* ── QUICK ADD ── */
.col-footer { padding: .8rem; border-top: 1px solid var(--border); }
.quick-in { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: .7rem; font-family: 'Literata'; font-size: .85rem; }

/* ── MODAL ── */
.modal, #auth-gate {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000;
  display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px);
}
#auth-gate { display: flex; background: var(--bg); z-index: 9999; }
.mcard { background: var(--bg); padding: 2rem; width: 100%; max-width: 400px; border: 1px solid var(--border); }
.inp { width: 100%; padding: .8rem; margin-bottom: 1rem; background: var(--surface); border: 1px solid var(--border); font-family: 'Literata'; color: var(--text); }
.pbtn { width: 100%; padding: 1rem; background: var(--accent); color: #fff; font-family: 'JetBrains Mono'; text-transform: uppercase; cursor: pointer; border: none; }
</style>
</head>
<body>

<div id="auth-gate">
  <div class="mcard">
    <div style="font-size: 1.5rem; text-align: center; margin-bottom: 1.5rem;">Scanner<span>Planner</span></div>
    <input type="email" id="email" class="inp" placeholder="Email">
    <input type="password" id="pass" class="inp" placeholder="Password">
    <button class="pbtn" onclick="doLogin()">Увійти</button>
  </div>
</div>

<header class="topbar">
  <div class="logo" onclick="location.reload()">Scanner<span>Planner</span></div>
  <div class="btn-group">
    <button class="ctrl-btn" onclick="runRoulette()">🎲 Рулетка</button>
    <button class="ctrl-btn" onclick="toggleTheme()">☾</button>
  </div>
</header>

<nav class="ctx-bar" id="ctx-bar">
  <button class="ctx-tab active" data-ctx="inbox" ondragover="tabOver(event)" ondragleave="tabLeave(event)" ondrop="tabDrop(event, 'inbox')">Вхідні <span class="badge" id="b-inbox">0</span></button>
  <button class="ctx-tab" data-ctx="today" ondragover="tabOver(event)" ondragleave="tabLeave(event)" ondrop="tabDrop(event, 'today')">Сьогодні <span class="badge" id="b-today">0</span></button>
  <button class="ctx-tab" data-ctx="waiting" ondragover="tabOver(event)" ondragleave="tabLeave(event)" ondrop="tabDrop(event, 'waiting')">Чекаю <span class="badge" id="b-waiting">0</span></button>
  <button class="ctx-tab" data-ctx="someday" ondragover="tabOver(event)" ondragleave="tabLeave(event)" ondrop="tabDrop(event, 'someday')">Колись <span class="badge" id="b-someday">0</span></button>
</nav>

<main class="app-body">
  <div id="board"></div>
</main>

<div id="modal" class="modal" onclick="if(event.target===this)closeMod()">
  <div class="mcard" id="mbody"></div>
</div>

<script>
const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co"; 
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb = supabase.createClient(SB_URL, SB_KEY);

let tasks = [];
let activeCtx = 'inbox';
let editId = null;

/* ── АВТОРИЗАЦІЯ ── */
async function doLogin() {
  const { error } = await sb.auth.signInWithPassword({ email: email.value, password: pass.value });
  if (error) alert(error.message);
}

sb.auth.onAuthStateChange((ev, sess) => {
  document.getElementById('auth-gate').style.display = sess ? 'none' : 'flex';
  if (sess) sync();
});

/* ── ДАНІ ── */
async function sync() {
  const { data } = await sb.from('scanner_tasks').select('*').order('created_at', { ascending: false });
  tasks = data || [];
  updateBadges();
  render();
}

function updateBadges() {
  ['inbox', 'today', 'waiting', 'someday'].forEach(k => {
    const count = tasks.filter(t => t.context === k && !t.done).length;
    document.getElementById('b-' + k).textContent = count;
  });
}

/* ── ТАБИ ЯК DROP-ЗОНИ ── */
function tabOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function tabLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
async function tabDrop(e, targetCtx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const id = e.dataTransfer.getData('text');
  // При дропі на таб змінюємо лише контекст, енергія залишається поточною (або null)
  await sb.from('scanner_tasks').update({ context: targetCtx }).eq('id', id);
  sync();
}

/* ── РЕНДЕР ── */
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  if (activeCtx === 'inbox') {
    const list = tasks.filter(t => t.context === 'inbox' && !t.done);
    // Для інбоксу енергія за замовчуванням - null
    board.appendChild(buildCol("Вхідні (Чисті)", list, null, 'var(--muted)'));
  } else {
    const enCfg = [
      {id: 'low', lbl: 'Низька', color: 'var(--e-low)'},
      {id: 'medium', lbl: 'Середня', color: 'var(--e-med)'},
      {id: 'high', lbl: 'Висока', color: 'var(--e-high)'}
    ];
    enCfg.forEach(en => {
      const list = tasks.filter(t => t.context === activeCtx && !t.done && (t.energy === en.id));
      board.appendChild(buildCol(en.lbl, list, en.id, en.color));
    });
  }
}

function buildCol(title, list, energyTag, dotColor) {
  const col = document.createElement('div');
  col.className = 'col';
  col.ondragover = e => e.preventDefault();
  col.ondragenter = () => col.classList.add('drag-over');
  col.ondragleave = () => col.classList.remove('drag-over');
  col.ondrop = async e => {
    col.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text');
    // При дропі в колонку оновлюємо і контекст і енергію
    await sb.from('scanner_tasks').update({ context: activeCtx, energy: energyTag }).eq('id', id);
    sync();
  };

  col.innerHTML = `
    <div class="col-head">
      <div class="col-title"><span class="col-dot" style="background:${dotColor}"></span>${title}</div>
      <div class="badge">${list.length}</div>
    </div>
    <div class="col-body"></div>
    <div class="col-footer">
      <input class="quick-in" placeholder="+ Швидко..." onkeydown="handleQuickAdd(event, '${energyTag || ''}')">
    </div>
  `;

  const body = col.querySelector('.col-body');
  list.forEach(t => body.appendChild(mkCard(t)));
  return col;
}

function mkCard(t) {
  const el = document.createElement('div');
  el.className = 'tcard';
  if (t.energy) el.dataset.e = t.energy;
  el.draggable = true;
  el.ondragstart = e => e.dataTransfer.setData('text', t.id);

  el.innerHTML = `
    <div class="tc-title">${t.title}</div>
    <div class="tc-meta">
      <span>${t.kind || 'task'}</span>
      <span style="float:right; cursor:pointer" onclick="event.stopPropagation(); toggleDone('${t.id}')">◯</span>
    </div>
  `;
  el.onclick = () => openMod(t);
  return el;
}

async function handleQuickAdd(e, energy) {
  if (e.key !== 'Enter' || !e.target.value.trim()) return;
  const user = (await sb.auth.getUser()).data.user;
  await sb.from('scanner_tasks').insert([{
    title: e.target.value.trim(),
    context: activeCtx,
    energy: energy === '' ? null : energy, // Для інбоксу буде null
    user_id: user.id
  }]);
  e.target.value = '';
  sync();
}

async function toggleDone(id) {
  await sb.from('scanner_tasks').update({ done: true, done_at: new Date() }).eq('id', id);
  sync();
}

function openMod(t) {
  editId = t?.id || null;
  const body = document.getElementById('mbody');
  document.getElementById('modal').style.display = 'flex';
  body.innerHTML = `
    <input id="m-ttl" class="inp" value="${t?.title || ''}">
    <div style="display:flex; gap:10px; margin-bottom:1rem">
      <select id="m-ctx" class="inp">${['inbox', 'today', 'waiting', 'someday'].map(k => `<option value="${k}" ${t?.context === k ? 'selected' : ''}>${k.toUpperCase()}</option>`)}</select>
      <select id="m-en" class="inp">
        <option value="" ${!t?.energy ? 'selected' : ''}>БЕЗ ЕНЕРГІЇ</option>
        <option value="low" ${t?.energy === 'low' ? 'selected' : ''}>LOW</option>
        <option value="medium" ${t?.energy === 'medium' ? 'selected' : ''}>MED</option>
        <option value="high" ${t?.energy === 'high' ? 'selected' : ''}>HIGH</option>
      </select>
    </div>
    <button class="pbtn" onclick="save()">Зберегти</button>
  `;
}

async function save() {
  const d = {
    title: document.getElementById('m-ttl').value,
    context: document.getElementById('m-ctx').value,
    energy: document.getElementById('m-en').value || null
  };
  await sb.from('scanner_tasks').update(d).eq('id', editId);
  closeMod(); sync();
}

function closeMod() { document.getElementById('modal').style.display = 'none'; }

document.getElementById('ctx-bar').onclick = e => {
  const tab = e.target.closest('.ctx-tab');
  if (!tab) return;
  document.querySelectorAll('.ctx-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeCtx = tab.dataset.ctx;
  render();
};

function toggleTheme() {
  const d = document.documentElement;
  d.dataset.theme = d.dataset.theme === 'dark' ? 'light' : 'dark';
}
</script>
</body>
</html>
