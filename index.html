<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ScannerTasks</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafaf8;--surface:#f4f3ef;--surface2:#eceae4;--border:#e2e1db;
  --text:#1a1917;--muted:#6b6963;
  --accent:#2d5a27;--accent-light:#e8f0e6;--accent-mid:#4a8a42;
  --error:#8b2010;
  --e-low:#6b8f71;--e-med:#b07d3a;--e-high:#8b2010;
  --sw:260px;
}
[data-theme=dark]{
  --bg:#141412;--surface:#1e1d1b;--surface2:#252422;--border:#2e2d2a;
  --text:#e8e6e0;--muted:#8a8880;
  --accent:#6ab05f;--accent-light:#1e2e1c;--accent-mid:#4a8a42;
  --error:#e05040;
  --e-low:#4a8a42;--e-med:#c9903e;--e-high:#e05040;
}

*{margin:0;padding:0;box-sizing:border-box;border:none;outline:none;}
html{font-size:17px;} 
body{
  background:var(--bg);color:var(--text);
  font-family:'Literata',Georgia,serif;font-weight:300;
  height:100vh;height:100dvh;overflow:hidden;
  display:flex;flex-direction:column;transition:background .3s,color .3s;
}

/* ── AUTH ── */
#auth-gate{position:fixed;inset:0;background:var(--bg);z-index:9000;
  display:none;align-items:center;justify-content:center;padding:1.5rem;}
.auth-card{background:var(--surface);padding:2.5rem;border-radius:3px;
border:1px solid var(--border);width:100%;max-width:380px;}
.auth-logo{font-family:'Literata',serif;font-size:1.5rem;font-weight:300;
  letter-spacing:-.02em;margin-bottom:2rem;text-align:center;}
.auth-logo span{color:var(--accent);font-style:italic;}

/* ── TOPBAR ── */
.topbar{
  height:54px;min-height:54px;display:flex;align-items:center;
  padding:0 1rem;gap:.6rem;
  border-bottom:1px solid var(--border);background:var(--bg);
  flex-shrink:0;z-index:300;
}
.logo-btn{
  font-family:'Literata',serif;font-size:1.15rem;font-weight:400;
  letter-spacing:-.02em;color:var(--text);
  display:flex;align-items:center;gap:.5rem;
  background:none;cursor:pointer;flex:1;min-width:0;
}
.logo-btn span{color:var(--accent);font-style:italic;}
.ibtn{
  background:none;border:1px solid var(--border);color:var(--muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:2px;flex-shrink:0;
  transition:border-color .15s,color .15s;touch-action:manipulation;
}
.ibtn:hover,.ibtn:active{border-color:var(--accent);color:var(--accent);}
.ibtn svg{width:17px;height:17px;}
.ibtn.danger:hover,.ibtn.danger:active{border-color:var(--error);color:var(--error);}

.theme-btn, .hbtn {
  height: 30px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  border-radius: 2px;
  white-space: nowrap;
  flex-shrink: 0;
  touch-action: manipulation;
  transition: all .15s;
}
.theme-btn{
  background:var(--accent-light);border:1px solid var(--accent);color:var(--accent);
  font-size:.62rem;
  padding:0 .65rem;
  letter-spacing:.06em;text-transform:uppercase;
}
.theme-btn:hover{opacity:.7;}
.hbtn{
  font-size:.58rem;
  letter-spacing:.05em;text-transform:uppercase;
  border:1px solid var(--border);color:var(--muted);
  background:none;
  padding:0 .6rem;
}
.hbtn:hover{border-color:var(--accent);color:var(--accent);}
.hbtn.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}

@media(max-width: 480px) {
  #focus-btn { font-size: 0; width: 30px; padding: 0; }
  #focus-btn::before { content: '🎯'; font-size: .8rem; }
}

#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);
  z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;
}
#overlay[data-open]{opacity:1;pointer-events:auto;}

.app-body{flex:1;display:flex;overflow:hidden;position:relative;}

#sidebar{
  width:var(--sw);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;
  transition:width .25s,border-color .25s;
}
@media(min-width:769px){
  body[data-sc] #sidebar{width:0;border-right-color:transparent;overflow:hidden;}
}
@media(max-width:768px){
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;width:min(280px,88vw)!important;
    z-index:500;transform:translateX(-110%);
    transition:transform .25s cubic-bezier(.4,0,.2,1);
  }
  body[data-sb-open] #sidebar{transform:translateX(0);}
}

.sb-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sb-title{font-family:'JetBrains Mono',monospace;font-size:.6rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.sb-close{
  background:none;border:1px solid var(--border);color:var(--muted);
  width:26px;height:26px;border-radius:2px;cursor:pointer;
  display:none;align-items:center;justify-content:center;font-size:.8rem;
  touch-action:manipulation;
}
@media(max-width:768px){.sb-close{display:flex;}}

.sb-section{padding:1rem;border-bottom:1px solid var(--border);}
.sb-section-title{
  font-family:'JetBrains Mono',monospace;font-size:.55rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  margin-bottom:.6rem;display:flex;align-items:center;justify-content:space-between;
}
.sb-clr{
  font-family:'JetBrains Mono',monospace;font-size:.5rem;
  color:var(--accent);background:none;cursor:pointer;letter-spacing:.04em;
}

.sb-chips{display:flex;flex-direction:column;gap:.3rem;}
.sb-chip{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  letter-spacing:.04em;text-transform:uppercase;
  border:1px solid var(--border);color:var(--muted);
  padding:.38rem .7rem;border-radius:2px;
  cursor:pointer;background:none;
  transition:all .15s;text-align:left;
  display:flex;align-items:center;gap:.5rem;
  touch-action:manipulation;
}
.sb-chip:hover{border-color:var(--accent);color:var(--accent);}
.sb-chip.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.sb-chip .chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sb-chip .chip-ct{flex:1;}
.sb-chip .chip-n{
  font-family:'JetBrains Mono',monospace;font-size:.5rem;
  background:var(--surface2);color:var(--muted);
  padding:.05rem .3rem;border-radius:2px;
}
.sb-chip.on .chip-n{background:var(--accent);color:#fff;}

.sb-new-proj{
  width:100%;margin-top:.4rem;padding:.35rem .7rem;
  background:none;border:1px dashed var(--border);color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:.55rem;
  letter-spacing:.04em;text-transform:uppercase;
  cursor:pointer;border-radius:2px;text-align:left;
}

.sb-actions{padding:1rem;display:flex;flex-direction:column;gap:.4rem;}
.sb-action-btn{
  width:100%;padding:.5rem .8rem;border-radius:2px;
  font-family:'JetBrains Mono',monospace;font-size:.6rem;
  font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;text-align:left;display:flex;align-items:center;gap:.5rem;
  transition:all .15s;touch-action:manipulation;
}
.sb-action-btn.primary{background:var(--accent);color:#fff;}
.sb-action-btn.secondary{background:none;border:1px solid var(--border);color:var(--muted);}
.sb-action-btn.museum-btn{background:none;border:1px solid var(--e-med);color:var(--e-med);}

.ctx-bar{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;
  overflow-x:auto;scrollbar-width:none;
}
.ctx-bar::-webkit-scrollbar{display:none;}
.ctx-tab{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);background:none;cursor:pointer;
  padding:.7rem 1.2rem;border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;white-space:nowrap;
  flex-shrink:0;display:flex;align-items:center;gap:.35rem;
}
.ctx-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.ctx-tab.dov{background:var(--accent-light);border-bottom-color:var(--accent);}
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;padding:0 3px;
  background:var(--surface);color:var(--muted);border-radius:8px;
  font-size:.5rem;border:1px solid var(--border);
}
.ctx-tab.active .badge{background:var(--accent-light);color:var(--accent);border-color:var(--accent);}

#main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#board{
  flex:1;display:flex;padding:1.2rem;gap:1rem;
  overflow-x:auto;overflow-y:hidden;align-items:stretch; 
}
@media(max-width:700px){
  #board{flex-direction:column;overflow-x:hidden;overflow-y:auto;padding:.9rem;gap:.8rem;}
}

.col{
  flex:1;min-width:260px;
  background:var(--surface);border:1px solid var(--border);border-radius:3px;
  display:flex;flex-direction:column;max-height:100%;
}
.col.dov{border-color:var(--accent);background:var(--accent-light);}
.col.someday-grid .col-body {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: .6rem; padding: .8rem; align-content: start;
}

.col-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.7rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;
}
.col-title{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:.45rem;
}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.col-count{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted);}
.col-body{flex:1;overflow-y:auto;padding:.5rem;}
.col-footer{padding:.45rem .5rem;border-top:1px solid var(--border);flex-shrink:0;}
.quick-inp{
  width:100%;padding:.45rem .7rem;
  background:var(--bg);color:var(--text);
  border:1px solid var(--border);border-radius:2px;
  font-family:'Literata',Georgia,serif;font-size:.9rem;
}

.done-row{
  display:flex;align-items:center;gap:.4rem;
  padding:.4rem 1rem;border-top:1px solid var(--border);
  cursor:pointer;flex-shrink:0;
}
.done-row-lbl{font-family:'JetBrains Mono',monospace;font-size:.52rem;
  letter-spacing:.08em;text-transform:uppercase;color:var(--muted);flex:1;}
.done-row-arr{font-size:.55rem;color:var(--muted);transition:transform .2s;}
.done-row.open .done-row-arr{transform:rotate(90deg);}
.done-section{display:none;padding:.4rem .5rem;max-height:180px;overflow-y:auto;}
.done-row.open+.done-section{display:block;}

.tcard{
  background:var(--bg);border:1px solid var(--border);border-radius:3px;
  padding:.7rem .85rem .7rem .95rem;margin-bottom:.35rem;
  cursor:pointer;position:relative;
  transition:border-color .15s,transform .1s;
  touch-action:none;user-select:none;
}
.tcard:hover{border-color:var(--accent-mid);transform:translateY(-1px);}
.tcard::before{
  content:'';position:absolute;left:0;top:4px;bottom:4px;
  width:3px;border-radius:0 2px 2px 0;background:var(--border);
}
.tcard[data-e=low]::before{background:var(--e-low);}
.tcard[data-e=medium]::before{background:var(--e-med);}
.tcard[data-e=high]::before{background:var(--e-high);}
.tcard.done-card{opacity:.45;background:var(--surface);}
.tcard.done-card .tc-title{text-decoration:line-through;}
.tcard.dragging{opacity:.3;transform:scale(.97);}

.tc-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.3rem;}
.tc-cb{
  width:18px;height:18px;min-width:18px;
  border:1px solid var(--border);border-radius:2px;
  background:none;cursor:pointer;display:flex;align-items:center;
  justify-content:center;margin-top:2px;flex-shrink:0;font-size:.6rem;
}
.tcard.done-card .tc-cb{background:var(--accent);border-color:var(--accent);color:#fff;}
.tc-title{
  font-family:'Literata',Georgia,serif;font-size:.95rem;font-weight:300;
  line-height:1.4;flex:1;word-break:break-word;
}
.tc-meta{
  font-family:'JetBrains Mono',monospace;font-size:.52rem;
  color:var(--muted);text-transform:uppercase;letter-spacing:.04em;
  display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.3rem;
}
.tc-proj{background:var(--accent-light);color:var(--accent);padding:.1rem .38rem;border-radius:2px;}
.tc-note{font-family:'Literata',serif;font-size:.8rem;color:var(--muted);font-style:italic;line-height:1.4;margin-bottom:.3rem;}
.tc-ctx-btns{display:flex;gap:.25rem;flex-wrap:wrap;margin-top:.3rem;}
.tc-ctx-btn{
  font-family:'JetBrains Mono',monospace;font-size:.46rem;
  letter-spacing:.04em;text-transform:uppercase;
  background:none;border:1px solid var(--border);color:var(--muted);
  cursor:pointer;padding:.1rem .35rem;border-radius:2px;
}
.tc-timer-btn{color:var(--accent);border-color:var(--accent);}

body.focus-mode .tcard:not(.focus-match){opacity:0.15;pointer-events:none;filter:blur(1px) grayscale(100%);}

#museum-view{flex:1;overflow-y:auto;padding:1.5rem;display:none;}
.museum-month{margin-bottom:2.5rem;}
.museum-month-ttl{
  font-family:'Literata',serif;font-size:1.4rem;font-weight:300;
  letter-spacing:-.02em;color:var(--e-med);margin-bottom:.8rem;
  display:flex;align-items:baseline;gap:.7rem;
}
.museum-card{
  background:var(--surface);border:1px solid var(--border);border-radius:3px;
  padding:.65rem 1rem;margin-bottom:.3rem;
  position:relative;display:flex;align-items:center;gap:.7rem;
}
.museum-card::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--e-med);opacity:.35;}

#timer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:7000;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px);
}
.timer-card{background:var(--bg);padding:2.5rem;width:90%;max-width:440px;text-align:center;border-radius:3px;}
.timer-display{font-family:'JetBrains Mono',monospace;font-size:4rem;color:var(--accent);margin-bottom:.5rem;}
.timer-progress{height:3px;background:var(--border);margin-bottom:1.5rem;overflow:hidden;}
.timer-progress-bar{height:100%;background:var(--accent);}

/* ── FAB (Зелений квадрат) ── */
#fab {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  width: 48px; height: 48px; border-radius: 2px;
  background: var(--accent); color: #fff;
  cursor: pointer; z-index: 500;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(0,0,0,.18);
}
#fab::before { content: '＋'; font-size: 1.8rem; }

.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:8000;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:1.5rem;
}
.mcard{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:2rem;width:100%;max-width:440px;}
.inp{
  width:100%;padding:.56rem .85rem;margin-bottom:.75rem;border-radius:2px;
  background:var(--surface);color:var(--text);border:1px solid var(--border);
  font-family:'Literata',serif;font-size:.92rem;
}
.seg{display:flex;gap:.4rem;margin-bottom:.75rem;flex-wrap:wrap;}
.seg-btn{
  flex:1;min-width:58px;padding:.45rem .3rem;border-radius:2px;
  border:1px solid var(--border);background:none;color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:.53rem;text-transform:uppercase;
}
.seg-btn.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.pbtn{
  padding:.56rem 1rem;border-radius:2px;background:var(--accent);
  color:#fff;font-family:'JetBrains Mono',monospace;font-size:.62rem;cursor:pointer;
}
.pbtn.secondary { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

.drag-ghost{
  position:fixed;pointer-events:none;z-index:9999;
  background:var(--accent);color:#fff;border-radius:3px;padding:5px 10px;
  font-family:'JetBrains Mono',monospace;font-size:.65rem;
}
</style>
</head>
<body data-sc>

<div id="auth-gate">
  <div class="auth-card">
    <div class="auth-logo">Scanner<span>Tasks</span></div>
    <input type="email" id="email" class="inp" placeholder="Email">
    <input type="password" id="pass" class="inp" placeholder="Пароль">
    <button class="pbtn" style="width:100%" onclick="doLogin()">Увійти</button>
    <p id="auth-err" class="aerr"></p>
  </div>
</div>

<div id="overlay"></div>

<div id="timer-overlay">
  <div class="timer-card">
    <div id="timer-task-ttl" style="margin-bottom:1rem">—</div>
    <div class="timer-display" id="timer-display">25:00</div>
    <div class="timer-progress"><div class="timer-progress-bar" id="timer-bar" style="width:100%"></div></div>
    <button class="timer-btn primary pbtn" id="timer-start-btn" onclick="timerToggle()">▶ Старт</button>
    <button class="timer-btn pbtn secondary" onclick="timerClose()">✕</button>
  </div>
</div>

<header class="topbar">
  <button class="ibtn" id="menu-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
  <button class="logo-btn" onclick="location.reload()">Scanner<span>Tasks</span></button>
  <button class="hbtn" id="focus-btn" onclick="toggleFocus()">🎯 Фокус</button>
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☾ тема</button>
  <button class="ibtn danger" id="btn-logout">✕</button>
</header>

<nav class="ctx-bar" id="ctx-bar">
  <button class="ctx-tab active" data-ctx="inbox">Вхідні<span class="badge" id="b-inbox">0</span></button>
  <button class="ctx-tab" data-ctx="today">Сьогодні<span class="badge" id="b-today">0</span></button>
  <button class="ctx-tab" data-ctx="waiting">Чекаю<span class="badge" id="b-waiting">0</span></button>
  <button class="ctx-tab" data-ctx="someday">Колись<span class="badge" id="b-someday">0</span></button>
</nav>

<div class="app-body">
  <aside id="sidebar">
    <div class="sb-header"><span class="sb-title">Фільтри</span><button class="sb-close" id="sb-close">✕</button></div>
    <div class="sb-section">
      <div class="sb-section-title">Енергія</div>
      <div class="sb-chips" id="e-chips">
        <button class="sb-chip on" data-e="all" onclick="setEFilter(this,'all')">Всі</button>
        <button class="sb-chip" data-e="low" onclick="setEFilter(this,'low')">🌿 Низька</button>
        <button class="sb-chip" data-e="medium" onclick="setEFilter(this,'medium')">⚡ Середня</button>
        <button class="sb-chip" data-e="high" onclick="setEFilter(this,'high')">🔥 Висока</button>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-section-title">Проєкти</div>
      <div class="sb-chips" id="p-chips"><button class="sb-chip on" onclick="setPFilter('all')">Всі проєкти</button></div>
      <button class="sb-new-proj" onclick="promptNewProject()">+ Новий проєкт</button>
    </div>
    <div class="sb-actions">
      <button class="sb-action-btn primary" onclick="sbAction(()=>openMod(null))">Нова задача</button>
      <button class="sb-action-btn secondary" onclick="sbAction(runQuickWin)">⚡ Швидка перемога</button>
      <button class="sb-action-btn secondary" onclick="sbAction(exportData)">💾 Експорт JSON</button>
      <button class="sb-action-btn museum-btn" onclick="sbAction(()=>switchCtx('museum'))">🏛 Музей успіхів</button>
    </div>
  </aside>
  <div id="main-area">
    <div id="board"><p class="ldg">Завантаження...</p></div>
    <div id="museum-view"></div>
  </div>
</div>

<button id="fab" onclick="openMod(null)"></button>

<div id="modal" class="modal" onclick="if(event.target===this)closeMod()">
  <div class="mcard" id="mbody"></div>
</div>

<script>
const SB_URL="https://mlkdphygsdfcanztbtez.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb=supabase.createClient(SB_URL,SB_KEY);

let tasks=[];
let activeCtx='inbox';
let energyFilter='all';
let projectFilter='all';
let focusMode=false;
let editId=null;

const CTXS={
  inbox:  {lbl:'Вхідні',   dot:'var(--muted)'},
  today:  {lbl:'Сьогодні', dot:'var(--accent)'},
  waiting:{lbl:'Чекаю',    dot:'var(--e-med)'},
  someday:{lbl:'Колись',   dot:'var(--muted)'},
};

const KINDS=[
  {id:'task',    icon:'☐', lbl:'Задача'},
  {id:'project', icon:'🎯',lbl:'Проєкт'},
  {id:'interest',icon:'✦', lbl:'Інтерес'},
  {id:'zone',    icon:'◎', lbl:'Зона'},
];
const ENERGIES=[
  {id:'low',   icon:'🌿',lbl:'Низька'},
  {id:'medium',icon:'⚡',lbl:'Середня'},
  {id:'high',  icon:'🔥',lbl:'Висока'},
];
const UA_MONTHS=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const kIcon=k=>KINDS.find(x=>x.id===k)?.icon||'☐';
const getProjects=()=>[...new Set(tasks.filter(t=>t.project).map(t=>t.project))].sort();

function initTheme(){
  const t=localStorage.getItem('st-theme')||'light';
  document.documentElement.dataset.theme=t;
}
function toggleTheme(){
  const n=document.documentElement.dataset.theme==='dark'?'light':'dark';
  document.documentElement.dataset.theme=n;
  localStorage.setItem('st-theme',n);
}

async function doLogin(){
  const{error}=await sb.auth.signInWithPassword({email:email.value,password:pass.value});
  if(error)auth-err.textContent=error.message;
}
sb.auth.onAuthStateChange((ev,sess)=>{
  document.getElementById('auth-gate').style.display=sess?'none':'flex';
  if(sess)sync();
});

async function sync(){
  const{data}=await sb.from('scanner_tasks').select('*').order('created_at',{ascending:false});
  tasks=data||[];
  updateBadges();
  renderProjectChips();
  render();
}

function updateBadges(){
  Object.keys(CTXS).forEach(k=>{
    const c=tasks.filter(t=>t.context===k&&!t.done).length;
    const el=document.getElementById('b-'+k);
    if(el)el.textContent=c;
  });
}

function renderProjectChips(){
  const projs=getProjects();
  const container=document.getElementById('p-chips');
  container.innerHTML='<button class="sb-chip on" onclick="setPFilter(\'all\')">Всі проєкти</button>';
  projs.forEach(p=>{
    const b=document.createElement('button');
    b.className='sb-chip';
    b.textContent=p;
    b.onclick=()=>setPFilter(p);
    container.appendChild(b);
  });
}

function setPFilter(p){ projectFilter=p; render(); }
function setEFilter(btn,e){ energyFilter=e; render(); }

function switchCtx(ctx){ activeCtx=ctx; render(); }

function runQuickWin(){
  const pool=tasks.filter(t=>!t.done && (t.energy==='low' || t.context==='someday'));
  if(!pool.length){alert("Немає задач для швидкої перемоги.");return;}
  openMod(pool[Math.floor(Math.random()*pool.length)]);
}

function exportData(){
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tasks));
  const dl = document.createElement('a');
  dl.setAttribute("href", dataStr);
  dl.setAttribute("download", "tasks.json");
  dl.click();
}

function render(){
  const board=document.getElementById('board');
  const museum=document.getElementById('museum-view');
  if(activeCtx==='museum'){
    board.style.display='none'; museum.style.display='block';
    renderMuseum(); return;
  }
  board.style.display='flex'; museum.style.display='none';
  board.innerHTML='';

  let visible=tasks.filter(t=>!t.done&&t.context===activeCtx);
  if(energyFilter!=='all')visible=visible.filter(t=>t.energy===energyFilter);
  if(projectFilter!=='all')visible=visible.filter(t=>t.project===projectFilter);

  if(activeCtx==='someday'){
    board.appendChild(buildCol('Ідеї','var(--muted)',null,visible,[]));
  } else {
    ENERGIES.forEach(en=>{
      const list=visible.filter(t=>t.energy===en.id);
      board.appendChild(buildCol(en.lbl, 'var(--accent)', en.id, list, []));
    });
  }
}

function buildCol(title,color,energy,list,doneList){
  const col=document.createElement('div'); col.className='col';
  col.innerHTML=`<div class="col-head"><div class="col-title">${title}</div></div><div class="col-body"></div>`;
  const body=col.querySelector('.col-body');
  list.forEach(t=>body.appendChild(mkCard(t)));
  return col;
}

function mkCard(t){
  const el=document.createElement('div'); el.className='tcard'+(t.done?' done-card':'');
  el.dataset.e=t.energy;
  el.innerHTML=`<div class="tc-row"><div class="tc-title">${t.title}</div></div>`;
  el.onclick=()=>openMod(t);
  return el;
}

function openMod(t=null){
  editId=t?.id;
  document.getElementById('modal').style.display='flex';
  const body=document.getElementById('mbody');
  body.innerHTML=`
    <div style="margin-bottom:1rem">${t?'Редагувати':'Нова'} задача</div>
    <input id="m-ttl" class="inp" value="${t?.title||''}" placeholder="Назва">
    <textarea id="m-note" class="inp" placeholder="Нотатки">${t?.note||''}</textarea>
    <select id="m-ctx" class="inp">
      ${Object.entries(CTXS).map(([k,v])=>`<option value="${k}" ${t?.context===k?'selected':''}>${v.lbl}</option>`).join('')}
    </select>
    <div style="display:flex; gap:.5rem">
      <button class="pbtn" style="flex:2" onclick="saveTask()">Зберегти</button>
      <button class="pbtn secondary" style="flex:1" onclick="closeMod()">Відмінити</button>
    </div>`;
}

function closeMod(){ document.getElementById('modal').style.display='none'; }

async function saveTask(){
  const user=(await sb.auth.getUser()).data.user;
  const d={
    title:document.getElementById('m-ttl').value,
    note:document.getElementById('m-note').value,
    context:document.getElementById('m-ctx').value,
    user_id:user.id
  };
  if(editId) await sb.from('scanner_tasks').update(d).eq('id',editId);
  else await sb.from('scanner_tasks').insert([d]);
  closeMod(); sync();
}

function sbAction(fn){ fn(); }
function toggleFocus(){ focusMode=!focusMode; document.body.classList.toggle('focus-mode'); }
initTheme();
</script>
</body>
