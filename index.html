<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ScannerTasks</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/*
  SQL для Supabase (виконати один раз):
  CREATE TABLE IF NOT EXISTS scanner_tasks (
    id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id uuid REFERENCES auth.users(id),
    title text NOT NULL,
    note text,
    context text DEFAULT 'inbox',
    project text,
    energy text DEFAULT 'medium',
    kind text DEFAULT 'task',
    done boolean DEFAULT false,
    done_at timestamptz,
    created_at timestamptz DEFAULT now()
  );
  ALTER TABLE scanner_tasks ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "own" ON scanner_tasks FOR ALL USING (auth.uid()=user_id);
  ALTER TABLE scanner_tasks ADD COLUMN IF NOT EXISTS project text;
*/

:root{
  --bg:#fafaf8;--surface:#f4f3ef;--surface2:#eceae4;--border:#e2e1db;
  --text:#1a1917;--muted:#6b6963;
  --accent:#2d5a27;--accent-light:#e8f0e6;--accent-mid:#4a8a42;
  --error:#8b2010;
  --e-low:#6b8f71;--e-med:#b07d3a;--e-high:#8b2010;
  --sw:260px;
}
[data-theme=dark]{
  --bg:#141412;--surface:#1e1d1b;--surface2:#252422;--border:#2e2d2a;
  --text:#e8e6e0;--muted:#8a8880;
  --accent:#6ab05f;--accent-light:#1e2e1c;--accent-mid:#4a8a42;
  --error:#e05040;
  --e-low:#4a8a42;--e-med:#c9903e;--e-high:#e05040;
}

*{margin:0;padding:0;box-sizing:border-box;border:none;outline:none;}
html{font-size:17px;} 
body{
  background:var(--bg);color:var(--text);
  font-family:'Literata',Georgia,serif;font-weight:300;
  height:100vh;height:100dvh;overflow:hidden;
  display:flex;flex-direction:column;transition:background .3s,color .3s;
}

/* ── AUTH ── */
#auth-gate{position:fixed;inset:0;background:var(--bg);z-index:9000;
  display:none;align-items:center;justify-content:center;padding:1.5rem;}
.auth-card{background:var(--surface);padding:2.5rem;border-radius:3px;
border:1px solid var(--border);width:100%;max-width:380px;}
.auth-logo{font-family:'Literata',serif;font-size:1.5rem;font-weight:300;
  letter-spacing:-.02em;margin-bottom:2rem;text-align:center;}
.auth-logo span{color:var(--accent);font-style:italic;}

/* ── TOPBAR ── */
.topbar{
  height:54px;min-height:54px;display:flex;align-items:center;
  padding:0 1rem;gap:.6rem;
  border-bottom:1px solid var(--border);background:var(--bg);
  flex-shrink:0;z-index:300;
}
.logo-btn{
  font-family:'Literata',serif;font-size:1.15rem;font-weight:400;
  letter-spacing:-.02em;color:var(--text);
  display:flex;align-items:center;gap:.5rem;
  background:none;cursor:pointer;flex:1;min-width:0;
}
.logo-btn span{color:var(--accent);font-style:italic;}
.ibtn{
  background:none;border:1px solid var(--border);color:var(--muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:2px;flex-shrink:0;
  transition:border-color .15s,color .15s;touch-action:manipulation;
}
.ibtn:hover,.ibtn:active{border-color:var(--accent);color:var(--accent);}
.ibtn svg{width:17px;height:17px;}
.ibtn.danger:hover,.ibtn.danger:active{border-color:var(--error);color:var(--error);}
.theme-btn{
  background:var(--accent-light);border:1px solid var(--accent);color:var(--accent);
  font-size:.62rem;font-family:'JetBrains Mono',monospace;
  cursor:pointer;padding:.32rem .65rem;border-radius:2px;
  letter-spacing:.06em;text-transform:uppercase;
  white-space:nowrap;flex-shrink:0;touch-action:manipulation;
}
.theme-btn:hover{opacity:.7;}
.hbtn{
  font-family:'JetBrains Mono',monospace;font-size:.58rem;
  letter-spacing:.05em;text-transform:uppercase;
  border:1px solid var(--border);color:var(--muted);
  background:none;cursor:pointer;padding:.32rem .6rem;
  border-radius:2px;white-space:nowrap;flex-shrink:0;
  transition:all .15s;touch-action:manipulation;
}
.hbtn:hover{border-color:var(--accent);color:var(--accent);}
.hbtn.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}

@media(max-width: 480px) {
  #focus-btn {
    font-size: 0; 
    padding: .4rem; 
  }
  #focus-btn::before {
    content: '🎯';
    font-size: .8rem;
  }
}

/* ── OVERLAY ── */
#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);
  z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;
}
#overlay[data-open]{opacity:1;pointer-events:auto;}

/* ══ LAYOUT ══ */
.app-body{flex:1;display:flex;overflow:hidden;position:relative;}

/* ── SIDEBAR (фільтри) ── */
#sidebar{
  width:var(--sw);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;
  transition:width .25s,border-color .25s;
}
@media(min-width:769px){
  body[data-sc] #sidebar{width:0;border-right-color:transparent;overflow:hidden;}
}
@media(max-width:768px){
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;width:min(280px,88vw)!important;
    z-index:500;transform:translateX(-110%);
    transition:transform .25s cubic-bezier(.4,0,.2,1);
  }
  body[data-sb-open] #sidebar{transform:translateX(0);}
}

.sb-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sb-title{font-family:'JetBrains Mono',monospace;font-size:.6rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.sb-close{
  background:none;border:1px solid var(--border);color:var(--muted);
  width:26px;height:26px;border-radius:2px;cursor:pointer;
  display:none;align-items:center;justify-content:center;font-size:.8rem;
  touch-action:manipulation;
}
@media(max-width:768px){.sb-close{display:flex;}}
.sb-close:active{border-color:var(--accent);color:var(--accent);}

.sb-section{padding:1rem;border-bottom:1px solid var(--border);}
.sb-section-title{
  font-family:'JetBrains Mono',monospace;font-size:.55rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  margin-bottom:.6rem;display:flex;align-items:center;justify-content:space-between;
}
.sb-clr{
  font-family:'JetBrains Mono',monospace;font-size:.5rem;
  color:var(--accent);background:none;cursor:pointer;letter-spacing:.04em;
  touch-action:manipulation;
}

/* Filter chips у sidebar */
.sb-chips{display:flex;flex-direction:column;gap:.3rem;}
.sb-chip{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  letter-spacing:.04em;text-transform:uppercase;
  border:1px solid var(--border);color:var(--muted);
  padding:.38rem .7rem;border-radius:2px;
  cursor:pointer;background:none;
  transition:all .15s;text-align:left;
  display:flex;align-items:center;gap:.5rem;
  touch-action:manipulation;
}
.sb-chip:hover{border-color:var(--accent);color:var(--accent);}
.sb-chip.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.sb-chip .chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sb-chip .chip-ct{flex:1;}
.sb-chip .chip-n{
  font-family:'JetBrains Mono',monospace;font-size:.5rem;
  background:var(--surface2);color:var(--muted);
  padding:.05rem .3rem;border-radius:2px;
}
.sb-chip.on .chip-n{background:var(--accent);color:#fff;}

/* Секція проектів */
.sb-new-proj{
  width:100%;margin-top:.4rem;padding:.35rem .7rem;
  background:none;border:1px dashed var(--border);color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:.55rem;
  letter-spacing:.04em;text-transform:uppercase;
  cursor:pointer;border-radius:2px;text-align:left;
  transition:all .15s;touch-action:manipulation;
}
.sb-new-proj:hover{border-color:var(--accent);color:var(--accent);}

/* Кнопки дій у sidebar */
.sb-actions{padding:1rem;display:flex;flex-direction:column;gap:.4rem;}
.sb-action-btn{
  width:100%;padding:.5rem .8rem;border-radius:2px;
  font-family:'JetBrains Mono',monospace;font-size:.6rem;
  font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;text-align:left;display:flex;align-items:center;gap:.5rem;
  transition:all .15s;touch-action:manipulation;
}
.sb-action-btn.primary{background:var(--accent);color:#fff;border:none;}
.sb-action-btn.primary:hover{opacity:.85;}
.sb-action-btn.secondary{background:none;border:1px solid var(--border);color:var(--muted);}
.sb-action-btn.secondary:hover{border-color:var(--accent);color:var(--accent);}
.sb-action-btn.museum-btn{background:none;border:1px solid var(--e-med);color:var(--e-med);}
.sb-action-btn.museum-btn:hover{background:#fdf3e7;}

/* ── CONTEXT TABS (тепер горизонтальні вгорі) ── */
.ctx-bar{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;
  overflow-x:auto;scrollbar-width:none;
}
.ctx-bar::-webkit-scrollbar{display:none;}
.ctx-tab{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);background:none;cursor:pointer;
  padding:.7rem 1.2rem;border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;white-space:nowrap;
  flex-shrink:0;display:flex;align-items:center;gap:.35rem;
  touch-action:manipulation;
}
.ctx-tab:hover{color:var(--accent);}
.ctx-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.ctx-tab.dov{background:var(--accent-light);border-bottom-color:var(--accent);}
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;padding:0 3px;
  background:var(--surface);color:var(--muted);border-radius:8px;
  font-size:.5rem;border:1px solid var(--border);
}
.ctx-tab.active .badge{background:var(--accent-light);color:var(--accent);border-color:var(--accent);}

/* ── MAIN AREA ── */
#main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ── BOARD ── */
#board{
  flex:1;display:flex;padding:1.2rem;gap:1rem;
  overflow-x:auto;overflow-y:hidden;align-items:stretch; /* Виправлено для розтягування */
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
@media(max-width:700px){
  #board{flex-direction:column;overflow-x:hidden;overflow-y:auto;padding:.9rem;gap:.8rem;}
}

/* ── COLUMN ── */
.col{
  flex:1;min-width:260px;
  background:var(--surface);border:1px solid var(--border);border-radius:3px;
  display:flex;flex-direction:column;max-height:100%;
  transition:border-color .15s,background .15s;
}
.col.dov{border-color:var(--accent);background:var(--accent-light);}
@media(max-width:700px){.col{flex:none;width:100%;min-width:0;max-height:none;}}

.col-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.7rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;
}
.col-title{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:.45rem;
}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.col-count{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted);}
.col-body{flex:1;overflow-y:auto;padding:.5rem;}
.col-footer{padding:.45rem .5rem;border-top:1px solid var(--border);flex-shrink:0;}
.quick-inp{
  width:100%;padding:.45rem .7rem;
  background:var(--bg);color:var(--text);
  border:1px solid var(--border);border-radius:2px;
  font-family:'Literata',Georgia,serif;font-size:.9rem;font-weight:300;
  transition:border-color .15s;
}
.quick-inp:focus{border-color:var(--accent);}
.quick-inp::placeholder{color:var(--muted);}

.done-row{
  display:flex;align-items:center;gap:.4rem;
  padding:.4rem 1rem;border-top:1px solid var(--border);
  cursor:pointer;flex-shrink:0;user-select:none;
}
.done-row-lbl{font-family:'JetBrains Mono',monospace;font-size:.52rem;
  letter-spacing:.08em;text-transform:uppercase;color:var(--muted);flex:1;}
.done-row-arr{font-size:.55rem;color:var(--muted);transition:transform .2s;}
.done-row.open .done-row-arr{transform:rotate(90deg);}
.done-section{display:none;padding:.4rem .5rem;max-height:180px;overflow-y:auto;}
.done-row.open+.done-section{display:block;}

/* ── TASK CARD ── */
.tcard{
  background:var(--bg);border:1px solid var(--border);border-radius:3px;
  padding:.7rem .85rem .7rem .95rem;margin-bottom:.35rem;
  cursor:pointer;position:relative;
  transition:border-color .15s,transform .1s, opacity .2s, filter .2s;
  touch-action:none;user-select:none;
}
.tcard:hover{border-color:var(--accent-mid);transform:translateY(-1px);}
.tcard::before{
  content:'';position:absolute;left:0;top:4px;bottom:4px;
  width:3px;border-radius:0 2px 2px 0;background:var(--border);
}
.tcard[data-e=low]::before{background:var(--e-low);}
.tcard[data-e=medium]::before{background:var(--e-med);}
.tcard[data-e=high]::before{background:var(--e-high);}
.tcard.stale{opacity:.55;border-style:dashed;}
.tcard.done-card{opacity:.45;background:var(--surface);}
.tcard.done-card .tc-title{text-decoration:line-through;color:var(--muted);}
.tcard.done-card::before{background:var(--border)!important;}
.tcard.dragging{opacity:.3;transform:scale(.97);}

.tc-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.3rem;}
.tc-cb{
  width:18px;height:18px;min-width:18px;
  border:1px solid var(--border);border-radius:2px;
  background:none;cursor:pointer;display:flex;align-items:center;
  justify-content:center;margin-top:2px;flex-shrink:0;
  transition:all .15s;touch-action:manipulation;font-size:.6rem;
}
.tc-cb:hover{border-color:var(--accent);}
.tcard.done-card .tc-cb{background:var(--accent);border-color:var(--accent);color:#fff;}
.tc-title{
  font-family:'Literata',Georgia,serif;font-size:.95rem;font-weight:300;
  line-height:1.4;flex:1;word-break:break-word;
}
.tc-meta{
  font-family:'JetBrains Mono',monospace;font-size:.52rem;
  color:var(--muted);text-transform:uppercase;letter-spacing:.04em;
  display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.3rem;
}
.tc-proj{
  background:var(--accent-light);color:var(--accent);
  padding:.1rem .38rem;border-radius:2px;letter-spacing:.03em;
}
.tc-note{
  font-family:'Literata',serif;font-size:.8rem;color:var(--muted);
  font-style:italic;line-height:1.4;margin-bottom:.3rem;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.tc-ctx-btns{display:flex;gap:.25rem;flex-wrap:wrap;margin-top:.3rem;}
.tc-ctx-btn{
  font-family:'JetBrains Mono',monospace;font-size:.46rem;
  letter-spacing:.04em;text-transform:uppercase;
  background:none;border:1px solid var(--border);color:var(--muted);
  cursor:pointer;padding:.1rem .35rem;border-radius:2px;
  transition:all .15s;touch-action:manipulation;
}
.tc-ctx-btn:hover{border-color:var(--accent);color:var(--accent);}
.tc-timer-btn{color:var(--accent);border-color:var(--accent);}

/* Focus mode (оновлено) */
body.focus-mode .tcard:not(.focus-match){
  opacity:0.15;
  pointer-events:none;
  filter:blur(1px) grayscale(100%);
}
body.focus-mode .done-row,
body.focus-mode .done-section {
  display:none; /* Ховаємо завершені у фокусі */
}

/* ── МУЗЕЙ ── */
#museum-view{flex:1;overflow-y:auto;padding:1.5rem;display:none;}
.museum-month{margin-bottom:2.5rem;}
.museum-month-ttl{
  font-family:'Literata',serif;font-size:1.4rem;font-weight:300;
  letter-spacing:-.02em;color:var(--e-med);margin-bottom:.8rem;
  display:flex;align-items:baseline;gap:.7rem;
}
.museum-month-ttl small{
  font-family:'JetBrains Mono',monospace;font-size:.55rem;
  color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-weight:400;
}
.museum-card{
  background:var(--surface);border:1px solid var(--border);border-radius:3px;
  padding:.65rem 1rem .65rem 1.1rem;margin-bottom:.3rem;
  position:relative;display:flex;align-items:center;gap:.7rem;
  cursor:pointer;transition:border-color .15s;
}
.museum-card:hover{border-color:var(--border);}
.museum-card::before{
  content:'';position:absolute;left:0;top:4px;bottom:4px;
  width:3px;border-radius:0 2px 2px 0;background:var(--e-med);opacity:.35;
}
.museum-card-kind{font-size:.8rem;opacity:.45;flex-shrink:0;}
.museum-card-ttl{font-size:.9rem;font-weight:300;flex:1;color:var(--muted);}
.museum-card-proj{font-family:'JetBrains Mono',monospace;font-size:.48rem;
  background:var(--accent-light);color:var(--accent);padding:.08rem .3rem;border-radius:2px;}
.museum-card-date{font-family:'JetBrains Mono',monospace;font-size:.5rem;
  color:var(--muted);letter-spacing:.04em;white-space:nowrap;}
.museum-empty{text-align:center;padding:4rem 1rem;
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);line-height:2;}

/* ── POMODORO TIMER ── */
#timer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:7000;
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);
}
.timer-card{
  background:var(--bg);border:1px solid var(--border);border-radius:3px;
  padding:2.5rem;width:90%;max-width:440px;text-align:center;
}
.timer-label{font-family:'JetBrains Mono',monospace;font-size:.58rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
.timer-task-ttl{
  font-family:'Literata',serif;font-size:1.15rem;font-weight:300;
  line-height:1.4;margin-bottom:1.2rem;color:var(--text);
}
.timer-display{
  font-family:'JetBrains Mono',monospace;font-size:4rem;
  color:var(--accent);letter-spacing:.08em;margin-bottom:.5rem;
}
.timer-display.urgent{color:var(--e-high);}
.timer-progress{
  height:3px;background:var(--border);border-radius:2px;
  margin-bottom:1.5rem;overflow:hidden;
}
.timer-progress-bar{height:100%;background:var(--accent);transition:width 1s linear;}
/* Налаштування */
.timer-settings{
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  margin-bottom:1.5rem;flex-wrap:wrap;
}
.timer-preset{
  font-family:'JetBrains Mono',monospace;font-size:.55rem;
  letter-spacing:.06em;text-transform:uppercase;
  border:1px solid var(--border);color:var(--muted);
  background:none;cursor:pointer;padding:.3rem .6rem;border-radius:2px;
  transition:all .15s;touch-action:manipulation;
}
.timer-preset:hover{border-color:var(--accent);color:var(--accent);}
.timer-preset.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.timer-inp{
  width:55px;padding:.3rem .4rem;text-align:center;
  background:var(--surface);color:var(--text);border:1px solid var(--border);
  border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:.72rem;
}
.timer-btn-row{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;}
.timer-btn{
  font-family:'JetBrains Mono',monospace;font-size:.6rem;
  letter-spacing:.08em;text-transform:uppercase;
  border:1px solid var(--border);color:var(--muted);
  background:none;cursor:pointer;padding:.45rem .9rem;border-radius:2px;
  transition:all .15s;touch-action:manipulation;
}
.timer-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.timer-btn:hover{border-color:var(--accent);color:var(--accent);}
.timer-btn.primary:hover{opacity:.85;}

/* ── FAB (Нова задача - оновлено) ── */
#fab {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  padding: .75rem 1.4rem;
  border-radius: 3px;
  background: var(--bg);
  color: var(--accent);
  border: 1px solid var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: .65rem;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;

.done-toggle-wrap input:checked+.dttrack{background:var(--accent);}

<script>
const SB_URL="https://mlkdphygsdfcanztbtez.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb=supabase.createClient(SB_URL,SB_KEY);

let tasks=[];
let activeCtx='inbox';
let energyFilter='all';
let projectFilter='all';
let focusMode=false;
let editId=null;
const CTXS={
  inbox:  {lbl:'Вхідні',   dot:'var(--muted)'},
  today:  {lbl:'Сьогодні', dot:'var(--accent)'},
  waiting:{lbl:'Чекаю',    dot:'var(--e-med)'},
  someday:{lbl:'Колись',   dot:'var(--muted)'},
};
const KINDS=[
  {id:'task',    icon:'☐', lbl:'Задача'},
  {id:'project', icon:'🎯',lbl:'Проєкт'},
  {id:'interest',icon:'✦', lbl:'Інтерес'},
  {id:'zone',    icon:'◎', lbl:'Зона'},
];
const ENERGIES=[
  {id:'low',   icon:'🌿',lbl:'Низька'},
  {id:'medium',icon:'⚡',lbl:'Середня'},
  {id:'high',  icon:'🔥',lbl:'Висока'},
];
const UA_MONTHS=['Січень','Лютий','Березень','Квітень','Травень','Червень',
  'Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const kIcon=k=>KINDS.find(x=>x.id===k)?.icon||'☐';
const getProjects=()=>[...new Set(tasks.filter(t=>t.project).map(t=>t.project))].sort();

/* ── THEME ── */
function initTheme(){
  const t=localStorage.getItem('st-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.dataset.theme=t;
  document.getElementById('theme-btn').textContent=t==='dark'?'☀ тема':'☾ тема';
}
function toggleTheme(){
  const n=document.documentElement.dataset.theme==='dark'?'light':'dark';
  document.documentElement.dataset.theme=n;
  localStorage.setItem('st-theme',n);
  document.getElementById('theme-btn').textContent=n==='dark'?'☀ тема':'☾ тема';
}

/* ── AUTH ── */
async function doLogin(){
  const{error}=await sb.auth.signInWithPassword({email:email.value,password:pass.value});
  if(error)document.getElementById('auth-err').textContent='Помилка: '+error.message;
}
document.getElementById('btn-logout').addEventListener('click',async()=>{
  await sb.auth.signOut();location.reload();
});
sb.auth.onAuthStateChange((ev,sess)=>{
  document.getElementById('auth-gate').style.display=sess?'none':'flex';
  if(sess)sync();
  initTheme();
});

/* ── DATA ── */
async function sync(){
  const{data}=await sb.from('scanner_tasks').select('*').order('created_at',{ascending:false});
  tasks=data||[];
  updateBadges();
  renderProjectChips();
  render();
}
function updateBadges(){
  Object.keys(CTXS).forEach(k=>{
    const c=tasks.filter(t=>t.context===k&&!t.done).length;
    const el=document.getElementById('b-'+k);
    if(el)el.textContent=c;
  });
}

/* ── SIDEBAR ── */
const SB_EL=document.getElementById('sidebar');
const OVL=document.getElementById('overlay');
const isMob=()=>innerWidth<=768;

function openSB(){
  if(isMob()){SB_EL.style.transform='translateX(0)';OVL.setAttribute('data-open','');}
  else{document.body.removeAttribute('data-sc');}
}
function closeSB(){
  if(isMob()){SB_EL.style.transform='';OVL.removeAttribute('data-open');}
  else{document.body.setAttribute('data-sc','');}
}
function toggleSB(){
  if(isMob()) SB_EL.style.transform?closeSB():openSB();
  else document.body.hasAttribute('data-sc')?openSB():closeSB();
}
function sbAction(fn){
  if(isMob()){closeSB();setTimeout(fn,270);}
  else fn();
}

document.getElementById('menu-btn').addEventListener('click',e=>{e.stopPropagation();toggleSB();});
document.getElementById('sb-close').addEventListener('click',closeSB);
OVL.addEventListener('click',closeSB);

/* ── PROJECT CHIPS ── */
function renderProjectChips(){
  const projs=getProjects();
  const container=document.getElementById('p-chips');
  container.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.className='sb-chip'+(projectFilter==='all'?' on':'');
  allBtn.dataset.p='all';allBtn.onclick=()=>setPFilter('all');
  allBtn.innerHTML=`<span class="chip-ct">Всі проєкти</span><span class="chip-n">${tasks.filter(t=>!t.done).length}</span>`;
  container.appendChild(allBtn);

  projs.forEach(p=>{
    const cnt=tasks.filter(t=>t.project===p&&!t.done).length;
    const b=document.createElement('button');
    b.className='sb-chip'+(projectFilter===p?' on':'');
    b.dataset.p=p;b.onclick=()=>setPFilter(p);
    b.innerHTML=`<span class="chip-dot" style="background:var(--accent);opacity:.5"></span>
      <span class="chip-ct">${p}</span><span class="chip-n">${cnt}</span>`;
    container.appendChild(b);
  });
  document.getElementById('p-clr-btn').style.display=projectFilter!=='all'?'':'none';
}

function setPFilter(val){
  projectFilter=val;
  document.querySelectorAll('#p-chips .sb-chip').forEach(b=>b.classList.toggle('on',b.dataset.p===val));
  document.getElementById('p-clr-btn').style.display=val!=='all'?'':'none';
  render();
}

async function promptNewProject(){
  const name=prompt('Назва нового проєкту:');
  if(!name?.trim())return;

  const user=(await sb.auth.getUser()).data.user;
  await sb.from('scanner_tasks').insert([{
    title:'Перша задача проєкту '+name.trim(),
    project:name.trim(),context:'inbox',energy:'medium',
    kind:'task',user_id:user.id
  }]);
  sync();
}

/* ── ENERGY FILTER ── */
function setEFilter(btn,val){
  energyFilter=val;
  document.querySelectorAll('#e-chips .sb-chip').forEach(b=>b.classList.toggle('on',b.dataset.e===val));
  document.getElementById('e-clr-btn').style.display=val!=='all'?'':'none';
  render();
}
function clearEFilter(){setEFilter(document.querySelector('#e-chips .sb-chip[data-e=all]'),'all');}

/* ── CTX SWITCH ── */
function switchCtx(ctx){
  activeCtx=ctx;
  document.querySelectorAll('.ctx-tab').forEach(t=>t.classList.toggle('active',t.dataset.ctx===ctx));
  render();
}
document.getElementById('ctx-bar').addEventListener('click',e=>{
  const tab=e.target.closest('.ctx-tab');
  if(!tab)return;
  switchCtx(tab.dataset.ctx);
});

/* Desktop drop на таби */
document.querySelectorAll('.ctx-tab[data-ctx]').forEach(tab=>{
  if(tab.dataset.ctx==='museum')return;
  tab.addEventListener('dragover',e=>{e.preventDefault();tab.classList.add('dov');});
  tab.addEventListener('dragleave',()=>tab.classList.remove('dov'));
  tab.addEventListener('drop',async e=>{
    e.preventDefault();tab.classList.remove('dov');
    const id=e.dataTransfer.getData('tid');
    if(id){await sb.from('scanner_tasks').update({context:tab.dataset.ctx}).eq('id',id);sync();}
  });
});

/* ── FOCUS ── */
function toggleFocus(){
  focusMode=!focusMode;
  document.getElementById('focus-btn').classList.toggle('on',focusMode);
  document.body.classList.toggle('focus-mode',focusMode);
  render();
}

/* ── ROULETTE ── */
function runRoulette(){
  const pool=tasks.filter(t=>t.context==='someday'&&!t.done);
  if(!pool.length){alert("Немає задач у 'Колись' для рулетки");return;}
  openMod(pool[Math.floor(Math.random()*pool.length)]);
}

/* ═══════════════════════════════════════════════
   POMODORO TIMER
═══════════════════════════════════════════════ */
let timerInterval=null;
let timerTotal=25*60;
let timerLeft=timerTotal;
let timerRunning=false;
let timerTaskId=null;

function setTimerPreset(btn,minutes){
  document.querySelectorAll('.timer-preset').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('timer-custom').value=minutes;
  const wasRunning=timerRunning;
  if(wasRunning){clearInterval(timerInterval);timerRunning=false;}
  timerTotal=minutes*60;timerLeft=timerTotal;
  updateTimerDisplay();
  if(wasRunning){
    document.getElementById('timer-start-btn').textContent='▶ Старт';
  }
}
function setTimerCustom(val){
  const m=Math.max(1,Math.min(99,parseInt(val)||25));
  document.querySelectorAll('.timer-preset').forEach(b=>b.classList.remove('on'));
  timerTotal=m*60;timerLeft=timerTotal;
  updateTimerDisplay();
}
function updateTimerDisplay(){
  const m=Math.floor(timerLeft/60),s=timerLeft%60;
  const el=document.getElementById('timer-display');
  el.textContent=`${m}:${String(s).padStart(2,'0')}`;
  el.className='timer-display'+(timerLeft<=60?' urgent':'');
  const pct=timerTotal>0?(timerLeft/timerTotal*100):100;
  document.getElementById('timer-bar').style.width=pct+'%';
}
function timerToggle(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('timer-start-btn').textContent='▶ Продовжити';
  } else {
    timerRunning=true;
    document.getElementById('timer-start-btn').textContent='⏸ Пауза';
    timerInterval=setInterval(()=>{
      if(timerLeft<=0){
        clearInterval(timerInterval);timerRunning=false;
        document.getElementById('timer-start-btn').textContent='✓ Час!';
        if(navigator.vibrate)navigator.vibrate([300,100,300,100,300]);
        if(Notification.permission==='granted'){
          new Notification('ScannerTasks 🍅',{
            body:'Час вийшов! '+document.getElementById('timer-task-ttl').textContent,
            icon:'/favicon.ico'
          });
        }
        return;
      }
      timerLeft--;updateTimerDisplay();
    },1000);
  }
}
async function timerDone(){
  clearInterval(timerInterval);timerRunning=false;
  if(timerTaskId){
    await sb.from('scanner_tasks').update({done:true,done_at:new Date().toISOString()}).eq('id',timerTaskId);
    sync();
  }
  timerClose();
}
function timerClose(){
  clearInterval(timerInterval);timerRunning=false;
  document.getElementById('timer-overlay').style.display='none';
}
function startTimer(task=null){
  if(!task){
    const pool=tasks.filter(t=>!t.done&&t.context!=='someday');
    if(!pool.length){alert("Немає активних задач");return;}
    task=pool[Math.floor(Math.random()*pool.length)];
  }
  timerTaskId=task.id;
  timerLeft=timerTotal;timerRunning=false;
  document.getElementById('timer-task-ttl').textContent=task.title;
  document.getElementById('timer-start-btn').textContent='▶ Старт';
  updateTimerDisplay();
  document.getElementById('timer-overlay').style.display='flex';
  if(Notification.permission==='default')Notification.requestPermission();
}

/* ══ DRAG & DROP ══ */
let D={on:false,drag:false,id:null,ghost:null,tgt:null,x0:0,y0:0,lbl:'',ht:null};

function mkDrag(el,taskId,label){
  el.draggable=true;
  el.ondragstart=e=>e.dataTransfer.setData('tid',taskId);
  el.addEventListener('pointerdown',e=>{
    if(e.pointerType==='mouse'||!e.isPrimary)return;
    D={on:true,drag:false,id:taskId,ghost:null,tgt:null,x0:e.clientX,y0:e.clientY,lbl:label,
      ht:setTimeout(()=>{
        if(!D.on)return;
        D.drag=true;
        try{el.setPointerCapture(e.pointerId);}catch(_){}
        el.classList.add('dragging');
        const g=document.createElement('div');
        g.className='drag-ghost';g.textContent=D.lbl;
        g.style.left=D.x0+'px';g.style.top=D.y0+'px';
        document.body.appendChild(g);D.ghost=g;
        if(navigator.vibrate)navigator.vibrate(28);
      },400)
    };
  });
  el.addEventListener('pointermove',e=>{
    if(!D.on||e.pointerType==='mouse'||!e.isPrimary)return;
    if(!D.drag&&Math.hypot(e.clientX-D.x0,e.clientY-D.y0)>8){
      clearTimeout(D.ht);D.on=false;return;
    }
    if(!D.drag)return;
    e.preventDefault();
    D.ghost.style.left=e.clientX+'px';D.ghost.style.top=e.clientY+'px';
    D.ghost.style.visibility='hidden';
    const un=document.elementFromPoint(e.clientX,e.clientY);
    D.ghost.style.visibility='visible';
    const nc=un?.closest('.col[data-energy]');
    const nt2=un?.closest('.ctx-tab[data-ctx]');
    const newTgt=nc||nt2||null;
    if(D.tgt!==newTgt){D.tgt?.classList.remove('dov');newTgt?.classList.add('dov');D.tgt=newTgt;}
  },{passive:false});
  el.addEventListener('pointerup',async e=>{
    clearTimeout(D.ht);el.classList.remove('dragging');
    if(!D.on||e.pointerType==='mouse'||!e.isPrimary){D.on=false;return;}
    D.ghost?.remove();D.tgt?.classList.remove('dov');
    if(D.drag&&D.id&&D.tgt){
      e.preventDefault();
      const tgt=D.tgt;
      if(tgt.classList.contains('col')&&tgt.dataset.energy!==undefined){
        await sb.from('scanner_tasks').update({context:activeCtx,energy:tgt.dataset.energy||'medium'}).eq('id',D.id);sync();
      } else if(tgt.classList.contains('ctx-tab')&&tgt.dataset.ctx){
        await sb.from('scanner_tasks').update({context:tgt.dataset.ctx}).eq('id',D.id);sync();
      }
    }
    D={on:false,drag:false,id:null,ghost:null,tgt:null,x0:0,y0:0,lbl:'',ht:null};
  });
  el.addEventListener('pointercancel',()=>{
    clearTimeout(D.ht);el.classList.remove('dragging');
    D.ghost?.remove();D.tgt?.classList.remove('dov');
    D={on:false,drag:false,id:null,ghost:null,tgt:null,x0:0,y0:0,lbl:'',ht:null};
  });
}

/* ── RENDER ── */
function render(){
  const board=document.getElementById('board');
  const museum=document.getElementById('museum-view');

  if(activeCtx==='museum'){
    board.style.display='none';museum.style.display='block';
    renderMuseum();return;
  }
  board.style.display='flex';museum.style.display='none';
  board.innerHTML='';

  let visible=tasks.filter(t=>!t.done&&t.context===activeCtx);
  if(energyFilter!=='all')visible=visible.filter(t=>(t.energy||'medium')===energyFilter);
  if(projectFilter!=='all')visible=visible.filter(t=>t.project===projectFilter);

  if(activeCtx==='inbox'){
    const done=tasks.filter(t=>t.done&&t.context==='inbox');
    board.appendChild(buildCol('Вхідні','var(--muted)',null,visible,done));
  } else {
    ENERGIES.forEach(en=>{
      if(energyFilter!=='all'&&energyFilter!==en.id)return;
      const list=visible.filter(t=>(t.energy||'medium')===en.id);
      const done=tasks.filter(t=>t.done&&t.context===activeCtx&&(t.energy||'medium')===en.id);
      const c=en.id==='low'?'var(--e-low)':en.id==='medium'?'var(--e-med)':'var(--e-high)';
      board.appendChild(buildCol(en.icon+' '+en.lbl,c,en.id,list,done));
    });
  }

  /* Focus mode (оновлено) */
  if(focusMode){
    document.querySelectorAll('.tcard').forEach(c=>{
      const isDone = c.classList.contains('done-card');
      const isTask = c.dataset.kind==='task';
      c.classList.toggle('focus-match', isTask && !isDone);
    });
  }
}

function buildCol(title,color,energy,list,doneList){
  const col=document.createElement('div');
  col.className='col';
  if(energy!==null)col.dataset.energy=energy||'';
  col.addEventListener('dragover',e=>e.preventDefault());
  col.addEventListener('drop',async e=>{
    const id=e.dataTransfer.getData('tid');
    if(!id)return;
    const upd={context:activeCtx};
    if(energy!==null)upd.energy=energy||'medium';
    await sb.from('scanner_tasks').update(upd).eq('id',id);sync();
  });

  const head=document.createElement('div');head.className='col-head';
  head.innerHTML=`<div class="col-title"><span class="col-dot" style="background:${color}"></span>${title}</div>
    <span class="col-count">${list.length}</span>`;
  col.appendChild(head);
  const body=document.createElement('div');body.className='col-body';

  if(!list.length){
    body.innerHTML=`<div class="empty"><span style="font-size:1.5rem;opacity:.2">✓</span><span class="empty-lbl">Порожньо</span></div>`;
  } else {
    list.forEach(t=>body.appendChild(mkCard(t)));
  }
  col.appendChild(body);
  const footer=document.createElement('div');footer.className='col-footer';

  const qi=document.createElement('input');
  qi.className='quick-inp';qi.placeholder='+ Швидко (Enter)...';
  qi.addEventListener('keydown',async ev=>{
    if(ev.key!=='Enter'||!qi.value.trim())return;
    const user=(await sb.auth.getUser()).data.user;
    await sb.from('scanner_tasks').insert([{
      title:qi.value.trim(),context:activeCtx,
      energy:energy||'medium',user_id:user.id,
      project:projectFilter!=='all'?projectFilter:null
    }]);
    qi.value='';sync();
  });

  footer.appendChild(qi);col.appendChild(footer);
  if(doneList.length){
    const dr=document.createElement('div');dr.className='done-row';
    dr.innerHTML=`<span class="done-row-lbl">Завершені (${doneList.length})</span><span class="done-row-arr">▶</span>`;
    dr.onclick=()=>dr.classList.toggle('open');
    const ds=document.createElement('div');ds.className='done-section';
    doneList.forEach(t=>ds.appendChild(mkCard(t,true)));
    col.appendChild(dr);col.appendChild(ds);
  }
  return col;
}

function mkCard(t,isDone=false){
  const age=(Date.now()-new Date(t.created_at))/86400000;
  const isStale=t.context==='inbox'&&age>3&&!t.done;
  const el=document.createElement('div');
  el.className='tcard'+(t.done?' done-card':'')+(isStale?' stale':'');
  if(t.energy&&!t.done)el.dataset.e=t.energy;
  el.dataset.kind=t.kind||'task';
  const row=document.createElement('div');row.className='tc-row';
  const cb=document.createElement('div');cb.className='tc-cb';
  if(t.done)cb.textContent='✓';

  cb.addEventListener('click',e=>{e.stopPropagation();toggleDone(t);});
  const ttl=document.createElement('div');ttl.className='tc-title';
  ttl.textContent=t.title+(isStale?' 🕸️':'');
  row.appendChild(cb);row.appendChild(ttl);el.appendChild(row);
  const meta=document.createElement('div');meta.className='tc-meta';
  meta.innerHTML=`<span>${kIcon(t.kind||'task')} ${KINDS.find(k=>k.id===t.kind)?.lbl||'Задача'}</span>`;
  if(t.project){const pb=document.createElement('span');pb.className='tc-proj';pb.textContent=t.project;meta.appendChild(pb);}
  el.appendChild(meta);

  if(t.note){const ns=document.createElement('div');ns.className='tc-note';ns.textContent=t.note;el.appendChild(ns);}
  if(!t.done){
    const ctxBtns=document.createElement('div');ctxBtns.className='tc-ctx-btns';
    Object.entries(CTXS).filter(([k])=>k!==t.context).forEach(([k,v])=>{
      const b=document.createElement('button');b.className='tc-ctx-btn';
      b.textContent='→ '+v.lbl;
      b.addEventListener('click',ev=>{ev.stopPropagation();moveCtx(t,k);});
      ctxBtns.appendChild(b);
    });

    const tb=document.createElement('button');
    tb.className='tc-ctx-btn tc-timer-btn';tb.textContent='🍅';
    tb.title='Запустити таймер';
    tb.addEventListener('click',ev=>{ev.stopPropagation();startTimer(t);});
    ctxBtns.appendChild(tb);
    el.appendChild(ctxBtns);
  }
  el.addEventListener('click',()=>openMod(t));
  if(!t.done)mkDrag(el,t.id,t.title);
  return el;
}

/* ── МУЗЕЙ ── */
function renderMuseum(){
  const view=document.getElementById('museum-view');
  view.innerHTML='';
  const done=tasks.filter(t=>t.done).sort((a,b)=>new Date(b.done_at)-new Date(a.done_at));

  if(!done.length){
    view.innerHTML=`<div class="museum-empty">🏛<br><br>Тут з'являться твої завершені задачі.<br>Кожне завершення — це досвід, не просто галочка.</div>`;
    return;
  }
  const byMonth={};
  done.forEach(t=>{
    const d=new Date(t.done_at||t.created_at);
    const key=`${d.getFullYear()}-${d.getMonth()}`;
    if(!byMonth[key])byMonth[key]={year:d.getFullYear(),month:d.getMonth(),tasks:[]};
    byMonth[key].tasks.push(t);
  });

  Object.values(byMonth).forEach(({year,month,tasks:mt})=>{
    const sec=document.createElement('div');sec.className='museum-month';
    const ttl=document.createElement('div');ttl.className='museum-month-ttl';
    ttl.innerHTML=`${UA_MONTHS[month]} <small>${year} · ${mt.length} завершено</small>`;
    sec.appendChild(ttl);
    mt.forEach(t=>{
      const d=new Date(t.done_at||t.created_at);
      const card=document.createElement('div');card.className='museum-card';
      card.title='Клік — повернути до активних';
      card.innerHTML=`<span class="museum-card-kind">${kIcon(t.kind)}</span>
        <span class="museum-card-ttl">${t.title}</span>
        ${t.project?`<span class="museum-card-proj">${t.project}</span>`:''}
        <span class="museum-card-date">${d.getDate()} ${UA_MONTHS[d.getMonth()].slice(0,3).toLowerCase()}</span>`;
      card.onclick=()=>toggleDone(t);
      sec.appendChild(card);
    });
    view.appendChild(sec);
  });
}

/* ── ACTIONS ── */
async function toggleDone(t){
  const done=!t.done;
  await sb.from('scanner_tasks').update({done,done_at:done?new Date().toISOString():null}).eq('id',t.id);
  sync();
}
async function moveCtx(t,ctx){
  await sb.from('scanner_tasks').update({context:ctx}).eq('id',t.id);sync();
}

/* ── MODAL ── */
function openMod(t=null){
  editId=t?.id??null;
  const body=document.getElementById('mbody');
  document.getElementById('modal').style.display='flex';
  const knd=t?.kind||'task',en=t?.energy||'medium';
  const projs=getProjects();
  const projOpts=['<option value="">— без проєкту —</option>',
    ...projs.map(p=>`<option${t?.project===p?' selected':''}>${p}</option>`)].join('');

  body.innerHTML=`
    <div class="mttl">${t?'Редагувати':'Нова'} задача</div>
    <label class="ilbl">Назва</label>
    <input id="m-ttl" class="inp" value="${(t?.title||'').replace(/"/g,'&quot;')}" placeholder="Що зробити?">
    <label class="ilbl">Нотатка</label>
    <textarea id="m-note" class="inp" placeholder="Деталі, посилання, думки...">${t?.note||''}</textarea>
    <label class="ilbl">Тип</label>
    <div class="seg" id="seg-k">
      ${KINDS.map(k=>`<button type="button" class="seg-btn${knd===k.id?' on':''}" data-v="${k.id}" onclick="segSel('seg-k','m-kind',this)">
        <span class="si">${k.icon}</span>${k.lbl}</button>`).join('')}
    </div>
    <input type="hidden" id="m-kind" value="${knd}">
    <label class="ilbl">Енергія</label>
    <div class="seg" id="seg-e">
      ${ENERGIES.map(e=>`<button type="button" class="seg-btn${en===e.id?' on':''}" data-v="${e.id}" data-e="${e.id}" onclick="segSel('seg-e','m-energy',this)">
        <span class="si">${e.icon}</span>${e.lbl}</button>`).join('')}
    </div>
    <input type="hidden" id="m-energy" value="${en}">
    <div class="form-row">
      <div>
        <label class="ilbl">Контекст</label>
        <select id="m-ctx" class="inp">
          ${Object.entries(CTXS).map(([k,v])=>`<option value="${k}"${(t?.context||activeCtx)===k?' selected':''}>${v.lbl}</option>`).join('')}
        </select>
      </div>
      <div>
        <label class="ilbl">Проєкт</label>
        <select id="m-proj" class="inp">${projOpts}</select>
        <input id="m-proj-new" class="inp" style="margin-top:.35rem;font-family:'JetBrains Mono',monospace;font-size:.7rem;" placeholder="або введи новий...">
      </div>
    </div>
    ${t?`<label class="done-toggle-wrap"><input type="checkbox" id="m-done" ${t.done?'checked':''}>
      <span class="dttrack"></span><span class="dtlbl">Завершено</span></label>`:''}
    <button class="pbtn" onclick="saveTask()">Зберегти</button>
    ${t?`<button class="delbtn" onclick="delTask('${t.id}')">Видалити задачу</button>`:''}`;
  setTimeout(()=>document.getElementById('m-ttl')?.focus(),40);
}
function segSel(segId,hidId,btn){
  document.getElementById(segId).querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');document.getElementById(hidId).value=btn.dataset.v;
}
function closeMod(){document.getElementById('modal').style.display='none';editId=null;}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeMod();timerClose();}});

async function saveTask(){
  const ttlEl=document.getElementById('m-ttl');
  if(!ttlEl?.value?.trim()){ttlEl?.focus();return;}
  const user=(await sb.auth.getUser()).data.user;

  const projNew=(document.getElementById('m-proj-new')?.value||'').trim();
  const projSel=document.getElementById('m-proj')?.value||'';
  const project=projNew||projSel||null;
  const done=document.getElementById('m-done')?.checked||false;
  const d={
    title:ttlEl.value.trim(),
    note:document.getElementById('m-note')?.value?.trim()||null,
    kind:document.getElementById('m-kind')?.value||'task',
    energy:document.getElementById('m-energy')?.value||'medium',
    context:document.getElementById('m-ctx')?.value||'inbox',
    project,done,done_at:done?new Date().toISOString():null,user_id:user.id,
  };

  const{error}=editId
    ?await sb.from('scanner_tasks').update(d).eq('id',editId)
    :await sb.from('scanner_tasks').insert([d]);
  if(error){alert('Помилка: '+error.message);return;}
  closeMod();sync();
}
async function delTask(id){
  if(!confirm('Видалити задачу?'))return;
  await sb.from('scanner_tasks').delete().eq('id',id);closeMod();sync();
}

initTheme();
</script>
