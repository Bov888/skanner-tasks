<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScannerPlanner v5 PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ==== ТВОЇ СТИЛІ (НЕ ЧІПАВ) ==== */
:root {
  --bg: #141412;
  --surface: #1e1d1b;
  --border: #2e2d2a;
  --text: #e8e6e0;
  --muted: #8a8880;
  --accent: #6ab05f;
  --e-low: #4a8a42;
  --e-med: #c9903e;
  --e-high: #e05040;
}

body {
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family: system-ui;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* TOPBAR */
.topbar {
  height:56px;
  display:flex;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid var(--border);
  gap:10px;
}

.ctrl-btn {
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--muted);
  padding:6px 10px;
  cursor:pointer;
}
.ctrl-btn.active {
  background:var(--accent);
  color:#fff;
}

/* NAV */
.ctx-bar {
  display:flex;
  border-bottom:1px solid var(--border);
}
.ctx-tab {
  padding:10px 15px;
  cursor:pointer;
  color:var(--muted);
}
.ctx-tab.active {
  color:var(--accent);
}

/* BOARD */
#board {
  flex:1;
  display:flex;
  gap:20px;
  padding:20px;
}

.col {
  flex:1;
  background:var(--surface);
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

.col-head {
  padding:10px;
  border-bottom:1px solid var(--border);
}

.col-body {
  flex:1;
  overflow:auto;
  padding:10px;
}

.col-footer {
  padding:10px;
  border-top:1px solid var(--border);
}

.quick {
  width:100%;
  padding:8px;
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--text);
}

/* CARD */
.tcard {
  background:var(--bg);
  border:1px solid var(--border);
  padding:10px;
  margin-bottom:8px;
  cursor:pointer;
}
.tcard[data-e=low]{border-left:3px solid var(--e-low);}
.tcard[data-e=medium]{border-left:3px solid var(--e-med);}
.tcard[data-e=high]{border-left:3px solid var(--e-high);}
</style>
</head>

<body>

<header class="topbar">
  <button class="ctrl-btn" onclick="runRoulette()">🎲</button>
  <button class="ctrl-btn" id="focusBtn" onclick="toggleFocus()">🎯</button>
</header>

<nav class="ctx-bar">
  <div class="ctx-tab active" data-ctx="inbox">Inbox</div>
  <div class="ctx-tab" data-ctx="today">Today</div>
  <div class="ctx-tab" data-ctx="waiting">Waiting</div>
  <div class="ctx-tab" data-ctx="someday">Someday</div>
</nav>

<div id="board"></div>

<script>

/* CONFIG */
const sb = supabase.createClient(
  "https://mlkdphygsdfcanztbtez.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"
);

let tasks=[];
let activeCtx="inbox";
let focus=false;

/* SMART SCORE */
function score(t){
 let s=0;
 if(t.context==="today") s+=50;
 if(t.energy==="high") s+=20;
 if(t.energy==="medium") s+=10;
 const age=(Date.now()-new Date(t.created_at))/86400000;
 s+=Math.max(0,30-age);
 return s;
}
function smart(list){
 return list.sort((a,b)=>score(b)-score(a));
}

/* CACHE */
function save(){localStorage.setItem("cache",JSON.stringify(tasks));}
function load(){let d=localStorage.getItem("cache"); if(d) tasks=JSON.parse(d);}

/* CLEAN */
async function cleanup(){
 let stale=tasks.filter(t=>t.context==="inbox" && Date.now()-new Date(t.created_at)>259200000);
 for(let t of stale){
  await sb.from("scanner_tasks").update({context:"someday"}).eq("id",t.id);
 }
 if(stale.length) sync();
}

/* SYNC */
async function sync(){
 try{
  let {data}=await sb.from("scanner_tasks").select("*").order("created_at",{ascending:false});
  tasks=data||[];
  save();
 }catch{load();}
 render();
 cleanup();
}

/* RENDER */
function render(){
 const board=document.getElementById("board");
 board.innerHTML="";

 if(activeCtx==="inbox"){
  buildColumn("Inbox", tasks.filter(t=>t.context==="inbox"&&!t.done));
 } else {
  ["low","medium","high"].forEach(e=>{
    buildColumn(e, tasks.filter(t=>t.context===activeCtx&&!t.done&&(t.energy||"medium")===e));
  });
 }
}

function buildColumn(title,list){
 const col=document.createElement("div");
 col.className="col";

 col.innerHTML=`
   <div class="col-head">${title}</div>
   <div class="col-body"></div>
   <div class="col-footer">
     <input class="quick" placeholder="+ додати..." onkeydown="quickAdd(event)">
   </div>
 `;

 const body=col.querySelector(".col-body");

 if(focus){
  list=smart(list).slice(0,1);
 }

 smart(list).forEach(t=>{
  const el=document.createElement("div");
  el.className="tcard";
  el.dataset.e=t.energy||"medium";
  el.innerText=t.title;

  el.onclick=()=>toggleDone(t.id);

  body.appendChild(el);
 });

 board.appendChild(col);
}

/* ADD */
async function quickAdd(e){
 if(e.key!=="Enter") return;
 let val=e.target.value.trim();
 if(!val) return;

 let user=(await sb.auth.getUser()).data.user;

 await sb.from("scanner_tasks").insert([{
  title:val,
  context:activeCtx,
  energy:"medium",
  user_id:user.id
 }]);

 e.target.value="";
 sync();
}

/* DONE */
async function toggleDone(id){
 await sb.from("scanner_tasks").update({done:true}).eq("id",id);
 sync();
}

/* FOCUS */
function toggleFocus(){
 focus=!focus;
 document.getElementById("focusBtn").classList.toggle("active",focus);
 render();
}

/* ROULETTE */
function runRoulette(){
 let list=tasks.filter(t=>!t.done);
 if(!list.length) return;
 let top=smart(list).slice(0,5);
 let r=top[Math.floor(Math.random()*top.length)];
 alert(r.title);
}

/* NAV */
document.querySelectorAll(".ctx-tab").forEach(tab=>{
 tab.onclick=()=>{
  document.querySelectorAll(".ctx-tab").forEach(t=>t.classList.remove("active"));
  tab.classList.add("active");
  activeCtx=tab.dataset.ctx;
  render();
 };
});

/* HOTKEYS */
document.addEventListener("keydown",e=>{
 if(e.target.tagName==="INPUT") return;
 if(e.key==="f") toggleFocus();
 if(e.key==="r") runRoulette();
});

/* INIT */
document.addEventListener("DOMContentLoaded",sync);

</script>
</body>
</html>
