<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ScannerPlanner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── ЗМІННІ ТА ТЕМИ ── */
:root {
  --bg: #fafaf8; --surface: #f4f3ef; --surface2: #eceae4;
  --border: #e2e1db; --text: #1a1917; --muted: #6b6963;
  --accent: #2d5a27; --accent-light: #e8f0e6; --accent-mid: #4a8a42;
  --stale-bg: #f0f0ea;
  --e-low: #6b8f71; --e-med: #b07d3a; --e-high: #8b2010;
}
[data-theme=dark] {
  --bg: #141412; --surface: #1e1d1b; --surface2: #252422;
  --border: #2e2d2a; --text: #e8e6e0; --muted: #8a8880;
  --accent: #6ab05f; --accent-light: #1e2e1c; --accent-mid: #4a8a42;
  --stale-bg: #1a1a18;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Literata', Georgia, serif; font-weight: 300;
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}

/* ── ВЕРХНЯ ПАНЕЛЬ ── */
.topbar {
  height: 56px; display: flex; align-items: center; padding: 0 1.5rem; gap: 1rem;
  border-bottom: 1px solid var(--border); background: var(--bg); z-index: 100;
}
.logo { font-family: 'Literata', serif; font-size: 1.2rem; flex: 1; cursor: pointer; }
.logo span { color: var(--accent); font-style: italic; }

.btn-group { display: flex; gap: .5rem; }
.ctrl-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  font-size: .6rem; font-family: 'JetBrains Mono', monospace; cursor: pointer;
  padding: .5rem .8rem; border-radius: 2px; text-transform: uppercase;
}
.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
.ctrl-btn.active { background: var(--accent); color: #fff; }

/* ── НАВІГАЦІЯ ── */
.ctx-bar { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.ctx-tab {
  font-family: 'JetBrains Mono', monospace; font-size: .65rem; text-transform: uppercase;
  color: var(--muted); background: none; cursor: pointer; padding: 1rem 1.5rem;
  border: none; border-bottom: 2px solid transparent; transition: .2s;
}
.ctx-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.badge { margin-left: .5rem; font-size: .5rem; opacity: .6; }

/* ── ДОШКА ── */
.app-body { flex: 1; display: flex; overflow: hidden; }
#board {
  display: flex; width: 100%; padding: 1.5rem; gap: 1.5rem; align-items: stretch;
}

.col {
  flex: 1; min-width: 300px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 4px;
  display: flex; flex-direction: column; transition: background .2s;
}
.col.drag-over { background: var(--surface2); border-color: var(--accent); }

.col-head { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.col-title { font-family: 'JetBrains Mono', monospace; font-size: .65rem; text-transform: uppercase; display: flex; align-items: center; gap: .5rem; }
.col-dot { width: 8px; height: 8px; border-radius: 50%; }

.col-body { flex: 1; overflow-y: auto; padding: .8rem; }

/* ── КАРТКА ── */
.tcard {
  background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
  padding: 1rem; margin-bottom: .8rem; cursor: grab; position: relative;
}
.tcard:active { cursor: grabbing; }
.tcard::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
}
.tcard[data-e=low]::before { background: var(--e-low); }
.tcard[data-e=medium]::before { background: var(--e-med); }
.tcard[data-e=high]::before { background: var(--e-high); }

.tcard.is-stale { background: var(--stale-bg); border-style: dashed; }
.tc-title { font-size: .95rem; line-height: 1.4; margin-bottom: .5rem; }
.tc-meta { font-family: 'JetBrains Mono', monospace; font-size: .5rem; color: var(--muted); text-transform: uppercase; }

/* ── ШВИДКЕ ДОДАВАННЯ ── */
.col-footer { padding: .8rem; border-top: 1px solid var(--border); }
.quick-in {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  padding: .6rem; font-family: 'Literata'; font-size: .85rem; border-radius: 2px;
}

/* ── МОДАЛКА ── */
.modal {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000;
  display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px);
}
.mcard { background: var(--bg); padding: 2rem; width: 100%; max-width: 400px; border: 1px solid var(--border); }
.inp { width: 100%; padding: .8rem; margin-bottom: 1rem; background: var(--surface); border: 1px solid var(--border); font-family: 'Literata'; }
.pbtn { width: 100%; padding: 1rem; background: var(--accent); color: #fff; font-family: 'JetBrains Mono'; text-transform: uppercase; cursor: pointer; }

#auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; align-items: center; justify-content: center; }

@media (max-width: 900px) {
  #board { flex-direction: column; overflow-y: auto; }
  .col { min-width: 0; flex: none; }
}
</style>
</head>
<body>

<div id="auth-gate">
  <div class="mcard">
    <div style="font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center;">Scanner<span>Planner</span></div>
    <input type="email" id="email" class="inp" placeholder="Email">
    <input type="password" id="pass" class="inp" placeholder="Password">
    <button class="pbtn" onclick="doLogin()">Увійти</button>
  </div>
</div>

<header class="topbar">
  <div class="logo" onclick="location.reload()">Scanner<span>Planner</span></div>
  <div class="btn-group">
    <button class="ctrl-btn" onclick="runRoulette()">🎲 Що зараз?</button>
    <button class="ctrl-btn" id="focus-btn" onclick="toggleFocus()">🎯 Фокус</button>
    <button class="ctrl-btn" onclick="toggleTheme()">☾ Тема</button>
  </div>
</header>

<nav class="ctx-bar" id="ctx-bar">
  <button class="ctx-tab active" data-ctx="inbox">Вхідні <span class="badge" id="b-inbox">0</span></button>
  <button class="ctx-tab" data-ctx="today">Сьогодні <span class="badge" id="b-today">0</span></button>
  <button class="ctx-tab" data-ctx="waiting">Чекаю <span class="badge" id="b-waiting">0</span></button>
  <button class="ctx-tab" data-ctx="someday">Колись <span class="badge" id="b-someday">0</span></button>
</nav>

<main class="app-body">
  <div id="board"></div>
</main>

<div id="modal" class="modal" onclick="if(event.target===this)closeMod()">
  <div class="mcard" id="mbody"></div>
</div>

<script>
/* ── КОНФІГУРАЦІЯ ── */
const SUPABASE_URL = 'https://mlkdphygsdfcanztbtez.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc';
const sb = supabase.createClient(SB_URL, SB_KEY);

let tasks = [];
let activeCtx = 'inbox';
let focusMode = false;
let editId = null;

/* ── АВТОРИЗАЦІЯ ── */
async function doLogin() {
  const { error } = await sb.auth.signInWithPassword({ email: email.value, password: pass.value });
  if (error) alert("Помилка: " + error.message);
}

sb.auth.onAuthStateChange((ev, sess) => {
  document.getElementById('auth-gate').style.display = sess ? 'none' : 'flex';
  if (sess) sync();
});

/* ── ДАНІ ── */
async function sync() {
  const { data } = await sb.from('scanner_tasks').select('*').order('created_at', { ascending: false });
  tasks = data || [];
  updateBadges();
  render();
}

function updateBadges() {
  ['inbox', 'today', 'waiting', 'someday'].forEach(k => {
    const count = tasks.filter(t => t.context === k && !t.done).length;
    document.getElementById('b-' + k).textContent = count;
  });
}

/* ── ЛОГІКА РУЛЕТКИ ТА ФОКУСУ ── */
function toggleFocus() {
  focusMode = !focusMode;
  document.getElementById('focus-btn').classList.toggle('active', focusMode);
  render();
}

function toggleTheme() {
  const d = document.documentElement;
  d.dataset.theme = d.dataset.theme === 'dark' ? 'light' : 'dark';
}

function runRoulette() {
  const options = tasks.filter(t => t.context === 'someday' && !t.done && t.energy !== 'high');
  if (!options.length) return alert("Немає ідей у 'Колись' з низькою енергією.");
  openMod(options[Math.floor(Math.random() * options.length)]);
}

/* ── РЕНДЕР ── */
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  if (activeCtx === 'inbox') {
    // Inbox: Одна колонка
    const list = tasks.filter(t => t.context === 'inbox' && !t.done);
    board.appendChild(buildCol("Вхідні Ідеї", list, null, "medium"));
  } else {
    // Інші: Три колонки за енергією
    let list = tasks.filter(t => t.context === activeCtx && !t.done);
    if (focusMode && activeCtx === 'today') list = list.filter(t => t.kind === 'task');

    [['Низька', 'low'], ['Середня', 'medium'], ['Висока', 'high']].forEach(([lbl, en]) => {
      const colTasks = list.filter(t => (t.energy || 'medium') === en);
      board.appendChild(buildCol(lbl, colTasks, en, en));
    });
  }
}

function buildCol(title, list, energyTag, defEnergy) {
  const col = document.createElement('div');
  col.className = 'col';
  
  // Drag and Drop Events
  col.ondragover = e => e.preventDefault();
  col.ondragenter = () => col.classList.add('drag-over');
  col.ondragleave = () => col.classList.remove('drag-over');
  col.ondrop = async e => {
    col.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text');
    await sb.from('scanner_tasks').update({ context: activeCtx, energy: energyTag || 'medium' }).eq('id', id);
    sync();
  };

  col.innerHTML = `
    <div class="col-head">
      <div class="col-title"><span class="col-dot" style="background:var(--e-${defEnergy})"></span>${title}</div>
      <div class="badge">${list.length}</div>
    </div>
    <div class="col-body"></div>
    <div class="col-footer">
      <input class="quick-in" placeholder="+ Швидкий запис..." onkeydown="handleQuickAdd(event, '${energyTag || 'medium'}')">
    </div>
  `;

  const body = col.querySelector('.col-body');
  list.forEach(t => body.appendChild(mkCard(t)));
  return col;
}

function mkCard(t) {
  const el = document.createElement('div');
  const isStale = t.context === 'inbox' && (Date.now() - new Date(t.created_at)) > 259200000;
  el.className = `tcard ${isStale ? 'is-stale' : ''}`;
  el.dataset.e = t.energy || 'medium';
  el.draggable = true;
  el.ondragstart = e => e.dataTransfer.setData('text', t.id);

  el.innerHTML = `
    <div class="tc-title">${t.title} ${isStale ? '🕸️' : ''}</div>
    <div class="tc-meta">
      <span>${t.kind || 'task'}</span>
      <span style="float:right" onclick="event.stopPropagation(); toggleDone('${t.id}')">◯</span>
    </div>
  `;
  el.onclick = () => openMod(t);
  return el;
}

/* ── ДІЇ ── */
async function handleQuickAdd(e, energy) {
  if (e.key !== 'Enter' || !e.target.value.trim()) return;
  const user = (await sb.auth.getUser()).data.user;
  await sb.from('scanner_tasks').insert([{
    title: e.target.value.trim(),
    context: activeCtx,
    energy: energy,
    user_id: user.id
  }]);
  e.target.value = '';
  sync();
}

async function toggleDone(id) {
  await sb.from('scanner_tasks').update({ done: true, done_at: new Date() }).eq('id', id);
  sync();
}

function openMod(t) {
  editId = t?.id || null;
  const body = document.getElementById('mbody');
  document.getElementById('modal').style.display = 'flex';
  body.innerHTML = `
    <input id="m-ttl" class="inp" value="${t?.title || ''}" placeholder="Що зробити?">
    <textarea id="m-note" class="inp" style="height:100px" placeholder="Нотатки...">${t?.note || ''}</textarea>
    <div style="display:flex; gap:10px; margin-bottom:1rem">
      <select id="m-ctx" class="inp">${['inbox', 'today', 'waiting', 'someday'].map(k => `<option value="${k}" ${t?.context === k ? 'selected' : ''}>${k.toUpperCase()}</option>`)}</select>
      <select id="m-en" class="inp">${['low', 'medium', 'high'].map(e => `<option value="${e}" ${t?.energy === e ? 'selected' : ''}>${e.toUpperCase()}</option>`)}</select>
    </div>
    <button class="pbtn" onclick="save()">Зберегти</button>
  `;
}

async function save() {
  const d = {
    title: document.getElementById('m-ttl').value,
    note: document.getElementById('m-note').value,
    context: document.getElementById('m-ctx').value,
    energy: document.getElementById('m-en').value,
    user_id: (await sb.auth.getUser()).data.user.id
  };
  if (editId) await sb.from('scanner_tasks').update(d).eq('id', editId);
  else await sb.from('scanner_tasks').insert([d]);
  closeMod(); sync();
}

function closeMod() { document.getElementById('modal').style.display = 'none'; }

document.getElementById('ctx-bar').onclick = e => {
  const tab = e.target.closest('.ctx-tab');
  if (!tab) return;
  document.querySelectorAll('.ctx-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeCtx = tab.dataset.ctx;
  render();
};

document.addEventListener('DOMContentLoaded', () => {
  document.documentElement.dataset.theme = 'light';
});
</script>
</body>
</html>
